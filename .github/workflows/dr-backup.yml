# Disaster-recovery backup runner (Build Queue item 1).
#
# DELIBERATELY NOT SCHEDULED YET. The hourly `schedule:` trigger below is
# commented out and must stay that way until gates G5 (secrets stored) and G6
# (first immutable write approved) are both cleared. Until then this workflow
# runs only when a human dispatches it, and it defaults to a dry run.
#
# Why that ordering matters: the B2 bucket has Object Lock enabled with
# governance retention, so the first real upload CANNOT be deleted before its
# retention expires. An accidental schedule would start writing immutable
# objects before anyone has reviewed a manifest.
#
# To enable after G6 approval: uncomment the `schedule:` block. Nothing else
# needs to change.

name: DR backup

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'preflight (provider check only), dry-run (uploads nothing), or execute (writes IMMUTABLE objects)'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - preflight
          - dry-run
          - execute
      tier:
        description: 'retention tier for this generation'
        required: true
        default: 'hourly'
        type: choice
        options:
          - hourly
          - daily
          - monthly
  # schedule:
  #   - cron: '17 * * * *' # hourly at :17 — DO NOT UNCOMMENT BEFORE G5 + G6

permissions:
  contents: read

concurrency:
  # Never let two generations run at once; they would race on the manifest diff.
  group: dr-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # CREDENTIAL CONTAINMENT — read this before changing anything below.
    #
    # THE AUTHORITATIVE CONTROL IS THIS `environment:` LINE plus the GitHub-side
    # configuration of the `dr-backup` Environment. That Environment must be
    # configured in GitHub to permit deployments ONLY from the protected `main`
    # branch. That restriction is what actually prevents a job on another ref
    # from ever RECEIVING these secrets: GitHub enforces it before the job
    # starts, and it cannot be defeated by editing this file.
    #
    # These must be ENVIRONMENT secrets on `dr-backup`, never ordinary
    # repository secrets. Repository secrets are readable by every workflow in
    # the repo; environment secrets are released only to a job that names the
    # environment AND satisfies its branch restriction.
    #
    # The ref check below is defence in depth, NOT the primary control. It runs
    # before any step in THIS file references a secret, so it catches
    # misconfiguration and accidental dispatch. It CANNOT contain a maliciously
    # modified workflow — anyone able to alter this file could simply delete the
    # step. Only the Environment branch restriction defends against that.
    environment: dr-backup
    #
    # OPERATOR SETUP — values for the `dr-backup` Environment.
    #
    # ENVIRONMENT SECRETS (values live in 1Password; never in this repo):
    #   DR_PROD_DB_URL                    1P: WCF Planner — PROD database backup reader
    #   DR_B2_KEY_ID                      1P: WCF Planner — Backblaze B2 backup writer
    #   DR_B2_APPLICATION_KEY             1P: WCF Planner — Backblaze B2 backup writer
    #   DR_R2_ACCESS_KEY_ID               1P: WCF Planner — Cloudflare R2 backup writer
    #   DR_R2_SECRET_ACCESS_KEY           1P: WCF Planner — Cloudflare R2 backup writer
    #   DR_STORAGE_S3_ACCESS_KEY_ID       1P: WCF Planner — Supabase Storage backup reader
    #   DR_STORAGE_S3_SECRET_ACCESS_KEY   1P: WCF Planner — Supabase Storage backup reader
    #
    # ENVIRONMENT VARIABLES (non-secret; exact values):
    #   DR_AGE_RECIPIENT        age1eecv3876tmen20n5el4nn5t0ac9pvudqlx0rejqvr2ll0zqhhplsmxazj8
    #   DR_B2_BUCKET            wcf-planner-dr-primary-2026
    #   DR_B2_ENDPOINT          s3.us-east-005.backblazeb2.com
    #   DR_R2_BUCKET            wcf-planner-dr-secondary-2026
    #   DR_R2_ENDPOINT          https://9cf61539da8c9903163bd5fb6b2b6958.r2.cloudflarestorage.com
    #   DR_STORAGE_S3_ENDPOINT  https://pzfujbjtayhkdlxiblwe.storage.supabase.co/storage/v1/s3
    #   DR_STORAGE_S3_REGION    us-west-2
    #
    # The age PRIVATE identity is deliberately absent. The runner encrypts and
    # cannot decrypt; the private key lives only in 1Password
    # (WCF Planner — Backup database unlock keys) and the offline copy at the farm.
    steps:
      # FIRST STEP, deliberately: runs before checkout and before any step in
      # this file references a secret.
      #
      # NOTE $GITHUB_REF rather than a ${{ }} expression. GitHub expressions are
      # substituted into the script TEXT before the shell parses it, so
      # interpolating one into executable shell is a script-injection pattern.
      # Reading the runner-provided environment variable keeps the value as data
      # that the shell can only ever treat as a string.
      - name: Refuse any ref other than protected main
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "refusing: DR backup may only run from refs/heads/main"
            echo "  got: $GITHUB_REF"
            exit 1
          fi
          echo "ref check passed: $GITHUB_REF"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # The PROD server is PostgreSQL 17.6. pg_dump must be >= the server major,
      # and ubuntu-latest ships an older client by default, so pull 17 from PGDG.
      - name: Install postgresql-client-17
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Installing the 17 client is necessary but NOT sufficient: ubuntu-latest
          # ships postgresql-client-16, and /usr/bin/pg_dump is the Debian
          # pg_wrapper, which keeps resolving to 16 after the 17 install. pg_dump 16
          # then refuses the 17.x server ("aborting because of server version
          # mismatch") and the first real backup failed here. Put the versioned 17
          # bin dir FIRST on PATH so pg_dump/psql are the 17 binaries directly,
          # bypassing the wrapper. GITHUB_PATH only affects LATER steps, so verify
          # in-step against the explicit path.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Install age
        run: |
          sudo apt-get install -y age
          age --version

      - name: Verify toolchain
        run: |
          aws --version   # preinstalled on ubuntu-latest; used for B2 + R2 (both S3-compatible)
          node --version
          # pg_dump must be >= the 17.x server major or the dump aborts with a
          # version mismatch. This runs on the PATH the backup step will use (pg17
          # prepended via GITHUB_PATH in the previous step), so a wrapper/PATH
          # regression fails here, cheaply, instead of after connecting to PROD.
          pg_dump --version
          pg_major="$(pg_dump --version | grep -oE '[0-9]+' | head -1)"
          if [ "$pg_major" -lt 17 ]; then
            echo "refusing: pg_dump major $pg_major < 17 (PROD server is 17.x)"
            exit 1
          fi

      - name: Run backup
        env:
          # --- SECRETS (Environment secrets on `dr-backup`) ------------------
          PROD_DB_URL: ${{ secrets.DR_PROD_DB_URL }}
          DR_B2_KEY_ID: ${{ secrets.DR_B2_KEY_ID }}
          DR_B2_APPLICATION_KEY: ${{ secrets.DR_B2_APPLICATION_KEY }}
          DR_R2_ACCESS_KEY_ID: ${{ secrets.DR_R2_ACCESS_KEY_ID }}
          DR_R2_SECRET_ACCESS_KEY: ${{ secrets.DR_R2_SECRET_ACCESS_KEY }}
          # Supabase Storage READ credential. Supabase cannot scope it read-only
          # or per-bucket, so it could delete production Storage if leaked. The
          # runner enforces read-only source operations in code; the Environment
          # branch restriction contains who can reach it. Both layers matter.
          DR_STORAGE_S3_ACCESS_KEY_ID: ${{ secrets.DR_STORAGE_S3_ACCESS_KEY_ID }}
          DR_STORAGE_S3_SECRET_ACCESS_KEY: ${{ secrets.DR_STORAGE_S3_SECRET_ACCESS_KEY }}
          # --- VARIABLES (non-secret Environment variables) ------------------
          # DR_AGE_RECIPIENT is the PUBLIC half of the keypair. The private
          # identity exists only in 1Password and the offline copy and must
          # NEVER be added here — the runner cannot decrypt, only encrypt.
          DR_AGE_RECIPIENT: ${{ vars.DR_AGE_RECIPIENT }}
          DR_B2_BUCKET: ${{ vars.DR_B2_BUCKET }}
          DR_B2_ENDPOINT: ${{ vars.DR_B2_ENDPOINT }}
          DR_R2_BUCKET: ${{ vars.DR_R2_BUCKET }}
          DR_R2_ENDPOINT: ${{ vars.DR_R2_ENDPOINT }}
          DR_STORAGE_S3_ENDPOINT: ${{ vars.DR_STORAGE_S3_ENDPOINT }}
          DR_STORAGE_S3_REGION: ${{ vars.DR_STORAGE_S3_REGION }}
          # Dispatch inputs are passed as ENV, not interpolated into the script,
          # for the same script-injection reason as the ref check above.
          DR_MODE: ${{ inputs.mode }}
          DR_TIER: ${{ inputs.tier }}
        run: |
          # Standard execute protects the database AND every selected Storage
          # body. --database-only is a CLI-only escape hatch and is deliberately
          # NOT reachable from this workflow, so no scheduled or default run can
          # quietly produce a partial backup that reads as complete.
          case "$DR_MODE" in
            preflight)
              node scripts/dr_backup.cjs --env=prod --preflight
              ;;
            execute)
              node scripts/dr_backup.cjs --env=prod --tier="$DR_TIER" --execute
              ;;
            *)
              node scripts/dr_backup.cjs --env=prod --tier="$DR_TIER"
              ;;
          esac
