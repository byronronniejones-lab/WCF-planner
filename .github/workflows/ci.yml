name: CI

on:
  pull_request:
  push:
    branches: [main]

# Read-only — workflow does not write to repo, comment on PRs, or push artifacts
# beyond per-run debug uploads.
permissions:
  contents: read

# Fixed serialization across the entire repo: every CI run shares the same test
# Supabase project (single-DB, workers=1). Concurrent runs from different PRs
# would race the truncate-and-reseed reset between specs. Queue rather than
# cancel — re-pushing to a branch waits its turn instead of cancelling work.
concurrency:
  group: wcf-test-db
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Preserves the assertTestDatabase guard. Tests refuse to run without this.
      WCF_TEST_DATABASE: '1'
      # Supabase test-project credentials — configured in repo Settings → Secrets
      # and variables → Actions. Never commit these values; never echo them.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_TEST_ADMIN_EMAIL: ${{ secrets.VITE_TEST_ADMIN_EMAIL }}
      VITE_TEST_ADMIN_PASSWORD: ${{ secrets.VITE_TEST_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (vite production)
        run: npm run build

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
