name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:
    inputs:
      full_e2e:
        description: Run the complete two-shard browser suite
        required: true
        type: boolean
        default: true

# Read-only — workflow does not write to repo, comment on PRs, or push artifacts
# beyond per-run debug uploads.
permissions:
  contents: read

# NO workflow-level concurrency. Serialization is now PER-PROJECT at the job
# level (concurrency: wcf-test-db-<project>), so the isolated TEST fleet can run
# TEST A and TEST B shards CONCURRENTLY (different projects) while a single
# project stays serialized against itself, against the focused/pasture jobs that
# share it, and against a local run holding the same lease group
# (scripts/fleet/lease.cjs dispatches test-db-lease-project.yml with the SAME
# wcf-test-db-<project> groups). The legacy single wcf-test-db group is retired
# by this change; the per-project groups replace it (mission Phase 5/12).
#
# Fleet routing (mission Phase 5):
#   primary full lane (main/nightly/manual full): shard 1 -> TEST A (env test-a,
#     concurrency wcf-test-db-a); shard 2 -> TEST B (env test-b, wcf-test-db-b).
#   focused browser work: TEST A (env test-a, wcf-test-db-a) — serialized with
#     the primary shard 1 on the same project so they never overlap.
#   secondary manual full lane (TEST C/D) lives in ci-secondary-full.yml.
#   wcf-planner-test-main is QUARANTINED (Disk I/O) and is never a target here.
#
# Every DB-owning job binds to EXACTLY one environment + one concurrency group,
# so it can only read that one project's secrets (a test-a job cannot read
# test-b/PROD/DR values) and can only reset/seed that one project.

jobs:
  # DB-free changed-file classifier. It selects none/focused/full root browser
  # coverage and independently gates the isolated Pasture suite.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      pasture: ${{ steps.plan.outputs.pasture }}
      specs_json: ${{ steps.plan.outputs.specs_json }}
      reason: ${{ steps.plan.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify browser-test risk
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          FORCE_FULL: ${{ inputs.full_e2e || false }}
          TRUSTED_PR_MERGE: "${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Merge pull request #') }}"
        run: |
          : > changed-files.txt
          if [ "$EVENT" = "pull_request" ]; then
            git diff --name-only "$PR_BASE" "$PR_HEAD" > changed-files.txt 2>/dev/null || true
          elif [ "$EVENT" = "push" ]; then
            git diff --name-only "$PUSH_BEFORE" "$PUSH_AFTER" > changed-files.txt 2>/dev/null || true
          fi
          echo "Changed files:"
          cat changed-files.txt
          node scripts/ci_playwright_plan.cjs \
            --event "$EVENT" \
            --force-full "$FORCE_FULL" \
            --trusted-pr-merge "$TRUSTED_PR_MERGE" \
            --labels "${LABELS_JSON:-[]}" \
            --files changed-files.txt | tee -a "$GITHUB_OUTPUT"

  # Fast DB-free quality gate: format, lint, unit tests, production build. No
  # env/secrets here on purpose (fully offline; keeps the service-role key out
  # of the job that runs npm ci on every PR).
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Format check (prettier)
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm test
      - name: Build (vite production)
        run: npm run build

  # Ordinary mapped changes run only the browser specs owned by their touched
  # surface, on TEST A (env test-a, lease wcf-test-db-a) — serialized with the
  # primary full shard 1 on the same project. Mutually exclusive with e2e-full.
  focused-e2e:
    needs: [changes, verify]
    if: ${{ needs.changes.outputs.mode == 'focused' && needs.verify.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: test-a
    concurrency:
      group: wcf-test-db-a
      cancel-in-progress: false
    env:
      WCF_TEST_DATABASE: '1'
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_TEST_ADMIN_EMAIL: ${{ secrets.VITE_TEST_ADMIN_EMAIL }}
      VITE_TEST_ADMIN_PASSWORD: ${{ secrets.VITE_TEST_ADMIN_PASSWORD }}
      SPECS_JSON: ${{ needs.changes.outputs.specs_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Focused E2E tests
        timeout-minutes: 22
        run: |
          mapfile -t SPECS < <(node -e "JSON.parse(process.env.SPECS_JSON).forEach(s => console.log(s))")
          if [ "${#SPECS[@]}" -eq 0 ]; then
            echo "Focused mode selected without specs; refusing unsafe empty run"
            exit 1
          fi
          npm run test:e2e:ci -- "${SPECS[@]}"
      - name: Upload focused Playwright report on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-focused-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # Primary full lane: the two Playwright shards run on TWO DIFFERENT projects
  # CONCURRENTLY. shard 1 -> TEST A (env test-a, lease wcf-test-db-a); shard 2 ->
  # TEST B (env test-b, lease wcf-test-db-b). Playwright's --shard partitions the
  # filtered list deterministically: 1/2 + 2/2 together are EXACTLY the full
  # test:e2e:ci suite (disjoint, nothing dropped/duplicated). Each leg binds
  # exactly one environment + one concurrency group; fail-fast:false so one
  # project's failure never cancels the other. workers=1 keeps each project's
  # specs serialized within its own leg. Budgets from the old two-job layout
  # (shard 1 ~27 min step, shard 2 ~32 min step); a single 32/40 min budget
  # covers the slower shard, and the two legs no longer chain (no shared DB).
  e2e-full:
    needs: [changes, verify]
    if: ${{ needs.changes.outputs.mode == 'full' && needs.verify.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            project: a
            gh_environment: test-a
          - shard: 2
            project: b
            gh_environment: test-b
    environment: ${{ matrix.gh_environment }}
    concurrency:
      group: wcf-test-db-${{ matrix.project }}
      cancel-in-progress: false
    env:
      WCF_TEST_DATABASE: '1'
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_TEST_ADMIN_EMAIL: ${{ secrets.VITE_TEST_ADMIN_EMAIL }}
      VITE_TEST_ADMIN_PASSWORD: ${{ secrets.VITE_TEST_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: E2E tests (Playwright shard ${{ matrix.shard }}/2 on TEST ${{ matrix.project }})
        # Step timeout below the job budget so an overrun FAILS the step (keeps
        # the artifact upload) instead of cancelling the whole job.
        timeout-minutes: 32
        # Background runner-telemetry sampler; the trap stops it on any shell
        # exit (pass, fail, or cancel). It is backgrounded, so a telemetry
        # failure never changes the test command's exit code — the log simply
        # lacks TELEMETRY lines, which is the unavailability signal.
        run: |
          node scripts/ci_runner_telemetry.cjs & TELEM_PID=$!
          trap 'kill "$TELEM_PID" 2>/dev/null || true' EXIT
          npm run test:e2e:ci -- --shard=${{ matrix.shard }}/2
      - name: Upload Playwright report on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard${{ matrix.shard }}-${{ matrix.project }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # The Pasture Map browser specs run via the isolated playwright.pasture.config.js
  # (port 5199; does NOT reset the DB) on TEST A (env test-a, lease wcf-test-db-a)
  # — serialized with the primary shard 1 and focused job on the same project.
  # The `if` gate skips them on non-pasture PRs. !cancelled() lets them still run
  # for pasture PRs even if verify or the full lane failed/was skipped.
  pasture-e2e:
    needs: [changes, verify, focused-e2e, e2e-full]
    if: ${{ always() && !cancelled() && needs.changes.outputs.pasture == 'true' && needs.verify.result == 'success' && needs.focused-e2e.result != 'cancelled' && needs.e2e-full.result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: test-a
    concurrency:
      group: wcf-test-db-a
      cancel-in-progress: false
    env:
      WCF_TEST_DATABASE: '1'
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_TEST_ADMIN_EMAIL: ${{ secrets.VITE_TEST_ADMIN_EMAIL }}
      VITE_TEST_ADMIN_PASSWORD: ${{ secrets.VITE_TEST_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Pasture Map E2E (isolated config)
        timeout-minutes: 17
        run: npx playwright test --config playwright.pasture.config.js
      - name: Upload Playwright report on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: pasture-playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # One stable required-check target regardless of which conditional browser
  # jobs ran. It fails closed if the classifier-selected path did not succeed.
  e2e-policy-gate:
    needs: [changes, verify, focused-e2e, e2e-full, pasture-e2e]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      MODE: ${{ needs.changes.outputs.mode }}
      PASTURE: ${{ needs.changes.outputs.pasture }}
      VERIFY_RESULT: ${{ needs.verify.result }}
      FOCUSED_RESULT: ${{ needs.focused-e2e.result }}
      FULL_RESULT: ${{ needs.e2e-full.result }}
      PASTURE_RESULT: ${{ needs.pasture-e2e.result }}
    steps:
      - name: Enforce selected browser policy
        run: |
          echo "mode=$MODE pasture=$PASTURE verify=$VERIFY_RESULT focused=$FOCUSED_RESULT full=$FULL_RESULT pasture_result=$PASTURE_RESULT"
          test "$VERIFY_RESULT" = "success"
          case "$MODE" in
            none)
              test "$FOCUSED_RESULT" = "skipped"
              test "$FULL_RESULT" = "skipped"
              ;;
            focused)
              test "$FOCUSED_RESULT" = "success"
              test "$FULL_RESULT" = "skipped"
              ;;
            full)
              test "$FOCUSED_RESULT" = "skipped"
              test "$FULL_RESULT" = "success"
              ;;
            *)
              echo "Unknown or empty mode; failing closed"
              exit 1
              ;;
          esac
          if [ "$PASTURE" = "true" ]; then
            test "$PASTURE_RESULT" = "success"
          else
            test "$PASTURE_RESULT" = "skipped"
          fi
