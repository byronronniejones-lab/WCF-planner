<script>
  // Select all text in number inputs on focus so typing replaces the 0 immediately
  document.addEventListener('focusin', function(e){
    if(e.target.type === 'number') e.target.select();
  });

  // ── BABEL TRANSPILE CACHE ──
  // Babel-in-browser is the slowest part of cold-start. We hash the JSX source
  // and cache the compiled output in localStorage. First visit is unchanged,
  // every subsequent visit (until the source changes) skips the transpile entirely.
  // The cache key includes the source hash, so deploying a new index.html
  // automatically invalidates the cache — no risk of serving stale code.
  window._wcfBabelCache = {
    hash: function(s){
      let h = 5381;
      for(let i=0; i<s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
      return 'wcf-babel-' + (h>>>0).toString(36) + '-' + s.length;
    },
    get: function(src){
      try {
        const key = this.hash(src);
        const cached = localStorage.getItem(key);
        if(cached) return cached;
      } catch(e) { /* localStorage may be disabled */ }
      return null;
    },
    set: function(src, compiled){
      try {
        const key = this.hash(src);
        // Clear any older babel cache entries to keep localStorage from filling up
        for(let i = localStorage.length - 1; i >= 0; i--){
          const k = localStorage.key(i);
          if(k && k.startsWith('wcf-babel-') && k !== key) localStorage.removeItem(k);
        }
        localStorage.setItem(key, compiled);
      } catch(e) {
        // Quota exceeded or disabled — not fatal, app still works without cache
        console.warn('Babel cache write failed:', e.message);
      }
    }
  };

  // ── LAZY LOAD SHEETJS ──
  // SheetJS (xlsx) is ~900KB and only used when opening processor reports.
  // Defer loading until first use. Returns a promise that resolves when XLSX is ready.
  window._wcfLoadXLSX = function(){
    if(window.XLSX) return Promise.resolve(window.XLSX);
    if(window._wcfXLSXPromise) return window._wcfXLSXPromise;
    window._wcfXLSXPromise = new Promise(function(resolve, reject){
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = function(){ resolve(window.XLSX); };
      s.onerror = function(){ reject(new Error('Failed to load XLSX library')); };
      document.head.appendChild(s);
    });
    return window._wcfXLSXPromise;
  };
</script>

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const BROODER_DAYS      = 14;
const CC_SCHOONER       = 35;
const WR_SCHOONER       = 42;
const BROODER_CLEANOUT  = 3;
const SCHOONER_CLEANOUT = 4;
const WEEKS_SHOWN       = 52;
const STORAGE_KEY       = "ppp-data-v1";
const FEED_BIRDS        = 750;
const STARTER_TOTAL_LBS = 1500;                          // fixed for both breeds
const STARTER_PER_BIRD  = STARTER_TOTAL_LBS / FEED_BIRDS; // 1.6 lbs/bird
// Split starter 30/70 across weeks 1-2 (matches chick growth pattern)
const STARTER_W1 = STARTER_PER_BIRD * 0.30; // ~0.48 lbs/bird
const STARTER_W2 = STARTER_PER_BIRD * 0.70; // ~1.12 lbs/bird

// CC grower weeks 3-7 (5 weeks): scale chart weekly increments to fill remaining lbs/bird
const CC_TOTAL_TARGET   = 15;
const CC_GROWER_TARGET  = CC_TOTAL_TARGET - STARTER_PER_BIRD; // 13.4 lbs/bird
const CC_GROWER_CHART   = [2.482,4.535,7.24,10.485,14.129]; // cumulative at wks 3-7 from chart
const CC_GROWER_WEEKLY_CHART = CC_GROWER_CHART.map((c,i) => c - (i===0 ? 1.109 : CC_GROWER_CHART[i-1]));
const CC_GROWER_CHART_TOTAL  = CC_GROWER_WEEKLY_CHART.reduce((a,b)=>a+b,0);
const CC_GROWER_SCALE        = CC_GROWER_TARGET / CC_GROWER_CHART_TOTAL;
const CC_GROWER_WEEKLY       = CC_GROWER_WEEKLY_CHART.map(w => w * CC_GROWER_SCALE);

// WR grower weeks 3-8 (6 weeks): same approach
const WR_TOTAL_TARGET   = 17.5;
const WR_GROWER_TARGET  = WR_TOTAL_TARGET - STARTER_PER_BIRD; // 15.9 lbs/bird
const WR_GROWER_CHART   = [2.3048,3.975,5.9292,8.1483,10.58,13.365]; // cumulative wks 3-8
const WR_GROWER_WEEKLY_CHART = WR_GROWER_CHART.map((c,i) => c - (i===0 ? 1.1193 : WR_GROWER_CHART[i-1]));
const WR_GROWER_CHART_TOTAL  = WR_GROWER_WEEKLY_CHART.reduce((a,b)=>a+b,0);
const WR_GROWER_SCALE        = WR_GROWER_TARGET / WR_GROWER_CHART_TOTAL;
const WR_GROWER_WEEKLY       = WR_GROWER_WEEKLY_CHART.map(w => w * WR_GROWER_SCALE);

function getFeedSchedule(breed) {
  const growerWeeks = breed === "WR" ? WR_GROWER_WEEKLY : CC_GROWER_WEEKLY;
  const weeks = [
    { week:1, phase:"starter", lbsPerBird: STARTER_W1 },
    { week:2, phase:"starter", lbsPerBird: STARTER_W2 },
    ...growerWeeks.map((lpb,i) => ({ week:i+3, phase:"grower", lbsPerBird: lpb })),
  ];
  return weeks.map(w => ({
    ...w,
    lbsPerBird: Math.round(w.lbsPerBird * 100) / 100,
    totalLbs:   Math.round(w.lbsPerBird * FEED_BIRDS * 10) / 10,
  }));
}

function calcBatchFeed(batch) {
  const schedule = getFeedSchedule(batch.breed);
  let starter = 0, grower = 0;
  schedule.forEach(w => {
    if (w.phase === "starter") starter += w.totalLbs;
    else grower += w.totalLbs;
  });
  return { schedule, starter: Math.round(starter), grower: Math.round(grower), total: Math.round(starter+grower) };
}

// For monthly summary: given a batch and a calendar month (YYYY-MM),
// return {starter, grower} lbs consumed in that month
function calcBatchFeedForMonth(batch, yearMonth) {
  if (!batch.hatchDate) return {starter:0, grower:0};
  const schedule = getFeedSchedule(batch.breed);
  const [y,m] = yearMonth.split("-").map(Number);
  const monthStart = new Date(y, m-1, 1);
  const monthEnd   = new Date(y, m, 0, 23, 59, 59);
  let starter = 0, grower = 0;
  schedule.forEach((w, i) => {
    const weekStart = addDays(batch.hatchDate, i*7);
    const weekEnd   = addDays(batch.hatchDate, (i+1)*7 - 1);
    // Check overlap with month
    if (weekStart <= monthEnd && weekEnd >= monthStart) {
      // Proportion of week that falls in this month
      const overlapStart = weekStart < monthStart ? monthStart : weekStart;
      const overlapEnd   = weekEnd   > monthEnd   ? monthEnd   : weekEnd;
      const overlapDays  = (overlapEnd - overlapStart) / 86400000 + 1;
      const prop = overlapDays / 7;
      if (w.phase === "starter") starter += w.totalLbs * prop;
      else grower += w.totalLbs * prop;
    }
  });
  return { starter: Math.round(starter), grower: Math.round(grower) };
}

const CC_HATCHERIES = ["So Big Farms","Meyer Hatchery","Welp Hatchery","Myers Poultry"];
const WR_HATCHERIES = ["Freedom Ranger Hatchery"];

// Legacy breeds — same gating. Both come from Freedom Ranger Hatchery historically

const BOAR_EXPOSURE_DAYS  = 45;
const GESTATION_DAYS      = 116; // days from first exposure to first possible farrowing
const WEANING_DAYS        = 42;  // 6 weeks

// Phase colors per group (light=earlier phases, dark=later phases)
const PIG_GROUP_COLORS = {

};

const PHASE_LABELS = ["Boar Exposure","Exp. Paddock","Farrowing","Weaning","Gilt Grow-out","Male Grow-out"];

function calcBreedingTimeline(exposureStart) {
  if (!exposureStart) return null;
  const d0 = new Date(exposureStart+"T12:00:00");
  const boarEnd        = toISO(addDays(d0, BOAR_EXPOSURE_DAYS - 1));
  // Paddock starts day AFTER last boar exposure day, ends day before first possible farrowing
  const paddockStart   = toISO(addDays(d0, BOAR_EXPOSURE_DAYS));
  const paddockEnd     = toISO(addDays(d0, GESTATION_DAYS - 1));
  const farrowingStart = toISO(addDays(d0, GESTATION_DAYS));
  const farrowingEnd   = toISO(addDays(d0, BOAR_EXPOSURE_DAYS - 1 + GESTATION_DAYS));
  const weaningStart   = toISO(addDays(d0, BOAR_EXPOSURE_DAYS + GESTATION_DAYS));
  const weaningEnd     = toISO(addDays(d0, BOAR_EXPOSURE_DAYS + GESTATION_DAYS + WEANING_DAYS - 1));
  const growStart      = toISO(addDays(d0, BOAR_EXPOSURE_DAYS + GESTATION_DAYS + WEANING_DAYS));
  const growEnd        = toISO(addDays(d0, BOAR_EXPOSURE_DAYS + GESTATION_DAYS + WEANING_DAYS + GROW_OUT_DAYS - 1));
  return { boarStart:exposureStart, boarEnd, paddockStart, paddockEnd,
    farrowingStart, farrowingEnd, weaningStart, weaningEnd, growStart, growEnd };
}

// ── AUTO-STATUS HELPERS ──────────────────────────────────────────────────
function calcPoultryStatus(batch) {
  if(!batch.hatchDate) return batch.status||'planned';
  const today = todayISO();
  const tl = calcTimeline(batch.hatchDate, batch.breed, batch.processingDate);
  if(!tl) return 'planned';
  if(today < tl.brooderIn) return 'planned';
  if(batch.processingDate && today > batch.processingDate) return 'processed';
  return 'active';
}

// Live broiler stats computed from daily reports.
// For modern (non-B-24) batches this is the source of truth for feed/grit/mortality.
// For legacy B-24-* batches the stored fields on the batch are used (no daily reports exist).

function calcBroilerStatsFromDailys(batch, broilerDailys){
  const isLegacy = (/^b-24-/i).test(batch.name||"");
  const dayOneCount = parseInt(batch.birdCountActual) || parseInt(batch.birdCount) || 0;
  if(isLegacy){
    const mort = parseInt(batch.mortalityCumulative)||0;
    return {
      starterFeed: parseFloat(batch.brooderFeedLbs)||0,
      growerFeed:  parseFloat(batch.schoonerFeedLbs)||0,
      gritLbs:     parseFloat(batch.gritLbs)||0,
      mortality:   mort,
      projectedBirds: Math.max(0, dayOneCount - mort),
      mortPct: dayOneCount>0 ? (mort/dayOneCount*100) : 0,
      dailyCount: 0,
      legacy: true,
    };
  }
  const target = String(batch.name||"").toLowerCase().trim();
  const bd = (broilerDailys||[]).filter(d=>{
    const lbl = String(d.batch_label||"").toLowerCase().trim().replace(/^\(processed\)\s*/,'').trim();
    return lbl === target;
  });
  let starterFeed=0, growerFeed=0, gritLbs=0, mortality=0;
  for(const d of bd){
    const f = parseFloat(d.feed_lbs)||0;
    if(d.feed_type === 'STARTER') starterFeed += f;
    else if(d.feed_type === 'GROWER') growerFeed += f;
    gritLbs   += parseFloat(d.grit_lbs)||0;
    mortality += parseInt(d.mortality_count)||0;
  }
  return {
    starterFeed: Math.round(starterFeed),
    growerFeed:  Math.round(growerFeed),
    gritLbs:     Math.round(gritLbs),
    mortality,
    projectedBirds: Math.max(0, dayOneCount - mortality),
    mortPct: dayOneCount>0 ? (mortality/dayOneCount*100) : 0,
    dailyCount: bd.length,
    legacy: false,
  };
}

function calcCycleStatus(cycle) {
  if(!cycle.exposureStart) return cycle.status||'planned';
  const today = todayISO();
  const tl = calcBreedingTimeline(cycle.exposureStart);
  if(!tl) return 'planned';
  if(today < cycle.exposureStart) return 'planned';
  if(today > tl.growEnd) return 'completed';
  return 'active';
}

function getBatchColor(name){
  if(!name) return BATCH_COLOR_PALETTE[0];
  // Try to extract a trailing number from the name (e.g. "B-26-09" → 9, "L-26-01" → 1).
  // This guarantees consecutive batches get adjacent (and visually distinct) palette colors.
  const m = String(name).match(/(\d+)\s*$/);
  if(m){
    const n = parseInt(m[1]);
    if(!isNaN(n)) return BATCH_COLOR_PALETTE[n % BATCH_COLOR_PALETTE.length];
  }
  // Fallback for batches without a trailing number: hash
  let hash = 5381;
  const s = String(name).toLowerCase().trim();
  for(let i=0;i<s.length;i++) hash = ((hash << 5) + hash + s.charCodeAt(i)) | 0;
  return BATCH_COLOR_PALETTE[Math.abs(hash) % BATCH_COLOR_PALETTE.length];
}

// ── Layer housing count helpers (top-level, no React state) ────────────────
// Model X: current_count is a *verified anchor* set by physical counts (manual
// or via daily report layer_count). Mortality reports do NOT mutate it.
// Projected count is computed at display time from anchor minus mortalities.

// Update housing anchor when a daily report includes a hen count.
// Sets current_count to the new value AND current_count_date to the report date.
async function setHousingAnchorFromReport(sb, housingOrBatchName, newCount, reportDate){
  if(!housingOrBatchName || newCount==null || isNaN(parseInt(newCount))) return {ok:false, reason:'no-input'};
  const trimmed = String(housingOrBatchName).toLowerCase().trim();
  if(!trimmed) return {ok:false, reason:'empty-name'};
  const newC = Math.max(0, parseInt(newCount));
  // Step 1 — try direct housing_name match
  const {data: housings, error: selErr} = await sb.from('layer_housings')
    .select('id,current_count,current_count_date,status,housing_name,batch_id')
    .eq('status','active');
  if(selErr || !housings) return {ok:false, reason:'db-error'};
  let target = housings.find(h =>
    String(h.housing_name||'').toLowerCase().trim() === trimmed
  );
  // Step 2 — fall back to batch-name match if no housing matched directly
  // (e.g. report's batch_label is "L-26-01" not "Eggmobile 2")
  if(!target){
    const {data: batches} = await sb.from('layer_batches').select('id,name');
    const matchingBatch = (batches||[]).find(b => String(b.name||'').toLowerCase().trim() === trimmed);
    if(matchingBatch){
      const batchHousings = housings.filter(h => h.batch_id === matchingBatch.id);
      if(batchHousings.length === 1){
        // Unambiguous: update the single active housing for this batch
        target = batchHousings[0];
      } else if(batchHousings.length > 1){
        // Ambiguous: don't guess. Report which housings exist so the caller can warn the user.
        return {ok:false, reason:'ambiguous-batch', batchName:matchingBatch.name, housingNames:batchHousings.map(h=>h.housing_name)};
      }
    }
  }
  if(!target) return {ok:false, reason:'no-match', name:housingOrBatchName};
  // Last write wins: any save (regardless of report date) overwrites the anchor.
  // To intentionally use a different date, the user can edit any daily report or
  // set the housing count manually.
  const {error: updErr} = await sb.from('layer_housings')
    .update({current_count: newC, current_count_date: reportDate || null})
    .eq('id', target.id);
  if(updErr) return {ok:false, reason:'update-failed', error:updErr.message};
  return {ok:true, id: target.id, housingName: target.housing_name, newCount: newC, newDate: reportDate};
}

// Compute projected count for a housing.
// projected = current_count - sum(mortalities reported between current_count_date and today)
// Returns {anchor, anchorDate, projected, mortSince} or null if no anchor.
function computeProjectedCount(housing, layerDailys){
  if(!housing) return null;
  const anchor = housing.current_count;
  if(anchor==null) return null;
  // Anchor date — fall back to housing.start_date if no anchor date set
  const anchorDate = housing.current_count_date || housing.start_date || null;
  if(!anchorDate){
    return {anchor, anchorDate:null, projected:anchor, mortSince:0};
  }
  // Sum mortalities for this housing's name where date > anchorDate (strictly after)
  // and date <= today. We use strictly-after because mortalities ON the anchor date
  // are presumed already reflected in the count (the report date is the count's "as of").
  const todayStr = new Date().toISOString().split('T')[0];
  const mortSince = (layerDailys||[])
    .filter(d => {
      if(!d || !d.date || !d.batch_label) return false;
      if(String(d.batch_label).toLowerCase().trim() !== String(housing.housing_name).toLowerCase().trim()) return false;
      if(d.date <= anchorDate) return false;
      if(d.date > todayStr) return false;
      return true;
    })
    .reduce((s,d) => s + (parseInt(d.mortality_count)||0), 0);
  const projected = Math.max(0, anchor - mortSince);
  return {anchor, anchorDate, projected, mortSince};
}

// ── Layer feed cost helper ─────────────────────────────────────────────────
// Computes total feed cost for a layer batch using the batch's frozen rates.
// Returns null if no rates are set.
function computeLayerFeedCost(starterLbs, growerLbs, layerLbs, batch){
  if(!batch) return null;
  const sR = parseFloat(batch.per_lb_starter_cost);
  const gR = parseFloat(batch.per_lb_grower_cost);
  const lR = parseFloat(batch.per_lb_layer_cost);
  // If all 3 rates are missing/zero, no cost data
  if((!sR||sR===0) && (!gR||gR===0) && (!lR||lR===0)) return null;
  const cost = ((parseFloat(starterLbs)||0) * (sR||0))
             + ((parseFloat(growerLbs)||0)  * (gR||0))
             + ((parseFloat(layerLbs)||0)   * (lR||0));
  return cost;
}

  if(!iso) return "—";
  const [y,m,d]=iso.split("-").map(Number);
  return new Date(y,m-1,d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function fmtS(iso){
  if(!iso) return "—";
  const [y,m,d]=iso.split("-").map(Number);
  return new Date(y,m-1,d).toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function todayISO(){ return toISO(new Date()); }
function thisMonday(){
  const d=new Date();
  d.setDate(d.getDate()-d.getDay());
  return toISO(d);
}

// ── HOLIDAY LOGIC ──────────────────────────────────────────────────────────
function getEaster(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  return toISO(new Date(y,Math.floor((h+l-7*m+114)/31)-1,((h+l-7*m+114)%31)+1));
}
function getThanksgiving(y){
  const d=new Date(y,10,1);
  return toISO(new Date(y,10,((4-d.getDay()+7)%7)+22));
}
function holidaysForYear(y){
  return [`${y}-01-01`,getEaster(y),`${y}-07-04`,getThanksgiving(y),`${y}-12-25`];
}
function isNearHoliday(iso){
  if(!iso) return false;
  const d=new Date(iso+"T12:00:00"),y=d.getFullYear();
  const all=[...holidaysForYear(y-1),...holidaysForYear(y),...holidaysForYear(y+1)];
  return all.some(h=>Math.abs(d-new Date(h+"T12:00:00"))/86400000<=1);
}

// ── BUSINESS LOGIC ─────────────────────────────────────────────────────────
function calcTimeline(hatchDate, breed, processingDate){
  if(!hatchDate) return null;
  const brooderIn   = hatchDate;
  const brooderOut  = toISO(addDays(hatchDate, BROODER_DAYS));
  const schoonerIn  = brooderOut;
  const schoonerOut = processingDate
    ? toISO(addDays(processingDate, -1))
    : toISO(addDays(brooderOut, breed==="WR" ? WR_SCHOONER : CC_SCHOONER));
  return {brooderIn, brooderOut, schoonerIn, schoonerOut};
}

function calcTargetHatch(processingDate, breed){
  if(!processingDate) return null;
  // schoonerOut = processingDate - 1, so hatch = processingDate - 1 - schoonerDays - brooderDays
  const totalDays = 1 + BROODER_DAYS + (breed==="WR" ? WR_SCHOONER : CC_SCHOONER);
  return toISO(addDays(processingDate, -totalDays));
}

function suggestHatchDates(targetISO){
  if(!targetISO) return [];
  const out=[];
  for(let i=-3;i<=3;i++){
    const d=addDays(targetISO,i);
    const dow=d.getDay();
    if(dow>=1&&dow<=5){
      out.push({iso:toISO(d), offset:i, day:["","Mon","Tue","Wed","Thu","Fri"][dow], label:fmtS(toISO(d))});
    }
  }
  return out;
}

function overlaps(a1,a2,b1,b2){
  return new Date(a1+"T12:00:00")<=new Date(b2+"T12:00:00")
      && new Date(a2+"T12:00:00")>=new Date(b1+"T12:00:00");
}

function detectConflicts(form, batches, layerBatches, editId){
  const tl=calcTimeline(form.hatchDate, form.breed, form.processingDate);
  if(!tl) return [];
  const safeAddDays=(dateStr,n)=>{
    if(!dateStr) return null;
    try { return toISO(addDays(dateStr,n)); } catch(e) { return null; }
  };
  const bEnd=safeAddDays(tl.brooderOut,  BROODER_CLEANOUT);
  const sEnd=safeAddDays(tl.schoonerOut, SCHOONER_CLEANOUT);
  if(!bEnd&&!sEnd) return [];
  const out=[];
  // Hard conflicts: broiler vs broiler
  for(const b of batches){
    if(b.id===editId) continue;
    if(b.brooder===form.brooder && b.brooderIn && b.brooderOut && bEnd){
      const exEnd=safeAddDays(b.brooderOut, BROODER_CLEANOUT);
      if(exEnd && overlaps(tl.brooderIn,bEnd,b.brooderIn,exEnd))
        out.push({soft:false,message:'Brooder '+form.brooder+' conflict with "'+b.name+'" (brooder '+fmtS(b.brooderIn)+'\u2013'+fmtS(b.brooderOut)+' + '+BROODER_CLEANOUT+'d cleanout)'});
    }
    if(b.schooner===form.schooner && b.schoonerIn && b.schoonerOut && sEnd){
      const exEnd=safeAddDays(b.schoonerOut, SCHOONER_CLEANOUT);
      if(exEnd && overlaps(tl.schoonerIn,sEnd,b.schoonerIn,exEnd))
        out.push({soft:false,message:'Schooner '+form.schooner+' conflict with "'+b.name+'" (schooner '+fmtS(b.schoonerIn)+'\u2013'+fmtS(b.schoonerOut)+' + '+SCHOONER_CLEANOUT+'d cleanout)'});
    }
  }
  // Soft conflicts: broiler vs layer (layer brooder/schooner names have prefix to strip)
  if(layerBatches&&layerBatches.length){
    for(const lb of layerBatches){
      if(lb.status==='retired') continue;
      if(lb.name==='Retirement Home') continue;
      // Strip "Brooder " / "Schooner " prefix to compare with broiler form values
      const lbBrooderId = (lb.brooder_name||'').replace(/^Brooder\s*/i,'').trim();
      const lbSchoonerId = (lb.schooner_name||'').replace(/^Schooner\s*/i,'').trim();
      // Brooder check
      if(lbBrooderId && lbBrooderId===form.brooder && lb.brooder_entry_date && bEnd){
        const lbBOut = lb.brooder_exit_date || safeAddDays(lb.brooder_entry_date,21);
        if(lbBOut){
          const lbBExEnd = safeAddDays(lbBOut, BROODER_CLEANOUT);
          if(lbBExEnd && overlaps(tl.brooderIn,bEnd,lb.brooder_entry_date,lbBExEnd))
            out.push({soft:true,message:'Brooder '+form.brooder+' overlaps layer batch "'+lb.name+'" (brooder '+fmtS(lb.brooder_entry_date)+'\u2013'+fmtS(lbBOut)+')'});
        }
      }
      // Schooner check
      if(lbSchoonerId && lbSchoonerId===form.schooner && lb.schooner_entry_date && sEnd){
        const lbSOut = lb.schooner_exit_date || safeAddDays(lb.schooner_entry_date,119);
        if(lbSOut){
          const lbSExEnd = safeAddDays(lbSOut, SCHOONER_CLEANOUT);
          if(lbSExEnd && overlaps(tl.schoonerIn,sEnd,lb.schooner_entry_date,lbSExEnd))
            out.push({soft:true,message:'Schooner '+form.schooner+' overlaps layer batch "'+lb.name+'" (schooner '+fmtS(lb.schooner_entry_date)+'\u2013'+fmtS(lbSOut)+')'});
        }
      }
    }
  }
  return out;
}

function LoginScreen({onLogin}) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState('login'); // 'login' | 'reset'
  const [resetSent, setResetSent] = useState(false);

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setError('');
    const {error} = await sb.auth.signInWithPassword({email, password});
    if(error) { setError(error.message); setLoading(false); }
  }

  async function handleReset(e) {
    e.preventDefault();
    setLoading(true); setError('');
    const {error} = await sb.auth.resetPasswordForEmail(email);
    if(error) { setError(error.message); }
    else { setResetSent(true); }
    setLoading(false);
  }

  return (
    <div style={{minHeight:"100vh",background:"#085041",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div style={{background:"white",borderRadius:14,padding:"2.5rem",width:"100%",maxWidth:400,boxShadow:"0 8px 32px rgba(0,0,0,.2)"}}>
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div style={{fontSize:24,fontWeight:700,color:"#085041"}}>Broiler, Layer & Pig Planner</div>
          <div style={{fontSize:13,color:"#9ca3af",marginTop:4}}>White Creek Farm</div>
        </div>
        {mode==='login' ? (
          <form onSubmit={handleLogin} style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <label style={{fontSize:12,color:"#4b5563",display:"block",marginBottom:3}}>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" required style={{marginBottom:0}}/>
            </div>
            <div>
              <label style={{fontSize:12,color:"#4b5563",display:"block",marginBottom:3}}>Password</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required/>
            </div>
            {error&&<div style={{color:"#b91c1c",fontSize:12,background:"#fef2f2",padding:"8px 12px",borderRadius:8}}>{error}</div>}
            <button type="submit" disabled={loading} style={{padding:"10px",borderRadius:10,border:"none",background:"#085041",color:"white",fontWeight:600,fontSize:14,cursor:loading?"not-allowed":"pointer",opacity:loading?.7:1,marginTop:4}}>
              {loading?"Signing in...":"Sign In"}
            </button>
            <button type="button" onClick={()=>setMode('reset')} style={{background:"none",border:"none",color:"#085041",fontSize:12,cursor:"pointer",textAlign:"center"}}>
              Forgot password?
            </button>
          </form>
        ) : (
          <form onSubmit={handleReset} style={{display:"flex",flexDirection:"column",gap:12}}>
            {resetSent ? (
              <div style={{textAlign:"center",color:"#085041",fontSize:13}}>
                <div style={{fontSize:32,marginBottom:8}}>✓</div>
                Check your email for a password reset link.
              </div>
            ) : (
              <>
                <div style={{fontSize:13,color:"#4b5563"}}>Enter your email and we'll send a reset link.</div>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" required style={{marginBottom:0}}/>
                {error&&<div style={{color:"#b91c1c",fontSize:12,background:"#fef2f2",padding:"8px 12px",borderRadius:8}}>{error}</div>}
                <button type="submit" disabled={loading} style={{padding:"10px",borderRadius:10,border:"none",background:"#085041",color:"white",fontWeight:600,fontSize:14,cursor:"pointer"}}>
                  {loading?"Sending...":"Send Reset Link"}
                </button>
              </>
            )}
            <button type="button" onClick={()=>{setMode('login');setResetSent(false);}} style={{background:"none",border:"none",color:"#085041",fontSize:12,cursor:"pointer",textAlign:"center"}}>
              ← Back to sign in
            </button>
          </form>
        )}
      </div>
    </div>
  );
}

function UsersModal({sb, authState, allUsers, setAllUsers, setShowUsers, loadUsers}) {
  const [umTab,      setUmTab]      = React.useState('users');
  const [addEmail,   setAddEmail]   = React.useState('');
  const [addName,    setAddName]    = React.useState('');
  const [addRole,    setAddRole]    = React.useState('farm_team');
  const [addPass,    setAddPass]    = React.useState('');
  const [umMsg,      setUmMsg]      = React.useState('');
  const [umErr,      setUmErr]      = React.useState('');
  const [umLoading,  setUmLoading]  = React.useState(false);
  const [editingUser,setEditingUser]= React.useState(null);

  const ROLES = [{v:'farm_team',l:'Farm Team'},{v:'management',l:'Management'},{v:'admin',l:'Admin'}];

  React.useEffect(()=>{ loadUsers(); },[]);

  async function createUser(){
    if(!addEmail.trim()){setUmErr('Email required.');return;}
    if(!addPass||addPass.length<6){setUmErr('Password must be at least 6 characters.');return;}
    setUmLoading(true); setUmErr(''); setUmMsg('');
    try {
      const {data, error} = await sb.auth.signUp({
        email: addEmail.trim(), password: addPass,
        options: { data: { full_name: addName.trim() } }
      });
      if(error) throw error;
      if(data?.user) {
        await sb.from('profiles').upsert({id:data.user.id,email:addEmail.trim(),full_name:addName.trim(),role:addRole},{onConflict:'id'});
        await sb.auth.resetPasswordForEmail(addEmail.trim(), {redirectTo:'https://wcfplanner.com'});
        setUmMsg('✅ User created! A password reset email was sent to '+addEmail.trim()+'. They should use it to set their own password.');
        setAddEmail(''); setAddName(''); setAddPass(''); setAddRole('farm_team');
        loadUsers(); setUmTab('users');
      }
    } catch(e){ setUmErr('Error: '+(e.message||'Unknown error')); }
    setUmLoading(false);
  }

  async function updateRole(userId, newRole){
    await sb.from('profiles').update({role:newRole}).eq('id',userId);
    setAllUsers(prev=>prev.map(p=>p.id===userId?{...p,role:newRole}:p));
    setEditingUser(null);
  }

  async function updateName(userId, newName){
    await sb.from('profiles').update({full_name:newName}).eq('id',userId);
    setAllUsers(prev=>prev.map(p=>p.id===userId?{...p,full_name:newName}:p));
    setEditingUser(null);
  }

  async function deactivateUser(userId, email){
    if(!window.confirm('Deactivate '+email+'? They will no longer be able to log in.')) return;
    await sb.from('profiles').update({role:'inactive'}).eq('id',userId);
    setAllUsers(prev=>prev.map(p=>p.id===userId?{...p,role:'inactive'}:p));
  }

  const roleColor = {admin:'#b91c1c',management:'#1d4ed8',farm_team:'#085041',inactive:'#9ca3af'};
  const roleBg    = {admin:'#fef2f2',management:'#eff6ff',farm_team:'#ecfdf5',inactive:'#f3f4f6'};

const WebformHub = ({sb, wfGroups, setWfGroups, wfTeamMembers, setWfTeamMembers, layerGroups, batches, layerBatches, layerHousings, webformsConfig}) => {
  const {useState, useEffect} = React;
  const [loadedConfig, setLoadedConfig] = useState(null); // loaded from Supabase full_config
  const [broilerGroupsFromDb, setBroilerGroupsFromDb] = useState([]);
  const [wfSettings, setWfSettings] = useState({});
  const [pigGroupsFromDb, setPigGroupsFromDb] = useState([]);
  const [housingBatchMap, setHousingBatchMap] = useState({});
  useEffect(()=>{
    Promise.all([
      sb.from('webform_config').select('data').eq('key','full_config').maybeSingle(),
      sb.from('webform_config').select('data').eq('key','broiler_groups').maybeSingle(),
      sb.from('webform_config').select('data').eq('key','webform_settings').maybeSingle(),
      sb.from('webform_config').select('data').eq('key','active_groups').maybeSingle(),
      sb.from('webform_config').select('data').eq('key','team_members').maybeSingle(),
      sb.from('webform_config').select('data').eq('key','housing_batch_map').maybeSingle(),
    ]).then(([fc,bg,ws,ag,tm,hbm])=>{
      if(fc?.data?.data) setLoadedConfig(fc.data.data);
      if(Array.isArray(bg?.data?.data) && bg.data.data.length>0) setBroilerGroupsFromDb(bg.data.data);
      if(ws?.data?.data) setWfSettings(ws.data.data);
      if(Array.isArray(ag?.data?.data) && ag.data.data.length>0){
        const groups = ag.data.data.map(name=>({value:name,label:name}));
        setPigGroupsFromDb(groups);
        if(setWfGroups) setWfGroups(groups);
      }
      if(Array.isArray(tm?.data?.data) && tm.data.data.length>0){
        if(setWfTeamMembers) setWfTeamMembers(tm.data.data);
      }
      if(hbm?.data?.data) setHousingBatchMap(hbm.data.data);
    });
  },[]);
  const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const [activeForm, setActiveForm] = useState(null); // 'broiler' | 'layer' | 'egg'
  const [done, setDone] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [err, setErr] = useState('');
  const [lastGroup, setLastGroup] = useState('');

  // Broiler form state
  const EMPTY_B = {date:todayStr(),teamMember:localStorage.getItem('wcf_team')||'',batchLabel:'',feedType:'',feedLbs:'',gritLbs:'',groupMoved:true,watererChecked:true,mortalityCount:'',mortalityReason:'',comments:''};
  const [bForm, setBForm] = useState(EMPTY_B);

  // Layer form state
  const EMPTY_L = {date:todayStr(),teamMember:localStorage.getItem('wcf_team')||'',batchLabel:'',feedType:'',feedLbs:'',gritLbs:'',layerCount:'',groupMoved:true,watererChecked:true,mortalityCount:'',mortalityReason:'',comments:''};
  const [lForm, setLForm] = useState(EMPTY_L);

  // Pig form state
  const pigGroupList = [];
  const EMPTY_P = {date:todayStr(),teamMember:localStorage.getItem('wcf_team')||'',batchLabel:'',feedLbs:'',pigCount:'',groupMoved:true,nippleDrinkerMoved:true,nippleDrinkerWorking:true,troughsMoved:true,fenceWalked:true,fenceVoltage:'',issues:''};
  const [pForm, setPForm] = useState(EMPTY_P);

  // Egg form state
  const activeLayerGroups = (layerGroups||[]).filter(g=>g.status==='active');
  const EMPTY_E = {date:todayStr(),teamMember:localStorage.getItem('wcf_team')||'',g1n:activeLayerGroups[0]?.name||'',g1c:'',g2n:activeLayerGroups[1]?.name||'',g2c:'',g3n:activeLayerGroups[2]?.name||'',g3c:'',g4n:activeLayerGroups[3]?.name||'',g4c:'',dozensOnHand:'',comments:''};
  const [eForm, setEForm] = useState(EMPTY_E);

  // CRITICAL: load from Supabase only — props are empty on mobile (no auth)
  const broilerGroups = (broilerGroupsFromDb.length>0 && broilerGroupsFromDb) || (loadedConfig?.broilerGroups?.length>0 && loadedConfig.broilerGroups) || [];
  // Auto-derived layer dropdown — replaces hand-maintained cfg.layerGroups.
  // Rule: show batch NAME for active batches without housings yet (pre-housing phase),
  // plus all currently-active housing NAMES.
  // Falls back to legacy cfg.layerGroups if the new tables haven't loaded yet.
  const layerGroupNames = (()=>{
    const ab = (layerBatches||[]).filter(b=>b.status==='active');
    const ah = (layerHousings||[]).filter(h=>h.status==='active');
    if(ab.length===0 && ah.length===0){
      return (loadedConfig?.layerGroups?.filter(g=>g.status==='active').map(g=>g.name||g)||[]);
    }
    const housingNames = ah.map(h=>h.housing_name);
    const batchesWithoutHousing = ab.filter(b=>!ah.some(h=>h.batch_id===b.id));
    return [...batchesWithoutHousing.map(b=>b.name), ...housingNames];
  })();
  // Lookup helper: resolve batch_label → batch_id at submit time so historical
  // attribution stays correct even if a housing gets reassigned later.
  function resolveBatchId(label){
    if(!label) return null;
    const t = String(label).toLowerCase().trim();
    const byBatch = (layerBatches||[]).find(b=>String(b.name||'').toLowerCase().trim()===t);
    if(byBatch) return byBatch.id;
    const byHousing = (layerHousings||[]).find(h=>String(h.housing_name||'').toLowerCase().trim()===t);
    return byHousing?.batch_id || null;
  }
  const loadedTeamMembers = loadedConfig?.teamMembers || [];
  // Per-form team members from admin config, fallback to global list
  const cfg = loadedConfig || webformsConfig || {};
  const getFormTeamMembers = (formId) => {
    const wf = (cfg.webforms||[]).find(w=>w.id===formId);
    const perForm = wf?.teamMembers||[];
    // CRITICAL: wfTeamMembers prop is empty on mobile — use DB-loaded loadedTeamMembers
    const fallback = loadedTeamMembers.length>0 ? loadedTeamMembers : (wfTeamMembers||[]);
    return perForm.length>0 ? perForm : fallback;
  };
  const isEnabled = (formId, fieldId) => {
    const wf = (cfg.webforms||[]).find(w=>w.id===formId);
    if(!wf) return true;
    const allFields = (wf.sections||[]).flatMap(s=>s.fields||[]);
    const f = allFields.find(f=>f.id===fieldId);
    return f ? f.enabled!==false : true;
  };
  const isRequired = (formId, fieldId) => {
    const wf = (cfg.webforms||[]).find(w=>w.id===formId);
    if(!wf) return false;
    const allFields = (wf.sections||[]).flatMap(s=>s.fields||[]);
    const f = allFields.find(f=>f.id===fieldId);
    return f ? f.required===true : false;
  };
  const reqStar = (formId, fieldId) => isRequired(formId,fieldId)
    ? React.createElement('span',{style:{color:'#dc2626',marginLeft:2}},'*')
    : null;
  const teamMembers = wfTeamMembers || [];
  // Extra group sections for Add Group feature (array of {batchLabel})
  const [extraBroilerGroups, setExtraBroilerGroups] = useState([]);
  const [extraLayerGroups, setExtraLayerGroups] = useState([]);
  const [extraPigGroups, setExtraPigGroups] = useState([]);
  const allowAddGroup = (formId) => {
    // Check webform_settings key first (most up-to-date from admin panel)
    if(wfSettings?.allowAddGroup && formId in wfSettings.allowAddGroup) {
      return wfSettings.allowAddGroup[formId]===true;
    }
    // Fall back to full_config webforms array
    const wf = (cfg.webforms||[]).find(w=>w.id===formId);
    return wf?.allowAddGroup===true;
  };

  const inputStyle = {fontFamily:'inherit',fontSize:14,padding:'10px 12px',border:'1px solid #d1d5db',borderRadius:8,width:'100%',outline:'none',background:'white',color:'#111827',boxSizing:'border-box'};
  const labelStyle = {display:'block',fontSize:13,color:'#374151',marginBottom:5,fontWeight:500};
  const sectionStyle = {background:'white',borderRadius:12,padding:'16px',marginBottom:12,boxShadow:'0 1px 3px rgba(0,0,0,.08)'};
  const YN = ({val,onChange}) => (
    <div style={{display:'flex',borderRadius:8,overflow:'hidden',border:'1px solid #d1d5db'}}>
      {[{v:true,l:'Yes'},{v:false,l:'No'}].map(({v,l})=>(
        <button key={l} type="button" onClick={()=>onChange(v)} style={{flex:1,padding:'10px 0',border:'none',fontFamily:'inherit',fontSize:13,fontWeight:500,cursor:'pointer',background:val===v?(v?'#085041':'#374151'):'white',color:val===v?'white':'#6b7280'}}>
          {l}
        </button>
      ))}
    </div>
  );
  const Toggle = ({opts,val,onChange}) => (
    <div style={{display:'flex',borderRadius:8,overflow:'hidden',border:'1px solid #d1d5db'}}>
      {opts.map((o,i)=>(
        <React.Fragment key={o}>
          {i>0&&<div style={{width:1,background:'#d1d5db',flexShrink:0}}/>}
          <button type="button" onClick={()=>onChange(val===o?'':o)} style={{flex:1,padding:'9px 0',border:'none',fontFamily:'inherit',fontSize:12,fontWeight:500,cursor:'pointer',background:val===o?'#085041':'white',color:val===o?'white':'#6b7280'}}>
            {o}
          </button>
        </React.Fragment>
      ))}
    </div>
  );

  // Validate that all required fields (from admin config) have values.
  // Returns an error message string if a required field is missing, or null if all good.
  // formId = 'broiler-dailys' / 'layer-dailys' / 'pig-dailys' / 'egg-dailys'
  // formValues = an object mapping fieldId → current value from the relevant form state
  function validateRequiredFields(formId, formValues){
    const wf = (cfg.webforms||[]).find(w=>w.id===formId);
    if(!wf) return null;
    const allFields = (wf.sections||[]).flatMap(s=>s.fields||[]);
    const required = allFields.filter(f=>f.required===true && f.enabled!==false);
    for(const f of required){
      const v = formValues[f.id];
      // Empty string, null, undefined → missing. Boolean false IS valid (e.g. "Group moved? No").
      const missing = (v===''||v==null||(typeof v==='string'&&v.trim()===''));
      if(missing){
        return (f.label||f.id)+' is required.';
      }
    }
    return null;
  }

  async function submitBroiler(){
    // Hardcoded system field check (always required regardless of config)
    if(!bForm.date||!bForm.teamMember||!bForm.batchLabel){setErr('Please fill in all required fields.');return;}
    // Config-driven required field check
    const valuesByFieldId = {
      date: bForm.date, team_member: bForm.teamMember, batch_label: bForm.batchLabel,
      feed_type: bForm.feedType, feed_lbs: bForm.feedLbs, grit_lbs: bForm.gritLbs,
      group_moved: bForm.groupMoved, waterer_checked: bForm.watererChecked,
      mortality_count: bForm.mortalityCount, mortality_reason: bForm.mortalityReason,
      comments: bForm.comments,
    };
    const reqErr = validateRequiredFields('broiler-dailys', valuesByFieldId);
    if(reqErr){setErr(reqErr);return;}
    // Conditional rule: feed_type is required when feed_lbs > 0 (main + each extra group)
    if(parseFloat(bForm.feedLbs)>0 && !bForm.feedType){setErr('Feed Type is required when Feed (lbs) is entered.');return;}
    for(const eg of extraBroilerGroups.filter(g=>g.batchLabel)){
      if(parseFloat(eg.feedLbs)>0 && !eg.feedType){setErr('Feed Type is required for '+eg.batchLabel+' when Feed (lbs) is entered.');return;}
    }
    setErr('');setSubmitting(true);
    localStorage.setItem('wcf_team',bForm.teamMember);
    const rec={id:String(Date.now())+Math.random().toString(36).slice(2,6),submitted_at:new Date().toISOString(),date:bForm.date,team_member:bForm.teamMember,batch_label:bForm.batchLabel,feed_type:bForm.feedType,feed_lbs:bForm.feedLbs!==''?parseFloat(bForm.feedLbs):null,grit_lbs:bForm.gritLbs!==''?parseFloat(bForm.gritLbs):null,group_moved:bForm.groupMoved,waterer_checked:bForm.watererChecked,mortality_count:bForm.mortalityCount!==''?parseInt(bForm.mortalityCount):0,mortality_reason:bForm.mortalityReason||null,comments:bForm.comments||null};
    const recs = [rec, ...extraBroilerGroups.filter(g=>g.batchLabel).map(g=>({...rec,id:String(Date.now()+Math.random())+Math.random().toString(36).slice(2,6),batch_label:g.batchLabel,feed_type:g.feedType||null,feed_lbs:g.feedLbs!==''?parseFloat(g.feedLbs):null,grit_lbs:g.gritLbs!==''?parseFloat(g.gritLbs):null,group_moved:g.groupMoved!==false,waterer_checked:g.watererChecked!==false,mortality_count:g.mortalityCount!==''?parseInt(g.mortalityCount):0,mortality_reason:g.mortalityReason||null,comments:g.comments||null}))];
    const{error}=await sb.from('poultry_dailys').insert(recs.length===1?recs[0]:recs);
    setSubmitting(false);
    if(error){setErr('Could not save: '+error.message);return;}
    // Check starter feed threshold for each STARTER record submitted (fire-and-forget)
    recs.filter(r=>r.feed_type==='STARTER'&&parseFloat(r.feed_lbs)>0).forEach(r=>{
      wcfSendEmail('starter_feed_check',{batch_label:r.batch_label,feed_lbs:r.feed_lbs});
    });
    setLastGroup(bForm.batchLabel);setExtraBroilerGroups([]);setDone(true);
  }
  async function submitLayer(){
    if(!lForm.date||!lForm.teamMember||!lForm.batchLabel){setErr('Please fill in all required fields.');return;}
    const valuesByFieldId = {
      date: lForm.date, team_member: lForm.teamMember, batch_label: lForm.batchLabel,
      feed_type: lForm.feedType, feed_lbs: lForm.feedLbs, grit_lbs: lForm.gritLbs,
      layer_count: lForm.layerCount,
      group_moved: lForm.groupMoved, waterer_checked: lForm.watererChecked,
      mortality_count: lForm.mortalityCount, mortality_reason: lForm.mortalityReason,
      comments: lForm.comments,
    };
    const reqErr = validateRequiredFields('layer-dailys', valuesByFieldId);
    if(reqErr){setErr(reqErr);return;}

const FeedCostsPanel = ({feedCosts, saveFeedCosts}) => {
  const {useState, useEffect} = React;
  const [local, setLocal] = useState({starter:0,grower:0,layer:0,pig:0,grit:0,...feedCosts});
  const [saved, setSaved] = useState(false);

  useEffect(()=>{ setLocal({starter:0,grower:0,layer:0,pig:0,grit:0,...feedCosts}); },[feedCosts.starter,feedCosts.grower,feedCosts.layer,feedCosts.pig,feedCosts.grit]);

  async function doSave(){
    await saveFeedCosts(local);
    setSaved(true); setTimeout(()=>setSaved(false),2500);
  }

  const inpS={fontSize:13,padding:"7px 10px",border:"1px solid #d1d5db",borderRadius:6,fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
  const fields = [
    {key:'starter', label:'Poultry Starter', icon:'\ud83d\udc14', color:'#1e3a5f'},
    {key:'grower',  label:'Poultry Grower',  icon:'\ud83d\udc14', color:'#085041'},
    {key:'layer',   label:'Layer Feed',      icon:'\ud83d\udc13', color:'#b45309'},
    {key:'pig',     label:'Pig Feed',        icon:'\ud83d\udc37', color:'#7c3aed'},
    {key:'grit',    label:'Grit',            icon:'\ud83c\udf3e', color:'#78350f'},
  ];

  return (
    <div style={{marginTop:8}}>
      <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:10,padding:"20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#111827",marginBottom:2}}>Feed Costs</div>
            <div style={{fontSize:12,color:"#6b7280"}}>Set the cost per pound for each feed type. Active batches update automatically. Retired and processed batches keep their locked price.</div>
          </div>
        </div>
        <div style={{height:1,background:"#e5e7eb",margin:"14px 0"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:18}}>
          {fields.map(({key,label,icon,color})=>(
            <div key={key}>
              <label style={{fontSize:12,fontWeight:600,color,display:"block",marginBottom:5}}>{icon+' '+label}</label>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13,color:"#6b7280"}}>$</span>
                <input type="number" min="0" step="0.001" value={local[key]||''} onChange={e=>setLocal(c=>({...c,[key]:e.target.value}))} placeholder="0.000" style={inpS}/>
                <span style={{fontSize:12,color:"#9ca3af",whiteSpace:"nowrap"}}>/lb</span>
              </div>
              {local[key]>0&&<div style={{fontSize:11,color:"#6b7280",marginTop:3}}>${(local[key]*100).toFixed(2)} per 100 lbs</div>}
            </div>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={doSave} style={{padding:"9px 24px",borderRadius:7,border:"none",background:"#085041",color:"white",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
            {saved?'\u2713 Saved!':'Save Feed Costs'}
          </button>
          {saved&&<span style={{fontSize:12,color:"#065f46",fontWeight:500}}>Active batches updated.</span>}
        </div>
        <div style={{marginTop:16,padding:"10px 14px",background:"#f9fafb",borderRadius:8,fontSize:12,color:"#6b7280"}}>
          <strong style={{color:"#374151"}}>Current prices:</strong>{' '}
          {fields.map(({key,label})=>label+': $'+(feedCosts[key]||0).toFixed(3)+'/lb').join(' \u00b7 ')}
        </div>
      </div>

    </div>
  );
};

        <div style={{fontSize:13,color:'#4b5563',marginBottom:16}}>{msg}</div>
        <div style={{fontSize:12,color:'#6b7280',marginBottom:6}}>Type <strong>delete</strong> to confirm:</div>
        <input autoFocus value={typed} onChange={e=>setTyped(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter'&&ready){onConfirm();onCancel();} if(e.key==='Escape')onCancel(); }}
          placeholder="delete"
          style={{width:'100%',padding:'8px 12px',border:'1px solid #d1d5db',borderRadius:7,fontSize:13,fontFamily:'inherit',marginBottom:16,boxSizing:'border-box',outline:'none'}}/>

            style={{padding:'8px 18px',borderRadius:7,border:'none',background:ready?'#b91c1c':'#f3f4f6',color:ready?'white':'#9ca3af',fontSize:13,fontWeight:600,cursor:ready?'pointer':'default',fontFamily:'inherit'}}>
            Delete
          </button>
        </div>
      </div>
    </div>
  );
};

  async function refreshDailys(kind){
    const want = (k)=> kind==='all'||kind===k;
    if(want('broiler')){
      let all=[],from=0;
      while(true){
        const{data}=await sb.from('poultry_dailys').select('*').order('date',{ascending:false}).order('submitted_at',{ascending:false}).range(from,from+999);

  useEffect(()=>{ if(view && !VALID_VIEWS.includes(view)) setView('home'); }, [view]);

  useEffect(()=>{

    sb.auth.getUser().then(async ({data:{user}, error})=>{
      clearTimeout(authTimeout);

      else { setAuthState(false); }
    }).catch(()=>{ clearTimeout(authTimeout); setAuthState(false); });

    const {data:{subscription}} = sb.auth.onAuthStateChange(async (event, session)=>{
      if(event==='SIGNED_OUT'){
        setAuthState(false); setDataLoaded(false);
      }
      // Handle SIGNED_IN only when on login screen (authState===false), not on page-load token refresh
      if(event==='SIGNED_IN' && session?.user){
        setAuthState(prev=>{
          if(prev===false) loadUser(session.user);
          return prev;
        });
      }
    });
    return ()=>{ subscription.unsubscribe(); clearTimeout(authTimeout); };
  },[]);

  async function loadUser(user){
    try {
      // Race the profile fetch against a 5s timeout
      const profilePromise = sb.from('profiles').select('*').eq('id',user.id).single();
      const timeoutPromise = new Promise((_,reject) => setTimeout(()=>reject(new Error('timeout')), 5000));
      const {data:profile} = await Promise.race([profilePromise, timeoutPromise]).catch(()=>({data:null}));
      setAuthState({user, role:profile?.role||'farm_team', profile, name:profile?.full_name||user.email});
      await loadAllData();
    } catch(e) {
      console.error('loadUser error:', e);
      setAuthState({user, role:'admin', name:user.email});
      setDataLoaded(true);
    }

  async function loadAllData(){

    const {data,error} = await sb.from('app_store').select('*');

      const store={};

      if(store['ppp-feed-costs-v1']) setFeedCosts({starter:0,grower:0,layer:0,pig:0,grit:0,...store['ppp-feed-costs-v1']});
      if(store['ppp-archived-sows-v1']) setArchivedSows(store['ppp-archived-sows-v1']||[]);
      if(store['ppp-breeders-v1']) setBreeders(store['ppp-breeders-v1'].length>0?store['ppp-breeders-v1']:INITIAL_BREEDERS); else setBreeders(INITIAL_BREEDERS);
      if(store['ppp-breed-options-v1']) setBreedOptions(store['ppp-breed-options-v1']);
      if(store['ppp-origin-options-v1']) setOriginOptions(store['ppp-origin-options-v1']);
      if(store['ppp-pigs-v1']) setPigData(store['ppp-pigs-v1']);
      if(store['ppp-webforms-v1']){
        setWebformsConfig(store['ppp-webforms-v1']);
        // Per-form team members for logged-in users
        const allMembers=[...new Set((store['ppp-webforms-v1'].webforms||[]).flatMap(w=>w.teamMembers||[]))].sort();
        if(allMembers.length>0) setWfTeamMembers(allMembers);
      }
      if(store['ppp-layer-groups-v1']) setLayerGroups(store['ppp-layer-groups-v1']);
      if(store['ppp-missed-cleared-v1']) setMissedCleared(new Set(store['ppp-missed-cleared-v1']||[]));
      if(store['ppp-broiler-notes-v1']) setBroilerNotes(store['ppp-broiler-notes-v1']||'');
      if(store['ppp-pig-notes-v1'])     setPigNotes(store['ppp-pig-notes-v1']||'');
      if(store['ppp-layer-notes-v1'])   setLayerNotes(store['ppp-layer-notes-v1']||'');
      // Load layer batches and housings from dedicated tables
      sb.from('layer_batches').select('*').order('name').then(({data})=>{if(data)setLayerBatches(data);});
      sb.from('layer_housings').select('*').order('start_date').then(({data})=>{if(data)setLayerHousings(data);});
      // Sync webform config for farm team access
      setTimeout(()=>syncWebformConfig(store['ppp-webforms-v1']||null, store['ppp-feeders-v1']||null, store['ppp-v4']||[], store['ppp-layer-groups-v1']||[]), 2000);
      // Sync webform_config with direct data to avoid stale closure
      // Sync broiler groups to webform_config for anon webform access
      const activeBroilerGroups = (store['ppp-v4']||[])
        .filter(b=>b.status!=='archived'&&b.status!=='processed')
        .map(b=>b.name);
      sb.from('webform_config').upsert({key:'broiler_groups',data:activeBroilerGroups},{onConflict:'key'}).then(()=>{});
      setTimeout(()=>syncWebformConfig(
        store['ppp-webforms-v1']||null,
        store['ppp-feeders-v1']||null,
        store['ppp-v4']||[],
        store['ppp-layer-groups-v1']||[]
      ), 1000);
    } else if(!error){
      // No data yet - init farrowing with historical records
      setFarrowingRecs(INITIAL_FARROWING);

    // Load broiler dailys from poultry_dailys table (same query pattern as BroilerDailysView)

  async function saveFeedCosts(costs){
    setFeedCosts(costs);
    await sbSave('ppp-feed-costs-v1', costs);
    // Update only ACTIVE broiler batches with new costs.
    // - Planned: stay blank until status flips to active (handled in upd() / status change path)
    // - Processed: never touched (preserves historical rates at time of processing)
    const activeBroiler = batches.filter(b=>b.status==='active');
    if(activeBroiler.length>0){
      const updated = batches.map(b=>{
        if(b.status!=='active') return b;
        return {...b,
          perLbStarterCost:costs.starter,
          perLbStandardCost:costs.grower,
          perLbGritCost:costs.grit||0,
        };
      });
      setBatches(updated);
      sbSave('ppp-v4', updated);
    }
    // Update active pig batches
    const activeF = feederGroups.filter(g=>g.status==='active');
    if(activeF.length>0){
      const updatedF = feederGroups.map(g=>g.status!=='active'?g:{...g,perLbFeedCost:costs.pig});
      setFeederGroups(updatedF);
      sbSave('ppp-feeders-v1', updatedF);
    }
    // Update active layer groups (legacy old system)
    const activeLG = layerGroups.filter(g=>g.status==='active');
    if(activeLG.length>0){
      const updatedLG = layerGroups.map(g=>g.status!=='active'?g:{...g,perLbFeedCost:costs.layer});
      persistLayerGroups(updatedLG);
    }
    // Update active layer batches (new system) — push 3 frozen rates
    // Skip the Retirement Home pseudo-batch
    const activeLBs = (layerBatches||[]).filter(b=>b.status==='active'&&b.name!=='Retirement Home');
    if(activeLBs.length>0){
      const updatedLB = await Promise.all(activeLBs.map(async (b)=>{
        const upd = {
          per_lb_starter_cost: costs.starter,
          per_lb_grower_cost:  costs.grower,
          per_lb_layer_cost:   costs.layer,
        };
        await sb.from('layer_batches').update(upd).eq('id', b.id);
        return {...b, ...upd};
      }));
      // Merge updates back into local state
      setLayerBatches(prev => prev.map(b => {
        const u = updatedLB.find(x => x.id === b.id);
        return u ? u : b;
      }));
    }
  }

  async function sbSave(key, value){
    setSaveStatus('saving');
    let lastError = null;
    for(let attempt = 1; attempt <= 3; attempt++){
      try {
        const savePromise = sb.from('app_store').upsert(
          {key, data:value, updated_at:new Date().toISOString()},
          {onConflict:'key'}
        );
        const timeoutPromise = new Promise((_,reject) => setTimeout(()=>reject(new Error('timeout')), 8000));
        const {error} = await Promise.race([savePromise, timeoutPromise]);
        if(error) throw error;
        setSaveStatus('saved');
        setTimeout(()=>setSaveStatus(''), 2500);
        return; // success
      } catch(e) {
        lastError = e;
        console.warn(`sbSave attempt ${attempt} failed for key ${key}:`, e.message);
        if(attempt < 3) await new Promise(r=>setTimeout(r, 1000 * attempt)); // wait before retry
      }
    }
    // All 3 attempts failed
    console.error('sbSave failed after 3 attempts:', lastError);
    setSaveStatus('error');
    setTimeout(()=>setSaveStatus(''), 4000);
  }

  async function syncWebformConfig(wfConfig, feeders, batchData, lgData, lhData){
    try {
      const cfg = wfConfig || webformsConfig;
      const fgs = feeders || feederGroups;
      const pigGroups = [
        'SOWS', 'BOARS',
        ...fgs.flatMap(g=>
          (g.subBatches&&g.subBatches.length>0)
            ? g.subBatches.filter(s=>s.status==='active').map(s=>s.name)
            : g.status==='active' ? [g.batchName] : []
        )
      ];
      // Per-form team members - push each form's list separately
      const allTeamMembers = [...new Set((cfg.webforms||[]).flatMap(wf=>wf.teamMembers||[]))].sort();
      const perFormTeamMembers = {};
      (cfg.webforms||[]).forEach(wf=>{ perFormTeamMembers[wf.id]=wf.teamMembers||[]; });
      // Use explicit batchData param to avoid stale closure — batches state may not be set yet
      const batchList = batchData || batches || [];
      const broilerGroupList = batchList.filter(b=>b.status==='active').map(b=>b.name);
      // Use explicit lgData param to avoid stale closure
      const lgList = lgData || layerGroups || [];
      // Layer batch names only appear on webform when the batch has NO active housings yet
      // (i.e. still in brooder/schooner phase). Once housings are active, the housing
      // names (already in lgList as layer groups) are the correct webform options.
      const activeLbNames = (layerBatches||[])
        .filter(b=>{
          if(b.status!=='active'||b.name==='Retirement Home') return false;
          const housings = lhData || layerHousings || [];
          const hasActiveHousing=housings.some(h=>h.batch_id===b.id&&h.status==='active');
          return !hasActiveHousing;
        })
        .map(b=>({id:b.id,name:b.name,status:'active'}));
      const lgListWithBatches = [...lgList, ...activeLbNames.filter(lb=>!lgList.find(g=>g.name===lb.name))];
      // allowAddGroup per form
      const allowAddGroup = {};
      (cfg.webforms||[]).forEach(wf=>{ allowAddGroup[wf.id] = !!wf.allowAddGroup; });
      await Promise.all([
        sb.from('webform_config').upsert({key:'team_members', data:allTeamMembers},{onConflict:'key'}),
        sb.from('webform_config').upsert({key:'per_form_team_members', data:perFormTeamMembers},{onConflict:'key'}),
        sb.from('webform_config').upsert({key:'active_groups', data:pigGroups},{onConflict:'key'}),
        sb.from('webform_config').upsert({key:'broiler_groups', data:broilerGroupList},{onConflict:'key'}),
        sb.from('webform_config').upsert({key:'webform_settings', data:{allowAddGroup}},{onConflict:'key'}),
        // Push housing→batch mapping for webform info display
        sb.from('webform_config').upsert({key:'housing_batch_map', data:Object.fromEntries(
          (lhData||layerHousings||[]).filter(h=>h.status==='active').map(h=>{
            const b=(layerBatches||[]).find(lb=>lb.id===h.batch_id);
            return [h.housing_name, b?b.name:null];
          }).filter(([,v])=>v)
        )},{onConflict:'key'}),
        // Push full form config for anon access — include layer batch names as selectable groups
        sb.from('webform_config').upsert({key:'full_config', data:{webforms:cfg.webforms,teamMembers:cfg.teamMembers,broilerGroups:broilerGroupList,layerGroups:lgListWithBatches}},{onConflict:'key'}),
      ]);
    } catch(e){ console.warn('syncWebformConfig error:', e.message); }
  }

  function restoreData(e){
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.batches) throw new Error("Invalid backup file");
        if(!window.confirm(`Restore backup dated ${data.exported?.split("T")[0]}? This will replace current data for ALL users.`)) return;
        setBatches(data.batches); sbSave('ppp-v4', data.batches);
        if(data.pigData){ setPigData(data.pigData); sbSave('ppp-pigs-v1', data.pigData); }
        if(data.breedingCycles){ setBreedingCycles(data.breedingCycles); sbSave('ppp-breeding-v1', data.breedingCycles); }
        if(data.farrowingRecs){ setFarrowingRecs(data.farrowingRecs); sbSave('ppp-farrowing-v1', data.farrowingRecs); }
        if(data.boarNames){ setBoarNames(data.boarNames); sbSave('ppp-boars-v1', data.boarNames); }
        if(data.feederGroups){ setFeederGroups(data.feederGroups); sbSave('ppp-feeders-v1', data.feederGroups); }
        setTimeout(()=>alert("Restore complete! Data saved to cloud."), 2000);
      }catch(err){ alert("Could not read backup file. Make sure it's a valid Farm Planner backup."); }
    };
    reader.readAsText(file);
    e.target.value="";
  }

  // Form field update
  function upd(k,v){
    const f={...form,[k]:v};
    if(k==="breed"){
      // Hatchery is decoupled from breed — any hatchery can supply any breed now.
      // (Previously locked WR to Freedom Ranger Hatchery; that's no longer enforced.)
    }
    if(k==="schooner") f.birdCount=v==="1"?650:750;
    // When hatchDate changes, default brooderIn to hatchDate + 1 if blank
    // (user can still manually override)
    if(k==="hatchDate" && v && (!f.brooderIn || f.brooderIn==="")){
      try {
        f.brooderIn = toISO(addDays(new Date(v+'T12:00:00'), 1));
      } catch(e) { /* ignore parse errors */ }
    }
    setForm(f);
    try {
      setConflicts(detectConflicts(f, batches, layerBatches, editId));
    } catch(e) {
      console.warn('detectConflicts failed on field change:', e);
      setConflicts([]);
    }
    setOverride(false);
    // Debounced auto-save: 1.5s after last keystroke
    if(editId){
      clearTimeout(autoSaveTimer.current);
      autoSaveTimer.current = setTimeout(()=>{
        const tl=calcTimeline(f.hatchDate, f.breed, f.processingDate);
        // Parse numeric form fields back to numbers before persisting (form state holds raw strings during typing)
        const numFields = ['birdCount','birdCountActual','brooderFeedLbs','schoonerFeedLbs','gritLbs','mortalityCumulative','week4Lbs','week6Lbs','perLbStandardCost','perLbStarterCost','perLbGritCost','totalToProcessor','processingCost','avgBreastLbs','avgThighsLbs','avgDressedLbs','totalLbsWhole','totalLbsCuts'];
        const fNum = {...f};
        for(const k of numFields){
          const v = fNum[k];
          fNum[k] = (v===''||v==null) ? 0 : (parseFloat(v)||0);
        }
        const computedStatus = calcPoultryStatus({...fNum,...tl});
        // When a batch is active and has no rates yet (e.g. just transitioned from planned),
        // stamp the current global admin feed cost rates onto it.
        if(computedStatus==='active' && (!fNum.perLbStarterCost || !fNum.perLbStandardCost)){
          fNum.perLbStarterCost  = feedCosts.starter || 0;
          fNum.perLbStandardCost = feedCosts.grower  || 0;
          fNum.perLbGritCost     = feedCosts.grit    || 0;
        }
        const batch={id:editId, ...fNum, ...tl, status:computedStatus};
        const nb=batches.map(b=>b.id===editId?batch:b);
        nb.sort((a,b)=>(a.hatchDate||'').localeCompare(b.hatchDate||''));
        setBatches(nb); persist(nb);
        setOriginalForm(f);
      }, 1500);
    }
  }

  async function parseProcessorXlsx(file) {
    try {
      // Lazy-load SheetJS on first use (saves ~900KB on every page load for users who don't import xlsx)
      if(typeof XLSX === 'undefined'){
        try { await window._wcfLoadXLSX(); }
        catch(e){ alert('Could not load Excel parser. Check your internet connection and try again.'); return; }
      }
      const buf = await file.arrayBuffer();
      const wb2 = XLSX.read(buf, {type:'array', cellDates:false});
      let parsed = null;

      for(const sheetName of wb2.SheetNames) {
        const ws = wb2.Sheets[sheetName];
        if(!ws || !ws['!ref']) continue;

        // Build a cell value map: address -> value
        const cv = {};
        Object.keys(ws).forEach(addr => {
          if(addr[0]==='!') return;
          cv[addr] = ws[addr].v;
        });

        // Find header row: look for a cell with "Row Labels"
        let labelCol=-1, totalWtCol=-1, countCol=-1, avgWtCol=-1, hRow=-1;
        const range = XLSX.utils.decode_range(ws['!ref']);
        for(let r=range.s.r; r<=Math.min(range.s.r+5, range.e.r); r++){
          for(let c=range.s.c; c<=range.e.c; c++){
            const addr=XLSX.utils.encode_cell({r,c});
            const v=String(cv[addr]||'').trim().toLowerCase();
            if(v==='row labels'){ labelCol=c; hRow=r; }
            if(hRow===r && v==='total weight') totalWtCol=c;
            if(hRow===r && v==='count of packages') countCol=c;
            if(hRow===r && v==='average weight') avgWtCol=c;
          }
          if(labelCol>=0 && avgWtCol>=0) break;
        }
        if(labelCol<0 || avgWtCol<0) continue;

        parsed={fileName:file.name};
        const excluded=['neck','feet','back','wing','grand total'];

        // Read each data row in the pivot
        for(let r=hRow+1; r<=range.e.r; r++){
          const labelAddr=XLSX.utils.encode_cell({r,c:labelCol});
          const labelVal=cv[labelAddr];
          if(!labelVal) continue;
          const label=String(labelVal).trim().toLowerCase();
          if(!label) continue;

          // Read values relative to label column position (label=col0, totalWt=+1, count=+2, avgWt=+3)
          const avgWt=parseFloat(cv[XLSX.utils.encode_cell({r,c:labelCol+3})]);
          const totalWt=parseFloat(cv[XLSX.utils.encode_cell({r,c:labelCol+1})]);
          const count=parseInt(cv[XLSX.utils.encode_cell({r,c:labelCol+2})]);

          if(label==='whole chicken'||label==='whole chicken '||label.includes('whole chicken')){
            if(!isNaN(avgWt)&&avgWt>0) parsed.avgDressed=Math.round(avgWt*100)/100;
            if(!isNaN(totalWt)&&totalWt>0) parsed.totalLbsWhole=Math.round(totalWt*10)/10;
          }
          if(label.includes('breast')&&!isNaN(avgWt)) parsed.avgBreast=Math.round(avgWt*100)/100;
          if(label.includes('thigh')&&!isNaN(avgWt)) parsed.avgThigh=Math.round(avgWt*100)/100;
          if(label!=='grand total'&&!excluded.some(e=>label.includes(e))&&!label.includes('whole chicken')&&!isNaN(totalWt)&&totalWt>0){
            parsed._cuts=(parsed._cuts||0)+totalWt;
          }
        }
        if(parsed._cuts>0){ parsed.totalLbsCuts=Math.round(parsed._cuts*10)/10; }
        delete parsed._cuts;
        if(Object.keys(parsed).length>1) break;
      }
      if(parsed&&Object.keys(parsed).length>1) setParsedProcessor(parsed);
    } catch(e){ console.warn('Processor parse error:',e.message); }
  }

  function closeForm(){

  function submit(force){
    if(!form.name.trim()){ alert("Please enter a batch name."); return; }
    // Block on hard conflicts unless force=true. Soft (layer) conflicts always pass.
    const hardConflicts=(conflicts||[]).filter(c=>!c.soft);
    if(hardConflicts.length>0&&!force){
      alert('There are scheduling conflicts. Use the Override & Save Anyway button if you really want to save.');
      return;
    }
    const tl=calcTimeline(form.hatchDate, form.breed, form.processingDate);
    // Parse numeric form fields back to numbers (form state holds raw strings during typing)
    const numFields = ['birdCount','birdCountActual','brooderFeedLbs','schoonerFeedLbs','gritLbs','mortalityCumulative','week4Lbs','week6Lbs','perLbStandardCost','perLbStarterCost','perLbGritCost','totalToProcessor','processingCost','avgBreastLbs','avgThighsLbs','avgDressedLbs','totalLbsWhole','totalLbsCuts'];
    const formNum = {...form};
    for(const k of numFields){
      const v = formNum[k];
      formNum[k] = (v===''||v==null) ? 0 : (parseFloat(v)||0);
    }
    const computedStatus = calcPoultryStatus({...formNum,...tl});
    // When a batch is active and has no rates yet (e.g. just transitioned from planned),
    // stamp the current global admin feed cost rates onto it.
    if(computedStatus==='active' && (!formNum.perLbStarterCost || !formNum.perLbStandardCost)){
      formNum.perLbStarterCost  = feedCosts.starter || 0;
      formNum.perLbStandardCost = feedCosts.grower  || 0;
      formNum.perLbGritCost     = feedCosts.grit    || 0;
    }
    const batch={id:editId||String(Date.now()), ...formNum, ...tl, status:computedStatus, conflictOverride:force&&hardConflicts.length>0?true:(form.conflictOverride||false)};
    const nb=editId
      ? batches.map(b=>b.id===editId?batch:b)
      : [...batches, batch];
    nb.sort((a,b)=>(a.hatchDate||'').localeCompare(b.hatchDate||''));
    setBatches(nb); persist(nb); setOriginalForm(null); setShowForm(false); setOverride(false);
  }

  function del(id){
    confirmDelete("Delete this batch? This cannot be undone.",()=>{
      const nb=batches.filter(b=>b.id!==id);

  }

  // Timeline helpers
  const tlS      = new Date(tlStart+"T12:00:00");
  const tlE      = addDays(tlS, WEEKS_SHOWN*7);
  const totalDays= WEEKS_SHOWN*7;
  function pct(iso){ return ((new Date(iso+"T12:00:00")-tlS)/86400000/totalDays)*100; }
  const wkHdrs   = Array.from({length:WEEKS_SHOWN},(_,i)=>addDays(tlS,i*7));

  // Derived
  const tl              = calcTimeline(form.hatchDate, form.breed, form.processingDate);
  const targetHatch     = calcTargetHatch(form.processingDate, form.breed);
  const hatchSuggestions= suggestHatchDates(targetHatch);
  const hatchWarn       = isNearHoliday(form.hatchDate);
  const procWarn        = form.processingDate && isNearHoliday(form.processingDate);
  // Hatcheries available in the dropdown — all hatcheries are now selectable for any breed.

  const hatcheries      = (form.status==='processed' && showLegacy)
                            ? [...ALL_HATCHERIES, '__SEP__', ...LEGACY_HATCHERIES]

  const counts          = STATUSES.reduce((a,s)=>({...a,[s]:batches.filter(b=>b.status===s).length}),{});

  // ── STYLES ──
  // S defined globally above App

  // ── HEADER ──
  const Header=()=>{

    const nb = (active) => ({

          {inPoultry&&<span style={{fontSize:11,fontWeight:500,color:"rgba(255,255,255,.6)",borderLeft:"1px solid rgba(255,255,255,.25)",paddingLeft:10,letterSpacing:.5}}>BROILERS</span>}
          {(['webforms'].includes(view))&&<span style={{fontSize:11,fontWeight:500,color:"rgba(255,255,255,.6)",borderLeft:"1px solid rgba(255,255,255,.25)",paddingLeft:10,letterSpacing:.5}}>ADMIN</span>}

          {inLayers&&<span style={{fontSize:11,fontWeight:500,color:"rgba(255,255,255,.6)",borderLeft:"1px solid rgba(255,255,255,.25)",paddingLeft:10,letterSpacing:.5}}>LAYERS</span>}

                <button onClick={()=>{backupData();setShowMenu(false);}}

          <button onClick={()=>{setShowForm(false);setShowBreedForm(false);setShowFarrowForm(false);setView("home");}} style={ghostBtn}>

          <div style={{width:1,height:20,background:"#e5e7eb",margin:"0 4px"}}/>
          {inPoultry&&[["broilerHome","Dashboard"],["timeline","Timeline"],["list","Batches"],["broilerdailys","Dailys"],["feed","Feed"]].map(([v,l])=>(
            <button key={v} style={nb(view===v&&!showForm)} onClick={()=>{setShowForm(false);setView(v);}}>{l}</button>

          {inPigs&&[["pigsHome","Dashboard"],["breeding","Timeline"],["farrowing","Farrowing"],["sows","Breeding Pigs"],["pigbatches","Batches"],["pigdailys","Dailys"],["pigs","Feed Calculator"]].map(([v,l])=>(

  // ── HOME DASHBOARD ──
  if(view==="home") {
    const today = new Date();
    const todayStr = todayISO();
    const in30 = toISO(addDays(today, 30));

    // Auto-status counts for poultry
    const activeBatches = batches.filter(b => calcPoultryStatus(b)==='active');
    const plannedBatches = batches.filter(b => calcPoultryStatus(b)==='planned');
    const processedBatches = batches.filter(b => calcPoultryStatus(b)==='processed');
    const birdsOnFarm = activeBatches.reduce((s,b)=>s+(parseInt(b.birdCountActual)||parseInt(b.birdCount)||0),0);
    const projectedBirds = activeBatches.reduce((s,b)=>{
      const stats = calcBroilerStatsFromDailys(b, broilerDailys);
      return s + stats.projectedBirds;
    }, 0);

    // What's happening in the next 30 days
    const weekEvents = [];

    // Poultry events
    batches.forEach(b=>{
      const live = calcTimeline(b.hatchDate, b.breed, b.processingDate);
      if(!live) return;
      if(live.brooderIn >= todayStr && live.brooderIn <= in30)
        weekEvents.push({type:'brooder-in', label:`${b.name} enters brooder`, date:live.brooderIn, color:'#065f46', icon:'🐣'});
      if(live.schoonerIn >= todayStr && live.schoonerIn <= in30)
        weekEvents.push({type:'schooner-in', label:`${b.name} moves to schooner`, date:live.schoonerIn, color:'#1e3a5f', icon:'🐔'});
      if(b.processingDate >= todayStr && b.processingDate <= in30)
        weekEvents.push({type:'processing', label:`${b.name} processing day`, date:b.processingDate, color:'#7f1d1d', icon:'📅'});
      // 4-week weight reminder
      if(b.hatchDate){
        const wk4date = toISO(addDays(new Date(b.hatchDate+'T12:00:00'), 28));
        if(wk4date >= todayStr && wk4date <= in30 && !(parseFloat(b.week4Lbs)>0))
          weekEvents.push({type:'wt-4wk', label:`${b.name} — record 4-week weights`, date:wk4date, color:'#0369a1', icon:'⚖️', reminder:true});
      }
      // 6-week weight reminder
      if(b.hatchDate){
        const wk6date = toISO(addDays(new Date(b.hatchDate+'T12:00:00'), 42));
        if(wk6date >= todayStr && wk6date <= in30 && !(parseFloat(b.week6Lbs)>0))
          weekEvents.push({type:'wt-6wk', label:`${b.name} — record 6-week weights`, date:wk6date, color:'#0369a1', icon:'⚖️', reminder:true});
      }
    });

    // Pig events
    breedingCycles.forEach(c=>{
      const tl = calcBreedingTimeline(c.exposureStart);
      if(!tl) return;
      if(tl.farrowingStart >= todayStr && tl.farrowingStart <= in30)
        weekEvents.push({type:'farrow-open', label:`Group ${c.group} farrowing window opens`, date:tl.farrowingStart, color:'#7c3aed', icon:'🐷'});
      if(tl.farrowingEnd >= todayStr && tl.farrowingEnd <= in30)
        weekEvents.push({type:'farrow-close', label:`Group ${c.group} farrowing window closes`, date:tl.farrowingEnd, color:'#be185d', icon:'🐷'});
      // Sows due in window
      if(tl.farrowingStart <= in30 && tl.farrowingEnd >= todayStr) {
        const expected = [...(c.boar1Tags||'').split(/[\n,]+/), ...(c.boar2Tags||'').split(/[\n,]+/)]
          .map(t=>t.trim()).filter(Boolean);
        const farrowed = new Set(farrowingRecs.filter(r=>r.group===c.group).map(r=>r.sow.trim()));
        const pending = expected.filter(t=>!farrowed.has(t));
        if(pending.length>0)
          weekEvents.push({type:'farrow-due', label:`${pending.length} sow${pending.length>1?'s':''} due to farrow (Group ${c.group})`, date:tl.farrowingStart, color:'#7c3aed', icon:'🌱'});

    // Pig batches hitting 6 months
    feederGroups.forEach(g=>{

      if(!cycle) return;
      const tl = calcBreedingTimeline(cycle.exposureStart);
      if(!tl) return;
      const farrowMid = new Date(tl.farrowingStart+"T12:00:00");
      const sixMonths = toISO(addDays(farrowMid, 183));
      if(sixMonths >= todayStr && sixMonths <= in30)
        weekEvents.push({type:'pig-age', label:`${g.batchName} hitting ~6 months`, date:sixMonths, color:'#92400e', icon:'🐖'});

    weekEvents.sort((a,b)=>a.date.localeCompare(b.date));

    // ── Missed daily reports — checks last 7 days, persists until cleared ──
    async function clearMissedEntry(key) {
      const newSet = new Set([...missedCleared, key]);

      sb.from('app_store').upsert({key:'ppp-missed-cleared-v1',data:[...newSet]},{onConflict:'key'}).then(()=>{});

      sb.from('app_store').upsert({key:'ppp-missed-cleared-v1',data:[...newSet]},{onConflict:'key'}).then(()=>{});

      feederGroups.filter(g=>g.status==='active').forEach(g=>{
        const activeSubs=(g.subBatches||[]).filter(s=>s.status==='active');
        if(activeSubs.length>0){
          activeSubs.forEach(s=>{
            const key=`${s.id}|${checkDate}`;
            if(!pigCheck.has((s.name||'').toLowerCase().trim())&&!missedCleared.has(key))

    }
    // Sort newest first
    allMissed.sort((a,b)=>b.date.localeCompare(a.date));
    const activeBroilerBatches2 = batches.filter(b=>calcPoultryStatus(b)==='active');
    const activePigBatches2     = feederGroups.filter(g=>g.status==='active');
    const activeLayerGroups2    = (layerGroups||[]).filter(g=>g.status==='active');

    // ── Admin weekly table data ──
    const fiveDaysAgo = toISO(addDays(new Date(), -5));
    const weekAgo = fiveDaysAgo; // used for admin daily tiles (5 days)
    const allRecentReports = [
      ...broilerDailys.filter(d=>d.date>=weekAgo).map(d=>({id:d.id,view:'broilerdailys',date:d.date,type:'🐔 Broiler',raw:d})),

    // Active pig breeding cycles
    const activeCycles = breedingCycles.filter(c=>calcCycleStatus(c)==='active');
    const totalSows = breedingCycles.reduce((s,c)=>s+(parseInt(c.sowCount)||0),0);

    // Performance trends
    // Pig farrowing survival per cycle (most recent 5)
    const cycleSurvival = breedingCycles.map(c=>{
      const tl = calcBreedingTimeline(c.exposureStart);
      if(!tl) return null;
      const recs = farrowingRecs.filter(r=>{
        if(r.group!==c.group||!r.farrowingDate) return false;
        const rd=new Date(r.farrowingDate+"T12:00:00");
        return rd>=new Date(tl.farrowingStart+"T12:00:00") && rd<=addDays(tl.farrowingEnd,14);

      if(recs.length===0) return null;
      const born=recs.reduce((s,r)=>s+(parseInt(r.totalBorn)||0),0);
      const dead=recs.reduce((s,r)=>s+(parseInt(r.deaths)||0),0);
      return {label:`G${c.group} ${fmtS(c.exposureStart)}`, survival:born>0?Math.round(((born-dead)/born)*100):0, recs:recs.length};

            {[
              {label:"Broilers", icon:"🐔", desc:`${activeBatches.length} active · ${birdsOnFarm.toLocaleString()} on farm \u2192 ${projectedBirds.toLocaleString()} projected · ${plannedBatches.length} planned`, view:"broilerHome", color:"#1e3a5f", bg:"#eff6ff"},
              {label:"Layers", icon:"🥚", desc:`${(layerGroups||[]).filter(g=>g.status==='active').length} active groups · ${(layerGroups||[]).filter(g=>g.status==='active').reduce((s,g)=>s+(g.currentCount||0),0)} hens`, view:"layersHome", color:"#b45309", bg:"#fffbeb"},
              {label:"Pigs", icon:"🐷", desc:`${activeCycles.length} active cycles · ${totalSows} sows tracked · ${feederGroups.filter(g=>g.status==="active").length} active batches`, view:"pigsHome", color:"#7c3aed", bg:"#f5f3ff"},
            ].map(c=>(
              <div key={c.view} onClick={()=>setView(c.view)}
                style={{background:c.bg,border:"1px solid #e5e7eb",borderRadius:14,padding:"20px 22px",cursor:"pointer",boxShadow:"0 2px 6px rgba(0,0,0,.06)",transition:"transform .1s",display:"flex",alignItems:"center",gap:16}}>
                <div style={{fontSize:36}}>{c.icon}</div>
                <div>
                  <div style={{fontSize:18,fontWeight:700,color:c.color,marginBottom:4}}>{c.label}</div>
