              const comment=d.comments&&String(d.comments).trim().length>2?String(d.comments).trim():'';
              const notable=hasMort||comment;
              const prevDate=i>0?filtered[i-1].date:null;
              const showDivider=prevDate&&prevDate!==d.date;
              const dateIdx=dates.indexOf(d.date);
              const shadeBg=dateIdx%2===0?'white':'#f8fafc';
              return (
                <React.Fragment key={d.id}>
                  {showDivider&&<div style={{height:2,background:'#9ca3af',margin:'6px 0',borderRadius:1}}/>}
                  <div onClick={()=>openEdit(d)} style={{
                    background:'white',borderRadius:8,cursor:'pointer',
                    border:notable?'1.5px solid #fca5a5':'1px solid #e5e7eb',

                  background:shadeBg}} className="hoverable-tile">
                    <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
                      <span style={{fontSize:12,color:'#6b7280',minWidth:88,flexShrink:0}}>{fmt(d.date)}</span>
                      <span style={{fontWeight:700,color:'#111827',minWidth:80,flexShrink:0,fontSize:13}}>{d.batch_label||'—'}</span>
                      <span style={{color:'#6b7280',minWidth:65,flexShrink:0,fontSize:12}}>{d.team_member||'—'}</span>
                      <span style={{color:hasFeed?'#92400e':'#9ca3af',fontWeight:hasFeed?600:400,fontSize:12,minWidth:100}}>{hasFeed?`🌾 ${parseFloat(d.feed_lbs).toLocaleString()} lbs`:'no feed'}{hasFeed&&d.feed_type&&<span style={{marginLeft:4,fontSize:10,fontWeight:700,padding:'1px 5px',borderRadius:4,background:d.feed_type==='STARTER'?'#dbeafe':'#d1fae5',color:d.feed_type==='STARTER'?'#1e40af':'#065f46'}}>{d.feed_type}</span>}</span>
                      <span style={{color:'#374151',fontSize:12,minWidth:80}}>{hasGrit?`grit ${parseFloat(d.grit_lbs)} lbs`:'no grit'}</span>
                      <span style={{color:hasMort?'#b91c1c':'#9ca3af',fontWeight:hasMort?700:400,fontSize:12,minWidth:80}}>{hasMort?`💀 ${d.mortality_count} mort.`:'no mort.'}</span>
                      <span style={{fontSize:11,color:d.group_moved===false?'#b91c1c':'#6b7280'}}>{d.group_moved===false?'⚠ not moved':'moved ✓'}</span>

                    </div>
                    {comment&&<div style={{fontSize:11,color:'#374151',paddingLeft:102,fontStyle:'italic'}}>{comment}</div>}

                </React.Fragment>
              );
            })})()}
          </div>
        )}
        {hasMore&&<div style={{textAlign:'center',padding:'0.5rem',fontSize:11,color:'#9ca3af'}}>Loading more records...</div>}
      </div>
      {showForm&&(
        <div onClick={()=>setShowForm(false)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.45)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'1rem',overflowY:'auto'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:12,width:'100%',maxWidth:480,boxShadow:'0 8px 32px rgba(0,0,0,.2)',marginTop:40}}>
            <div style={{padding:'14px 20px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'white'}}>

            </div>
            <div style={{padding:'16px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxHeight:'70vh',overflowY:'auto'}}>
              <div style={{gridColumn:'1/-1'}}><label style={S.label}>Date *</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
              <div style={{gridColumn:'1/-1'}}><label style={S.label}>Team Member</label><select value={form.teamMember} onChange={e=>setForm(f=>({...f,teamMember:e.target.value}))}><option value=''>Select...</option>{teamMembers.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
              <div style={{gridColumn:'1/-1'}}><label style={S.label}>Batch</label>
                <select value={form.batchLabel} onChange={e=>setForm(f=>({...f,batchLabel:e.target.value}))}>
                  <option value=''>Select batch...</option>
                  {batches.filter(b=>b.status==='active').map(b=><option key={b.name} value={b.name}>{b.name}</option>)}
                  {batchOpts.filter(b=>!batches.some(bt=>bt.name===b)).map(b=><option key={b} value={b}>{b}</option>)}
                </select>
              </div>
              <div style={{gridColumn:'1/-1'}}><label style={S.label}>Feed Type</label>
                <div style={{display:'flex',borderRadius:6,overflow:'hidden',border:'1px solid #d1d5db'}}>
                  {[{v:'STARTER',l:'Starter'},{v:'GROWER',l:'Grower'}].map(({v,l})=><button key={v} type="button" onClick={()=>setForm(f=>({...f,feedType:v}))} style={{flex:1,padding:'7px 0',border:'none',fontFamily:'inherit',fontSize:12,cursor:'pointer',background:form.feedType===v?'#085041':'#f9fafb',color:form.feedType===v?'white':'#6b7280'}}>{l}</button>)}
                </div>
              </div>
              <div><label style={S.label}>Feed (lbs)</label><input type="number" min="0" step="0.1" value={form.feedLbs||''} onChange={e=>setForm(f=>({...f,feedLbs:e.target.value}))} placeholder="0"/></div>
              <div><label style={S.label}>Grit (lbs)</label><input type="number" min="0" step="0.1" value={form.gritLbs||''} onChange={e=>setForm(f=>({...f,gritLbs:e.target.value}))} placeholder="0"/></div>
              <div><label style={S.label}>Mortality count</label><input type="number" min="0" value={form.mortalityCount||''} onChange={e=>setForm(f=>({...f,mortalityCount:e.target.value}))} placeholder="0"/></div>
              <div><label style={S.label}>Mortality reason</label><input value={form.mortalityReason} onChange={e=>setForm(f=>({...f,mortalityReason:e.target.value}))}/></div>
              <div><label style={S.label}>Group moved?</label>
                <div style={{display:'flex',borderRadius:6,overflow:'hidden',border:'1px solid #d1d5db'}}>
                  {[{v:true,l:'Yes'},{v:false,l:'No'}].map(({v,l})=><button key={l} type="button" onClick={()=>setForm(f=>({...f,groupMoved:v}))} style={{flex:1,padding:'7px 0',border:'none',fontFamily:'inherit',fontSize:12,cursor:'pointer',background:form.groupMoved===v?(v?'#085041':'#374151'):'#f9fafb',color:form.groupMoved===v?'white':'#6b7280'}}>{l}</button>)}
                </div>
              </div>
              <div><label style={S.label}>Waterer checked?</label>
                <div style={{display:'flex',borderRadius:6,overflow:'hidden',border:'1px solid #d1d5db'}}>
                  {[{v:true,l:'Yes'},{v:false,l:'No'}].map(({v,l})=><button key={l} type="button" onClick={()=>setForm(f=>({...f,watererChecked:v}))} style={{flex:1,padding:'7px 0',border:'none',fontFamily:'inherit',fontSize:12,cursor:'pointer',background:form.watererChecked===v?(v?'#085041':'#374151'):'#f9fafb',color:form.watererChecked===v?'white':'#6b7280'}}>{l}</button>)}
                </div>
              </div>
              <div style={{gridColumn:'1/-1'}}><label style={S.label}>Comments</label><textarea value={form.comments} onChange={e=>setForm(f=>({...f,comments:e.target.value}))} rows={2} style={{resize:'vertical'}}/></div>
            </div>
            <div style={{padding:'12px 20px',borderTop:'1px solid #e5e7eb',display:'flex',gap:8}}>
              <button onClick={save} style={{...S.btnPrimary,width:'auto',padding:'8px 20px'}}>Save</button>
              {editId&&<button onClick={()=>del(editId)} style={S.btnDanger}>Delete</button>}
              <button onClick={()=>setShowForm(false)} style={S.btnGhost}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── LAYERS VIEW ──
// ── LAYER BATCHES VIEW ──
const LayerBatchesView = ({sb, layerGroups, layerBatches, setLayerBatches, layerHousings, setLayerHousings, batches, fmt, Header, authState, feedCosts, setView, pendingEdit, setPendingEdit}) => {
  const {useState,useEffect,useRef}=React;
  const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
  const [loading,setLoading]=useState(true);
  const [batchStats,setBatchStats]=useState({});
  const [housingStats,setHousingStats]=useState({});
  const [rawLayerDailys,setRawLayerDailys]=useState([]); // for projected count calc
  const [selectedBatchId,setSelectedBatchId]=useState(null);
  const [retHomePeriod,setRetHomePeriod]=useState(30); // Rolling window: 30, 90, or 180 days
  const [showBatchForm,setShowBatchForm]=useState(false);
  const [showHousingForm,setShowHousingForm]=useState(false);
  const [editBatchId,setEditBatchId]=useState(null);
  const [editHousingId,setEditHousingId]=useState(null);
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);

  const HOUSING_CAPS={'Layer Schooner':450,'Eggmobile 1':250,'Eggmobile 2':250,'Eggmobile 3':250,'Eggmobile 4':250,'Retirement Home':9999};
  const getHousingCap=(name)=>{
    if(!name) return 9999;
    for(const [k,v] of Object.entries(HOUSING_CAPS)){if(name.toLowerCase().includes(k.toLowerCase()))return v;}
    return 9999;
  };

  const EMPTY_BATCH={name:'',status:'active',arrival_date:'',original_count:'',supplier:'',cost_per_bird:'',brooder_name:'',brooder_entry_date:'',brooder_exit_date:'',schooner_name:'',schooner_entry_date:'',schooner_exit_date:'',notes:'',per_lb_starter_cost:'',per_lb_grower_cost:'',per_lb_layer_cost:''};
  const EMPTY_HOUSING={housing_name:'',status:'active',current_count:'',start_date:todayStr(),retired_date:'',notes:''};
  const [bForm,setBForm]=useState(EMPTY_BATCH);
  const [hForm,setHForm]=useState(EMPTY_HOUSING);
  const housingAutoSaveTimer = useRef(null);
  const [housingSaving, setHousingSaving] = useState(false);
  const [housingPending, setHousingPending] = useState(false); // shows "saving..." indicator
  // Layer batch form autosave state
  const batchAutoSaveTimer = useRef(null);
  const [batchSaving, setBatchSaving] = useState(false);
  const [batchPending, setBatchPending] = useState(false);

  // Handle deep-link from timeline (clicking a layer bar selects this batch)
  useEffect(()=>{
    if(pendingEdit?.viewName==='layerbatches'&&pendingEdit?.id){
      setSelectedBatchId(pendingEdit.id);
      setPendingEdit&&setPendingEdit(null);
    }
  },[pendingEdit]);

  // Compute next batch name
  function nextBatchName(){
    const yr=new Date().getFullYear().toString().slice(2);
    const existing=layerBatches.filter(b=>b.name&&b.name.match(/^L-\d{2}-\d{2}$/));
    const nums=existing.map(b=>parseInt(b.name.slice(5))||0);
    const next=(Math.max(0,...nums)+1).toString().padStart(2,'0');
    return `L-${yr}-${next}`;
  }

  useEffect(()=>{
    // Paginated fetch — Supabase caps at 1000 rows per request.
    // This fetches in pages of 1000 until all rows are retrieved.
    async function fetchAll(table, columns){
      const PAGE=1000;
      let all=[], offset=0, done=false;
      while(!done){
        const{data,error}=await sb.from(table).select(columns).range(offset, offset+PAGE-1);
        if(error||!data||data.length===0){ done=true; break; }
        all=all.concat(data);
        if(data.length<PAGE) done=true;
        else offset+=PAGE;
      }
      return all;
    }
    Promise.all([
      fetchAll('layer_dailys','batch_label,batch_id,feed_lbs,grit_lbs,mortality_count,date,feed_type'),
      fetchAll('egg_dailys','group1_name,group1_count,group2_name,group2_count,group3_name,group3_count,group4_name,group4_count,date'),
    ]).then(([ld,ed])=>{
      setRawLayerDailys(ld);
      // Date range helper — only count records within a housing's active period
      function inRange(date,start,end){
        if(!date) return false;
        if(start && date<start) return false;
        if(end && date>end) return false;
        return true;
      }
      // Live layer feed phase calc — bird age from brooder_entry_date.
      // Days 0-20 = STARTER, 21-139 = GROWER, 140+ = LAYER.
      // Falls back to stored feed_type if anchor date is unknown.
      function calcPhaseFromAge(reportDate, brooderEntry, storedType){
        if(!brooderEntry || !reportDate) return storedType || 'LAYER';
        try {
          const days = Math.floor((new Date(reportDate+'T12:00:00') - new Date(brooderEntry+'T12:00:00'))/86400000);
          if(days < 21) return 'STARTER';
          if(days < 140) return 'GROWER';
          return 'LAYER';
        } catch(e) { return storedType || 'LAYER'; }
      }
      // Stats per batch — batch_id-based attribution.
      // Every layer_dailys row has a batch_id linking it to exactly one layer_batch.
      // This is set at submit time (for new reports) or backfilled (for historical data).
      // batch_id is the source of truth — NOT batch_label text matching.
      const stats={};
      layerBatches.forEach(batch=>{
        const anchor = batch.brooder_entry_date || batch.arrival_date || null;
        const bHousings=layerHousings.filter(h=>h.batch_id===batch.id);
        const myReports = ld.filter(d => d.batch_id === batch.id);
        let totalFeed=0,totalMort=0,starterFeed=0,growerFeed=0,layerFeed=0;
        myReports.forEach(d=>{
          const f = parseFloat(d.feed_lbs)||0;
          totalFeed += f;
          totalMort += parseInt(d.mortality_count)||0;
          const phase = calcPhaseFromAge(d.date, anchor, d.feed_type);
          if(phase==='STARTER') starterFeed += f;
          else if(phase==='GROWER') growerFeed += f;
          else layerFeed += f;
        });
        let totalEggs=0;
        bHousings.forEach(h=>{
          totalEggs += ed.reduce((s,d)=>{
            if(!inRange(d.date,h.start_date,h.retired_date)) return s;
            let e=0;
            [[d.group1_name,d.group1_count],[d.group2_name,d.group2_count],[d.group3_name,d.group3_count],[d.group4_name,d.group4_count]].forEach(([n,c])=>{if(n===h.housing_name)e+=parseInt(c)||0;});
            return s+e;
          },0);
        });
        stats[batch.id]={totalFeed,totalMort,totalEggs,starterFeed,growerFeed,layerFeed};
      });
      setBatchStats(stats);
      // Stats per housing — uses batch_id from each report's parent batch for phase calc
      const batchById = Object.fromEntries(layerBatches.map(b=>[b.id, b]));
      const hStats={};
      layerHousings.forEach(h=>{
        const parent = h.batch_id ? batchById[h.batch_id] : null;
        const anchor = parent ? (parent.brooder_entry_date || parent.arrival_date || null) : null;
        const hd=ld.filter(d=>String(d.batch_label||'').toLowerCase().trim()===String(h.housing_name||'').toLowerCase().trim() && inRange(d.date,h.start_date,h.retired_date));
        let totalFeed=0,totalMort=0,starterFeedH=0,growerFeedH=0,layerFeedH=0;
        hd.forEach(d=>{
          const f = parseFloat(d.feed_lbs)||0;
          totalFeed += f;
          totalMort += parseInt(d.mortality_count)||0;
          const phase = calcPhaseFromAge(d.date, anchor, d.feed_type);
          if(phase==='STARTER') starterFeedH += f;
          else if(phase==='GROWER') growerFeedH += f;
          else layerFeedH += f;
        });
        const totalEggs=ed.reduce((s,d)=>{
          if(!inRange(d.date,h.start_date,h.retired_date)) return s;
          let e=0;
          [[d.group1_name,d.group1_count],[d.group2_name,d.group2_count],[d.group3_name,d.group3_count],[d.group4_name,d.group4_count]].forEach(([n,c])=>{if(n===h.housing_name)e+=parseInt(c)||0;});
          return s+e;
        },0);
        hStats[h.id]={totalFeed,totalMort,totalEggs,starterFeed:starterFeedH,growerFeed:growerFeedH,layerFeed:layerFeedH};
      });
      setHousingStats(hStats);
      setLoading(false);
    });
  },[layerBatches,layerHousings]);

  // Which housings are currently locked (active in some batch)
  const lockedHousings=new Set(layerHousings.filter(h=>h.status==='active').map(h=>h.housing_name));

  // Save batch
  // Build a record from a form snapshot. Used by both autosave and close-flush.
  function buildBatchRec(formSnapshot){
    const f = formSnapshot;
    return {
      id: editBatchId || f.name.toLowerCase().replace(/[^a-z0-9]+/g,'-'),
      name: f.name.trim(),
      status: f.status||'active',
      arrival_date: f.arrival_date||null,
      original_count: f.original_count!==''?parseInt(f.original_count):null,
      supplier: f.supplier||null,
      cost_per_bird: f.cost_per_bird!==''?parseFloat(f.cost_per_bird):null,
      brooder_name: f.brooder_name||null,
      brooder_entry_date: f.brooder_entry_date||null,
      brooder_exit_date: f.brooder_exit_date||null,
      schooner_name: f.schooner_name||null,
      schooner_entry_date: f.schooner_entry_date||null,
      schooner_exit_date: f.schooner_exit_date||null,
      notes: f.notes||null,
      // Cost rates: only used at create-time. Once set, they're locked from this UI
      // (admin must update via Feed Costs panel). Defaulting on creation pulls from global.
      per_lb_starter_cost: editBatchId
        ? (f.per_lb_starter_cost!==''?parseFloat(f.per_lb_starter_cost):null)
        : (parseFloat(f.per_lb_starter_cost) || (feedCosts && feedCosts.starter) || null),
      per_lb_grower_cost: editBatchId
        ? (f.per_lb_grower_cost!==''?parseFloat(f.per_lb_grower_cost):null)
        : (parseFloat(f.per_lb_grower_cost) || (feedCosts && feedCosts.grower) || null),
      per_lb_layer_cost: editBatchId
        ? (f.per_lb_layer_cost!==''?parseFloat(f.per_lb_layer_cost):null)
        : (parseFloat(f.per_lb_layer_cost) || (feedCosts && feedCosts.layer) || null),
    };
  }

  async function persistBatchRec(rec){
    setBatchSaving(true);
    const {error} = await sb.from('layer_batches').upsert(rec,{onConflict:'id'});
    setBatchSaving(false);
    if(error){
      console.warn('layer_batches upsert error:', error.message);
      return false;
    }
    setLayerBatches(prev => {
      const exists = prev.find(b => b.id === rec.id);
      return exists ? prev.map(b => b.id === rec.id ? rec : b) : [...prev, rec];
    });
    setBatchPending(false);
    return true;
  }

  function scheduleBatchAutosave(formSnapshot){
    if(!formSnapshot.name || !formSnapshot.name.trim()) return; // never autosave a nameless batch
    setBatchPending(true);
    clearTimeout(batchAutoSaveTimer.current);
    batchAutoSaveTimer.current = setTimeout(()=>{
      const rec = buildBatchRec(formSnapshot);
      // Only set editBatchId on the first successful save of a NEW batch,
      // so subsequent autosaves UPDATE rather than re-INSERT
      if(!editBatchId) setEditBatchId(rec.id);
      persistBatchRec(rec);
    }, 1500);
  }

  async function flushBatchAutosave(){
    clearTimeout(batchAutoSaveTimer.current);
    if(!batchPending) return true;
    if(!bForm.name || !bForm.name.trim()){
      setErr('Batch name is required.');
      return false;
    }
    const rec = buildBatchRec(bForm);
    if(!editBatchId) setEditBatchId(rec.id);
    return await persistBatchRec(rec);
  }

  function updBatch(updater){
    setBForm(prev => {
      const next = typeof updater === 'function' ? updater(prev) : {...prev, ...updater};
      scheduleBatchAutosave(next);
      return next;
    });
  }

  async function closeBatchForm(){
    const ok = await flushBatchAutosave();
    if(!ok) return; // don't close if there's an unrecoverable error (e.g. missing name)
    setShowBatchForm(false);
    setEditBatchId(null);
    setBForm(EMPTY_BATCH);
    setBatchPending(false);
    setErr('');
  }

  // Save housing
  // ── Housing persistence (autosave model) ──
  // Build the record from a form snapshot. Used by both autosave and close-flush.
  function buildHousingRec(formSnapshot){
    let newCurrentCountDate = null;
    if(editHousingId){
      const existing = layerHousings.find(h=>h.id===editHousingId);
      const oldVal = existing?.current_count;
      const newVal = formSnapshot.current_count!==''?parseInt(formSnapshot.current_count):null;
      if(newVal !== (oldVal==null?null:parseInt(oldVal))){
        newCurrentCountDate = todayStr();
      } else {
        newCurrentCountDate = existing?.current_count_date || null;
      }
    } else {
      if(formSnapshot.current_count!==''){ newCurrentCountDate = todayStr(); }
    }
    return {
      id: editHousingId||(String(Date.now())+Math.random().toString(36).slice(2,6)),
      batch_id: selectedBatchId,
      housing_name: formSnapshot.housing_name,
      status: formSnapshot.status||'active',
      current_count: formSnapshot.current_count!==''?parseInt(formSnapshot.current_count):null,
      current_count_date: newCurrentCountDate,
      start_date: formSnapshot.start_date||null,
      retired_date: formSnapshot.retired_date||null,
      notes: formSnapshot.notes||null,
    };
  }

  // Persist a housing record. Returns true on success.
  async function persistHousing(rec){
    if(!rec.housing_name) return false;
    if(!selectedBatchId) return false;
    // Capacity warning now uses current_count instead of allocated_count
    const cap = getHousingCap(rec.housing_name);
    if((rec.current_count||0) > cap){
      setErr('\u26a0 '+rec.housing_name+' capacity is '+cap+' birds. You have '+rec.current_count+'.');
    } else {
      setErr('');
    }
    setHousingSaving(true);
    const {error} = await sb.from('layer_housings').upsert(rec, {onConflict:'id'});
    setHousingSaving(false);
    setHousingPending(false);
    if(error){
      setErr('Could not save: '+error.message);
      return false;
    }
    const exists = layerHousings.find(h=>h.id===rec.id);
    const updated = exists
      ? layerHousings.map(h=>h.id===rec.id?rec:h)
      : [...layerHousings, rec];
    setLayerHousings(updated);
    if(!editHousingId) setEditHousingId(rec.id);
    return true;
  }

  // Schedule a debounced autosave (1.5s)
  function scheduleHousingAutosave(formSnapshot){
    if(!formSnapshot.housing_name) return;
    setHousingPending(true);
    clearTimeout(housingAutoSaveTimer.current);
    housingAutoSaveTimer.current = setTimeout(()=>{
      const rec = buildHousingRec(formSnapshot);
      persistHousing(rec);
    }, 1500);
  }

  // Flush pending autosave immediately
  async function flushHousingAutosave(){
    if(housingAutoSaveTimer.current){
      clearTimeout(housingAutoSaveTimer.current);
      housingAutoSaveTimer.current = null;
    }
    if(housingPending && hForm.housing_name){
      const rec = buildHousingRec(hForm);
      await persistHousing(rec);
    }
  }

  // Close modal, flushing first
  async function closeHousingForm(){
    await flushHousingAutosave();
    setShowHousingForm(false);
    setEditHousingId(null);
    setHForm(EMPTY_HOUSING);
    setHousingPending(false);
    setErr('');
  }

  // Wrapper for setHForm that also schedules autosave
  function updHousing(updater){
    setHForm(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      scheduleHousingAutosave(next);
      return next;
    });
  }

                    </React.Fragment>

            <div style={{marginBottom:16}}>

                <div style={{fontSize:12,fontWeight:700,color:'#4b5563',letterSpacing:.5}}>HOUSINGS</div>
                {selectedBatch.status==='active'&&<button onClick={()=>{setHForm(EMPTY_HOUSING);setEditHousingId(null);setShowHousingForm(true);}} style={{padding:'5px 14px',borderRadius:7,border:'none',background:'#085041',color:'white',fontSize:11,fontWeight:600,cursor:'pointer'}}>+ Add Housing</button>}

                  const hs=housingStats[h.id]||{};
                  const cap=getHousingCap(h.housing_name);
                  const util=h.current_count&&cap?Math.round((h.current_count/cap)*100):null;
                  // Projected count: anchor minus mortalities since current_count_date
                  const proj = computeProjectedCount(h, rawLayerDailys);
                  return (
                    <div key={h.id} style={{background:'white',border:h.status==='active'?'1px solid #fde68a':'1px solid #e5e7eb',borderRadius:10,padding:'14px 18px',display:'flex',gap:16,alignItems:'center'}}>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                          <span style={{fontSize:13,fontWeight:700,color:'#111827'}}>{'\ud83c\udfe0 '+h.housing_name}</span>
                          <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:8,background:h.status==='active'?'#d1fae5':'#f3f4f6',color:h.status==='active'?'#065f46':'#6b7280',textTransform:'uppercase'}}>{h.status}</span>
                          {h.start_date&&<span style={{fontSize:11,color:'#6b7280'}}>from {fmt(h.start_date)}</span>}
                          {h.retired_date&&<span style={{fontSize:11,color:'#9ca3af'}}>{'\u2192 '+fmt(h.retired_date)}</span>}
                        </div>
                        <div style={{display:'flex',gap:16,fontSize:11,color:'#6b7280',flexWrap:'wrap'}}>
                          <span>Physical: <strong style={{color:'#374151'}}>{h.current_count!=null?h.current_count:'\u2014'}</strong>{h.current_count_date?<span style={{color:'#9ca3af',fontWeight:400}}>{' on '+fmt(h.current_count_date)}</span>:null}</span>
                          {proj && proj.anchorDate && proj.mortSince>0 && (
                            <span title={'Anchor '+proj.anchor+' on '+fmt(proj.anchorDate)+' minus '+proj.mortSince+' mortalities since'}>
                              Projected: <strong style={{color:proj.projected<proj.anchor*0.9?'#b91c1c':'#92400e'}}>{proj.projected}</strong>
                              <span style={{color:'#9ca3af',fontWeight:400}}>{' (\u2212'+proj.mortSince+')'}</span>
                            </span>
                          )}
                          <span>Capacity: <strong style={{color:'#374151'}}>{cap===9999?'Unlimited':cap}</strong></span>
                          {util!==null&&<span>Utilization: <strong style={{color:util>95?'#b91c1c':util>80?'#92400e':'#065f46'}}>{util+'%'}</strong></span>}
                        </div>
                      </div>
                      <div style={{display:'flex',gap:16,flexShrink:0}}>
                        <StatPill label="Total Feed" val={hs.totalFeed>0?Math.round(hs.totalFeed)+' lbs':'\u2014'} color="#92400e"/>
                        <StatPill label="Starter" val={hs.starterFeed>0?Math.round(hs.starterFeed)+' lbs':'\u2014'} color="#1e40af"/>
                        <StatPill label="Grower" val={hs.growerFeed>0?Math.round(hs.growerFeed)+' lbs':'\u2014'} color="#065f46"/>
                        <StatPill label="Layer" val={hs.layerFeed>0?Math.round(hs.layerFeed)+' lbs':'\u2014'} color="#b45309"/>
                        <StatPill label="Mort." val={hs.totalMort||'0'} color={hs.totalMort>5?'#b91c1c':'#374151'}/>
                        <StatPill label="Eggs" val={hs.totalEggs>0?hs.totalEggs.toLocaleString():'\u2014'} color="#b45309"/>
                      </div>
                      <div style={{display:'flex',gap:6,flexShrink:0}}>
                        <button onClick={()=>{setHForm({...EMPTY_HOUSING,...h,current_count:h.current_count!=null?h.current_count:''});setEditHousingId(h.id);setShowHousingForm(true);}} style={{padding:'5px 10px',borderRadius:6,border:'1px solid #d1d5db',background:'white',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>Edit</button>
                        {h.status==='active'&&<button onClick={()=>{if(confirm('Retire '+h.housing_name+'?'))retireHousing(h);}} style={{padding:'5px 10px',borderRadius:6,border:'1px solid #fca5a5',background:'#fef2f2',color:'#b91c1c',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>Retire</button>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Batch notes */}
            {selectedBatch.notes&&<div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:10,padding:'12px 16px',fontSize:12,color:'#374151'}}><span style={{color:'#9ca3af'}}>Notes: </span>{selectedBatch.notes}</div>}
          </>
        )}

        {/* BATCH FORM MODAL */}
        {showBatchForm&&(
          <div onClick={closeBatchForm} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.45)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'1rem',overflowY:'auto'}}>
            <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:12,width:'100%',maxWidth:540,boxShadow:'0 8px 32px rgba(0,0,0,.2)',marginTop:40}}>
              <div style={{padding:'14px 20px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontSize:15,fontWeight:600,color:'#b45309'}}>{editBatchId?'Edit Layer Batch':'New Layer Batch'} <span style={{fontSize:11,color:'#9ca3af',fontWeight:400,marginLeft:6}}>Auto-saves as you type</span></div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  {batchSaving?<span style={{fontSize:11,color:'#9ca3af'}}>{'Saving\u2026'}</span>:batchPending?<span style={{fontSize:11,color:'#9ca3af'}}>{'Unsaved\u2026'}</span>:editBatchId?<span style={{fontSize:11,color:'#065f46'}}>{'\u2713 Saved'}</span>:null}
                  <button onClick={closeBatchForm} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#9ca3af'}}>{'\u00d7'}</button>
                </div>
              </div>
              <div style={{padding:'16px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxHeight:'70vh',overflowY:'auto'}}>
                <div style={{gridColumn:'1/-1'}}><label style={S.label}>Batch Name *</label><input value={bForm.name} onChange={e=>updBatch(f=>({...f,name:e.target.value}))} placeholder="e.g. L-26-01"/></div>
                <div><label style={S.label}>Status</label><select value={bForm.status} onChange={e=>updBatch(f=>({...f,status:e.target.value}))}><option value="active">Active</option><option value="retired">Retired</option></select></div>
                <div><label style={S.label}>Original Count</label><input type="number" min="0" value={bForm.original_count||''} onChange={e=>updBatch(f=>({...f,original_count:e.target.value}))}/></div>
                <div><label style={S.label}>Supplier</label><input value={bForm.supplier} onChange={e=>updBatch(f=>({...f,supplier:e.target.value}))}/></div>
                <div style={{gridColumn:'1/-1'}}><label style={S.label}>Cost per Bird ($)</label><input type="number" min="0" step="0.01" style={{maxWidth:160}} value={bForm.cost_per_bird||''} onChange={e=>updBatch(f=>({...f,cost_per_bird:e.target.value}))}/></div>

                {/* FEED COST RATES (read-only — populated from global rates set in Admin → Feed Costs) */}
                <div style={{gridColumn:'1/-1',borderTop:'1px solid #e5e7eb',paddingTop:10,marginTop:4}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#4b5563',letterSpacing:.5,marginBottom:6}}>{'\ud83d\udcb0 FEED COST RATES'} <span style={{fontWeight:400,color:'#9ca3af'}}>{'(locked \u2014 set in Admin \u203a Feed Costs)'}</span></div>
                  <div style={{display:'flex',gap:16,fontSize:12,color:'#374151',padding:'8px 12px',background:'#f9fafb',borderRadius:8,border:'1px solid #e5e7eb'}}>
                    <span>Starter: <strong>{bForm.per_lb_starter_cost!==''&&bForm.per_lb_starter_cost!=null?'$'+parseFloat(bForm.per_lb_starter_cost).toFixed(3)+'/lb':'\u2014'}</strong></span>
                    <span>Grower: <strong>{bForm.per_lb_grower_cost!==''&&bForm.per_lb_grower_cost!=null?'$'+parseFloat(bForm.per_lb_grower_cost).toFixed(3)+'/lb':'\u2014'}</strong></span>
                    <span>Layer: <strong>{bForm.per_lb_layer_cost!==''&&bForm.per_lb_layer_cost!=null?'$'+parseFloat(bForm.per_lb_layer_cost).toFixed(3)+'/lb':'\u2014'}</strong></span>
                  </div>
                </div>

                {/* BROODER PHASE */}
                <div style={{gridColumn:'1/-1',borderTop:'1px solid #e5e7eb',paddingTop:10,marginTop:4,fontSize:11,fontWeight:700,color:'#4b5563',letterSpacing:.5}}>🔆 BROODER PHASE <span style={{fontWeight:400,color:'#9ca3af'}}>(fixed 3 weeks)</span></div>
                <div style={{gridColumn:'1/-1'}}>
                  <label style={S.label}>Brooder</label>
                  <select value={bForm.brooder_name} onChange={e=>{
                    const val=e.target.value;
                    const entry=bForm.brooder_entry_date;
                    const exit=entry?toISO(addDays(new Date(entry+'T12:00:00'),21)):bForm.brooder_exit_date;
                    const schoonerIn=exit||bForm.schooner_entry_date;
                    const schoonerOut=schoonerIn?toISO(addDays(new Date(schoonerIn+'T12:00:00'),119)):bForm.schooner_exit_date;
                    updBatch(f=>({...f,brooder_name:val,brooder_exit_date:exit||f.brooder_exit_date,schooner_entry_date:schoonerIn||f.schooner_entry_date,schooner_exit_date:schoonerOut||f.schooner_exit_date}));
                  }}>
                    <option value="">Select brooder…</option>
                    {BROODERS.map(b=>{
                      // Check conflicts with broiler batches
                      const entry=bForm.brooder_entry_date;
                      const exit=entry?toISO(addDays(new Date(entry+'T12:00:00'),21+BROODER_CLEANOUT)):null;
                      const conflictBroiler=entry&&exit&&batches.filter(bt=>bt.brooder===b&&bt.id!==editBatchId).some(bt=>{
                        const exEnd=toISO(addDays(new Date((bt.brooderOut||bt.brooder_exit_date||entry)+'T12:00:00'),BROODER_CLEANOUT));
                        return overlaps(entry,exit,bt.brooderIn||bt.brooder_entry_date||'',exEnd);
                      });
                      const conflictLayer=entry&&exit&&layerBatches.filter(lb=>lb.brooder_name===b&&lb.id!==editBatchId&&lb.brooder_entry_date).some(lb=>{
                        const lbExit=lb.brooder_exit_date||toISO(addDays(new Date(lb.brooder_entry_date+'T12:00:00'),21+BROODER_CLEANOUT));
                        return overlaps(entry,exit,lb.brooder_entry_date,lbExit);
                      });
                      const conflict=conflictBroiler||conflictLayer;
                      return <option key={b} value={'Brooder '+b} disabled={conflict} style={{color:conflict?'#9ca3af':'inherit'}}>{'Brooder '+b+(conflict?' ⚠ In use':'')}</option>;
                    })}
                  </select>
                </div>
                <div>
                  <label style={S.label}>Date in Brooder</label>
                  <input type="date" value={bForm.brooder_entry_date} onChange={e=>{
                    const entry=e.target.value;
                    const exit=entry?toISO(addDays(new Date(entry+'T12:00:00'),21)):'';
                    const schoonerOut=exit?toISO(addDays(new Date(exit+'T12:00:00'),119)):'';
                    updBatch(f=>({...f,brooder_entry_date:entry,brooder_exit_date:exit,schooner_entry_date:exit,schooner_exit_date:schoonerOut,arrival_date:entry||f.arrival_date}));
                  }}/>
                </div>
                <div>
                  <label style={S.label}>Exit Date <span style={{color:'#9ca3af',fontWeight:400}}>(auto)</span></label>
                  <input type="date" value={bForm.brooder_exit_date} readOnly style={{background:'#f9fafb',color:'#6b7280'}}/>
                </div>

                {/* SCHOONER PHASE */}
                <div style={{gridColumn:'1/-1',borderTop:'1px solid #e5e7eb',paddingTop:10,marginTop:4,fontSize:11,fontWeight:700,color:'#4b5563',letterSpacing:.5}}>🚌 SCHOONER PHASE <span style={{fontWeight:400,color:'#9ca3af'}}>(3 to 24 weeks)</span></div>
                <div style={{gridColumn:'1/-1'}}>
                  <label style={S.label}>Schooner</label>
                  <select value={bForm.schooner_name} onChange={e=>updBatch(f=>({...f,schooner_name:e.target.value}))}>
                    <option value="">Select schooner…</option>
                    {SCHOONERS.map(s=>{
                      const entry=bForm.schooner_entry_date;
                      const exit=bForm.schooner_exit_date||( entry?toISO(addDays(new Date(entry+'T12:00:00'),119+SCHOONER_CLEANOUT)):null);
                      const conflictBroiler=entry&&exit&&batches.filter(bt=>bt.schooner===s&&bt.id!==editBatchId).some(bt=>{
                        const exEnd=toISO(addDays(new Date((bt.schoonerOut||bt.schooner_exit_date||entry)+'T12:00:00'),SCHOONER_CLEANOUT));
                        return overlaps(entry,exit,bt.schoonerIn||bt.schooner_entry_date||'',exEnd);
                      });
                      const conflictLayer=entry&&exit&&layerBatches.filter(lb=>lb.schooner_name===('Schooner '+s)&&lb.id!==editBatchId&&lb.schooner_entry_date).some(lb=>{
                        const lbExit=lb.schooner_exit_date||toISO(addDays(new Date(lb.schooner_entry_date+'T12:00:00'),119+SCHOONER_CLEANOUT));
                        return overlaps(entry,exit,lb.schooner_entry_date,lbExit);
                      });
                      const conflict=conflictBroiler||conflictLayer;
                      return <option key={s} value={'Schooner '+s} disabled={conflict} style={{color:conflict?'#9ca3af':'inherit'}}>{'Schooner '+s+(conflict?' ⚠ In use':'')}</option>;
                    })}
                  </select>
                </div>
                <div>
                  <label style={S.label}>Entry Date <span style={{color:'#9ca3af',fontWeight:400}}>(auto)</span></label>
                  <input type="date" value={bForm.schooner_entry_date} onChange={e=>{
                    const entry=e.target.value;
                    const exit=entry?toISO(addDays(new Date(entry+'T12:00:00'),119)):'';
                    updBatch(f=>({...f,schooner_entry_date:entry,schooner_exit_date:exit}));
                  }}/>
                </div>
                <div>
                  <label style={S.label}>Exit Date <span style={{color:'#9ca3af',fontWeight:400}}>(editable)</span></label>
                  <input type="date" value={bForm.schooner_exit_date} onChange={e=>updBatch(f=>({...f,schooner_exit_date:e.target.value}))}/>
                </div>
                {bForm.schooner_entry_date&&bForm.schooner_exit_date&&(()=>{
                  const weeks=Math.round((new Date(bForm.schooner_exit_date+'T12:00:00')-new Date(bForm.schooner_entry_date+'T12:00:00'))/604800000);
                  const warn=weeks<3||weeks>24;
                  return <div style={{gridColumn:'1/-1',fontSize:11,padding:'4px 8px',borderRadius:5,background:warn?'#fef2f2':'#ecfdf5',color:warn?'#b91c1c':'#065f46',fontWeight:600}}>{warn?'\u26a0 ':''}{weeks} weeks in schooner {warn?'(expected 3 to 24 weeks)':'\u2713'}</div>;
                })()}

                <div style={{gridColumn:'1/-1',borderTop:'1px solid #e5e7eb',paddingTop:10,marginTop:4}}><label style={S.label}>Notes</label><textarea value={bForm.notes} onChange={e=>updBatch(f=>({...f,notes:e.target.value}))} rows={2} style={{resize:'vertical'}}/></div>
                {err&&<div style={{gridColumn:'1/-1',color:'#b91c1c',fontSize:12,fontWeight:600}}>{err}</div>}
              </div>
            </div>
          </div>
        )}

        {/* HOUSING FORM MODAL */}
        {showHousingForm&&(
          <div onClick={closeHousingForm} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.45)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'1rem',overflowY:'auto'}}>
            <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:12,width:'100%',maxWidth:440,boxShadow:'0 8px 32px rgba(0,0,0,.2)',marginTop:40}}>
              <div style={{padding:'14px 20px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontSize:15,fontWeight:600,color:'#b45309'}}>{editHousingId?'Edit Housing':'Add Housing'}</div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  {housingSaving?<span style={{fontSize:11,color:'#9ca3af'}}>{'Saving\u2026'}</span>:housingPending?<span style={{fontSize:11,color:'#9ca3af'}}>{'Unsaved\u2026'}</span>:editHousingId?<span style={{fontSize:11,color:'#065f46'}}>{'\u2713 Saved'}</span>:null}
                  <button onClick={closeHousingForm} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#9ca3af'}}>{'\u00d7'}</button>
                </div>
              </div>
              <div style={{padding:'16px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxHeight:'65vh',overflowY:'auto'}}>
                <div style={{gridColumn:'1/-1'}}>
                  <label style={S.label}>Housing (Layer Group) *</label>
                  <select value={hForm.housing_name} onChange={e=>updHousing(f=>({...f,housing_name:e.target.value}))}>
                    <option value="">Select housing\u2026</option>
                    {layerGroups.map(g=>{
                      const isRetiredBatch=selectedBatch&&selectedBatch.status==='retired';
                      const locked=!isRetiredBatch&&lockedHousings.has(g.name)&&!(editHousingId&&layerHousings.find(h=>h.id===editHousingId)?.housing_name===g.name);
                      const owningHousing=layerHousings.find(h=>h.housing_name===g.name&&h.status==='active');
                      const owningBatch=owningHousing?layerBatches.find(b=>b.id===owningHousing.batch_id):null;
                      const label=g.name+(locked?' \u26a0 In use'+(owningBatch?' by '+owningBatch.name:''):'');
                      return <option key={g.id} value={g.name} disabled={locked}>{label}</option>;
                    })}
                  </select>
                  {hForm.housing_name&&(()=>{
                    const owningH=layerHousings.find(h=>h.housing_name===hForm.housing_name&&h.status==='active');
                    const owningB=owningH?layerBatches.find(b=>b.id===owningH.batch_id):null;
                    if(!owningB) return null;
                    return <div style={{marginTop:6,fontSize:11,color:'#1d4ed8',background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:6,padding:'5px 10px'}}>Currently active in: <strong>{owningB.name}</strong></div>;
                  })()}
                </div>
                {hForm.housing_name&&(()=>{const cap=getHousingCap(hForm.housing_name);return cap<9999&&<div style={{gridColumn:'1/-1',fontSize:11,color:'#92400e',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:6,padding:'6px 10px'}}>{'\u26a0 Capacity: '+cap+' birds max'}</div>;})()}
                <div style={{gridColumn:'1/-1'}}>
                  <label style={S.label}>Current Count</label>
                  <input type="number" min="0" value={hForm.current_count||''} onChange={e=>updHousing(f=>({...f,current_count:e.target.value}))}/>
                  {(()=>{
                    // Date hint: show below field when current count value differs from existing stored value
                    if(!editHousingId) return hForm.current_count!==''?<div style={{fontSize:10,color:'#065f46',marginTop:4}}>{'Will be stamped: '+fmt(todayStr())}</div>:null;
                    const existing = layerHousings.find(h=>h.id===editHousingId);
                    const oldVal = existing?.current_count;
                    const newVal = hForm.current_count!==''?parseInt(hForm.current_count):null;
                    const oldNorm = oldVal==null?null:parseInt(oldVal);
                    if(newVal !== oldNorm){
                      return <div style={{fontSize:10,color:'#065f46',marginTop:4,fontWeight:600}}>{'Will be stamped: '+fmt(todayStr())}</div>;
                    }
                    if(existing?.current_count_date){
                      return <div style={{fontSize:10,color:'#9ca3af',marginTop:4}}>{'Last set: '+fmt(existing.current_count_date)}</div>;
                    }
                    return null;
                  })()}
                </div>
                <div><label style={S.label}>Start Date</label><input type="date" value={hForm.start_date} onChange={e=>updHousing(f=>({...f,start_date:e.target.value}))}/></div>
                <div><label style={S.label}>Status</label><select value={hForm.status} onChange={e=>updHousing(f=>({...f,status:e.target.value}))}><option value="active">Active</option><option value="retired">Retired</option></select></div>
                {hForm.status==='retired'&&<div style={{gridColumn:'1/-1'}}><label style={S.label}>Retired Date</label><input type="date" value={hForm.retired_date} onChange={e=>updHousing(f=>({...f,retired_date:e.target.value}))}/></div>}
                <div style={{gridColumn:'1/-1'}}><label style={S.label}>Notes</label><textarea value={hForm.notes} onChange={e=>updHousing(f=>({...f,notes:e.target.value}))} rows={2} style={{resize:'vertical'}}/></div>
                {err&&<div style={{gridColumn:'1/-1',color:'#b91c1c',fontSize:12,fontWeight:600}}>{err}</div>}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const LayersView = ({sb, layerGroups, persistLayerGroups, fmt, Header, layerBatches, layerHousings}) => {
  const {useState,useEffect,useRef}=React;
  const EMPTY_LG={name:'',status:'active',house:'',startDate:'',originalCount:'',currentCount:'',lastCountDate:'',feedLbs:'',gritLbs:'',totalEggs:'',perLbFeedCost:'',perLbGritCost:'',notes:''};
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(EMPTY_LG);
  const [originalForm,setOriginalForm]=useState(null);
  const layerAutoSaveTimer=useRef(null);
  const [recentDailys,setRecentDailys]=useState([]);
  const sorted=[...layerGroups].sort((a,b)=>(a.name||'').localeCompare(b.name||'',undefined,{numeric:true}));

  useEffect(()=>{
    sb.from('layer_dailys').select('batch_label,feed_lbs,grit_lbs,layer_count,date,team_member,comments,mortality_count').order('date',{ascending:false}).limit(200).then(({data})=>{if(data)setRecentDailys(data);});
  },[]);

  function updLayer(k,v){
    const f={...form,[k]:v};
    setForm(f);
    if(editId){
      clearTimeout(layerAutoSaveTimer.current);
      layerAutoSaveTimer.current=setTimeout(()=>{
        const grp={...f,id:editId,originalCount:parseInt(f.originalCount)||0,currentCount:parseInt(f.currentCount)||0,feedLbs:parseFloat(f.feedLbs)||0,gritLbs:parseFloat(f.gritLbs)||0,totalEggs:parseFloat(f.totalEggs)||0,perLbFeedCost:parseFloat(f.perLbFeedCost)||0,perLbGritCost:parseFloat(f.perLbGritCost)||0};
        persistLayerGroups(layerGroups.map(g=>g.id===editId?grp:g));
        setOriginalForm(f);
      },1500);
    }
  }

  function closeLayerForm(){
    clearTimeout(layerAutoSaveTimer.current);
    if(editId&&originalForm){
      const LAYER_KEYS=['name','status','house','startDate','originalCount','currentCount','lastCountDate','feedLbs','gritLbs','totalEggs','perLbFeedCost','perLbGritCost','notes'];
      const changed=LAYER_KEYS.some(k=>String(form[k]||'')!==String(originalForm[k]||''));
      if(changed){
        const grp={...form,id:editId,originalCount:parseInt(form.originalCount)||0,currentCount:parseInt(form.currentCount)||0,feedLbs:parseFloat(form.feedLbs)||0,gritLbs:parseFloat(form.gritLbs)||0,totalEggs:parseFloat(form.totalEggs)||0,perLbFeedCost:parseFloat(form.perLbFeedCost)||0,perLbGritCost:parseFloat(form.perLbGritCost)||0};
        persistLayerGroups(layerGroups.map(g=>g.id===editId?grp:g));
      }
    }
    setShowForm(false);setEditId(null);setOriginalForm(null);
  }

  function save(){
    const grp={...form,id:editId||Date.now().toString(),originalCount:parseInt(form.originalCount)||0,currentCount:parseInt(form.currentCount)||0,feedLbs:parseFloat(form.feedLbs)||0,gritLbs:parseFloat(form.gritLbs)||0,totalEggs:parseFloat(form.totalEggs)||0,perLbFeedCost:parseFloat(form.perLbFeedCost)||0,perLbGritCost:parseFloat(form.perLbGritCost)||0};
    if(!grp.name.trim()){alert('Group name is required.');return;}
    persistLayerGroups(editId?layerGroups.map(g=>g.id===editId?grp:g):[...layerGroups,grp]);
    setShowForm(false);setEditId(null);setForm(EMPTY_LG);setOriginalForm(null);
  }
  function openEdit(g){const f={...EMPTY_LG,...g,originalCount:g.originalCount||'',currentCount:g.currentCount||'',feedLbs:g.feedLbs||'',gritLbs:g.gritLbs||'',totalEggs:g.totalEggs||'',perLbFeedCost:g.perLbFeedCost||'',perLbGritCost:g.perLbGritCost||''};setForm(f);setOriginalForm(f);setEditId(g.id);setShowForm(true);}

  const active=layerGroups.filter(g=>g.status==='active');
  const retired=layerGroups.filter(g=>g.status!=='active');

  const Card=({g})=>{
    const gDailys=recentDailys.filter(d=>d.batch_label===g.name).slice(0,3);
    const lastFeed=gDailys[0]?.feed_lbs;
    const lastCount=gDailys[0]?.layer_count;
    const recentMort=gDailys.reduce((s,d)=>s+(parseInt(d.mortality_count)||0),0);
    // Find which batch occupies this housing
    const occupyingHousing=(layerHousings||[]).find(h=>h.housing_name===g.name&&h.status==='active');
    const occupyingBatch=occupyingHousing?(layerBatches||[]).find(b=>b.id===occupyingHousing.batch_id):null;
    return (
      <div onClick={()=>openEdit(g)} style={{background:'white',border:'1px solid #e5e7eb',borderRadius:12,padding:'14px 18px',cursor:'pointer',display:'flex',alignItems:'center',gap:20}} className="hoverable-tile">
        <div style={{minWidth:220,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <div style={{fontSize:14,fontWeight:700,color:'#111827'}}>{g.name}</div>
            <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:10,background:g.status==='active'?'#d1fae5':'#f3f4f6',color:g.status==='active'?'#065f46':'#6b7280',textTransform:'uppercase'}}>{g.status}</span>
          </div>
          {occupyingBatch&&<div style={{display:'inline-flex',alignItems:'center',gap:4,background:'#fffbeb',border:'1px solid #fde68a',borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700,color:'#92400e',marginBottom:4}}>📦 {occupyingBatch.name}{occupyingHousing.current_count?' · '+occupyingHousing.current_count+' hens':''}</div>}
          {g.notes&&<div style={{fontSize:11,color:'#6b7280'}}>{g.notes}</div>}
        </div>
        <div style={{display:'flex',gap:24,flex:1,flexWrap:'wrap'}}>
          {[['Current hens',(g.currentCount||g.originalCount)||'—'],['House',g.house||'—'],['Start date',g.startDate?fmt(g.startDate):'—'],['Feed/lb cost',g.perLbFeedCost>0?'$'+g.perLbFeedCost:'—']].map(([l,v])=>(
            <div key={l}>
              <div style={{fontSize:10,color:'#9ca3af',marginBottom:1}}>{l}</div>
              <div style={{fontWeight:600,color:'#374151',fontSize:12}}>{v}</div>
            </div>
          ))}
        </div>
        {gDailys.length>0&&<div style={{borderLeft:'1px solid #e5e7eb',paddingLeft:16,flexShrink:0,fontSize:11}}>
          <div style={{color:'#6b7280',marginBottom:3}}>Last: {fmt(gDailys[0].date)}</div>
          <div style={{display:'flex',gap:8}}>
            {lastFeed>0&&<span style={{color:'#92400e',fontWeight:600}}>🌾 {lastFeed} lbs</span>}
            {lastCount>0&&<span style={{color:'#374151'}}>🐔 {lastCount}</span>}
            {recentMort>0&&<span style={{color:'#b91c1c',fontWeight:600}}>💀 {recentMort}</span>}
          </div>
        </div>}
      </div>
    );
  };

  return (
    <div style={{minHeight:'100vh',background:'#f1f3f2'}}>
      <Header/>
      <div style={{padding:'1rem',maxWidth:1100,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:20,fontWeight:700,color:'#111827'}}>Layer Groups <span style={{fontSize:13,fontWeight:400,color:'#6b7280'}}>{active.length} active · {retired.length} retired</span></div>
          <button onClick={()=>{setForm(EMPTY_LG);setEditId(null);setShowForm(true);}} style={{padding:'7px 18px',borderRadius:8,border:'none',background:'#085041',color:'white',cursor:'pointer',fontSize:12,fontWeight:600}}>+ Add Group</button>
        </div>
        {active.length>0&&<div style={{marginBottom:8,fontSize:12,fontWeight:600,color:'#4b5563',letterSpacing:.3}}>ACTIVE GROUPS</div>}
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>{active.map(g=><Card key={g.id} g={g}/>)}</div>
        {retired.length>0&&<><div style={{marginBottom:8,fontSize:12,fontWeight:600,color:'#4b5563',letterSpacing:.3}}>RETIRED GROUPS</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>{retired.map(g=><Card key={g.id} g={g}/>)}</div></>}
        {layerGroups.length===0&&<div style={{textAlign:'center',padding:'3rem',color:'#9ca3af',fontSize:13}}>No layer groups yet.</div>}
      </div>
      {showForm&&(
        <div onClick={closeLayerForm} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.45)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'1rem',overflowY:'auto'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:12,width:'100%',maxWidth:520,boxShadow:'0 8px 32px rgba(0,0,0,.2)',marginTop:40}}>
            <div style={{padding:'14px 20px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'white'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{fontSize:15,fontWeight:600,color:'#b45309'}}>{editId?'Edit Layer Group':'New Layer Group'}</div>
                {editId&&<div style={{marginLeft:8,fontSize:11,color:'#9ca3af'}}>Auto-saves as you type</div>}
                {editId&&(()=>{
                  const idx=sorted.findIndex(g=>g.id===editId);
                  const prev=idx>0?sorted[idx-1]:null;
                  const next=idx<sorted.length-1?sorted[idx+1]:null;
                  const ns=(on)=>({padding:'3px 10px',borderRadius:6,border:'1px solid #d1d5db',background:on?'white':'#f9fafb',color:on?'#374151':'#d1d5db',cursor:on?'pointer':'default',fontSize:11,fontWeight:600,fontFamily:'inherit'});
                  return <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    <button disabled={!prev} style={ns(!!prev)} onClick={()=>{if(prev){closeLayerForm();setTimeout(()=>{const f={...EMPTY_LG,...prev,originalCount:prev.originalCount||'',currentCount:prev.currentCount||'',feedLbs:prev.feedLbs||'',gritLbs:prev.gritLbs||'',totalEggs:prev.totalEggs||'',perLbFeedCost:prev.perLbFeedCost||'',perLbGritCost:prev.perLbGritCost||''};setForm(f);setOriginalForm(f);setEditId(prev.id);setShowForm(true);},50);}}}>{'\u2039 '+(prev?prev.name:'\u2014')}</button>
                    <span style={{fontSize:10,color:'#9ca3af'}}>{idx+1}/{sorted.length}</span>
                    <button disabled={!next} style={ns(!!next)} onClick={()=>{if(next){closeLayerForm();setTimeout(()=>{const f={...EMPTY_LG,...next,originalCount:next.originalCount||'',currentCount:next.currentCount||'',feedLbs:next.feedLbs||'',gritLbs:next.gritLbs||'',totalEggs:next.totalEggs||'',perLbFeedCost:next.perLbFeedCost||'',perLbGritCost:next.perLbGritCost||''};setForm(f);setOriginalForm(f);setEditId(next.id);setShowForm(true);},50);}}}>{(next?next.name:'\u2014')+' \u203a'}</button>
                  </div>;
                })()}
              </div>
              <button onClick={closeLayerForm} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#9ca3af'}}>×</button>
            </div>
            <div style={{padding:'16px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxHeight:'70vh',overflowY:'auto'}}>
              <div style={{gridColumn:'1/-1'}}><label style={S.label}>Group Name *</label><input value={form.name} onChange={e=>updLayer('name',e.target.value)} placeholder="e.g. Eggmobile #2 - 2026"/></div>
              <div><label style={S.label}>Status</label><select value={form.status} onChange={e=>updLayer('status',e.target.value)}><option value="active">Active</option><option value="retired">Retired</option></select></div>
              <div><label style={S.label}>House / Location</label><input value={form.house} onChange={e=>updLayer('house',e.target.value)}/></div>
              <div><label style={S.label}>Start Date</label><input type="date" value={form.startDate} onChange={e=>updLayer('startDate',e.target.value)}/></div>
              <div><label style={S.label}>Original Count</label><input type="number" min="0" value={form.originalCount||''} onChange={e=>updLayer('originalCount',e.target.value)}/></div>
              <div><label style={S.label}>Current Count</label><input type="number" min="0" value={form.currentCount||''} onChange={e=>updLayer('currentCount',e.target.value)}/></div>
              <div><label style={S.label}>Last Count Date</label><input type="date" value={form.lastCountDate} onChange={e=>updLayer('lastCountDate',e.target.value)}/></div>
              <div><label style={S.label}>Total Eggs</label><input type="number" min="0" value={form.totalEggs||''} onChange={e=>updLayer('totalEggs',e.target.value)}/></div>
              <div><label style={S.label}>Total Feed Used (lbs)</label><input type="number" min="0" step="0.1" value={form.feedLbs||''} onChange={e=>updLayer('feedLbs',e.target.value)}/></div>
              <div><label style={S.label}>Per Lb Feed Cost ($)</label><input type="number" min="0" step="0.01" value={form.perLbFeedCost||''} onChange={e=>updLayer('perLbFeedCost',e.target.value)}/></div>
              <div><label style={S.label}>Total Grit Used (lbs)</label><input type="number" min="0" step="0.1" value={form.gritLbs||''} onChange={e=>updLayer('gritLbs',e.target.value)}/></div>
              <div><label style={S.label}>Per Lb Grit Cost ($)</label><input type="number" min="0" step="0.01" value={form.perLbGritCost||''} onChange={e=>updLayer('perLbGritCost',e.target.value)}/></div>
              <div style={{gridColumn:'1/-1'}}><label style={S.label}>Notes</label><textarea value={form.notes} onChange={e=>updLayer('notes',e.target.value)} rows={3} style={{resize:'vertical'}}/></div>
            </div>
            <div style={{padding:'12px 20px',borderTop:'1px solid #e5e7eb',display:'flex',gap:8}}>
              {editId ? (
                <button onClick={closeLayerForm} style={{...S.btnPrimary,width:'auto',padding:'8px 20px'}}>Done</button>
              ) : (
                <button onClick={save} style={{...S.btnPrimary,width:'auto',padding:'8px 20px'}}>Add group</button>
              )}
              <button onClick={closeLayerForm} style={S.btnGhost}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── LAYER DAILYS VIEW ──
const LayerDailysView = ({sb, fmt, Header, authState, layerGroups, pendingEdit, setPendingEdit, refreshDailys}) => {
  const {useState,useEffect}=React;
  const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [teamMembers,setTeamMembers]=useState([]);
  const [fGroup,setFGroup]=useState('');
  const [fTeam,setFTeam]=useState('');
  const [fFrom,setFFrom]=useState('');
  const [fTo,setFTo]=useState('');
  const EMPTY={date:todayStr(),teamMember:'',batchLabel:'',feedType:'LAYER',feedLbs:'',gritLbs:'',layerCount:'',groupMoved:true,watererChecked:true,mortalityCount:'',mortalityReason:'',comments:''};
  const [form,setForm]=useState(EMPTY);

  const PAGE=1000;
  const [page,setPage]=useState(0);
  const [hasMore,setHasMore]=useState(false);

  useEffect(()=>{
    sb.from('layer_dailys').select('*').order('date',{ascending:false}).range(0,PAGE-1).then(({data})=>{
      if(data){
        setRecords(data);setHasMore(data.length===PAGE);
        if(pendingEdit?.viewName==='layerdailys'&&pendingEdit?.id){
          const rec=data.find(r=>r.id===pendingEdit.id);
          if(rec){openEdit(rec);setPendingEdit(null);}
        }
      }
      setLoading(false);
    });
    sb.from('webform_config').select('data').eq('key','team_members').maybeSingle().then(({data})=>{if(data?.data)setTeamMembers(data.data);});
  },[]);

  // Auto-load all pages on mount
  React.useEffect(()=>{
    if(hasMore){
      const next=page+1;
      sb.from('layer_dailys').select('*').order('date',{ascending:false}).range(next*PAGE,(next+1)*PAGE-1).then(({data})=>{
        if(data){setRecords(r=>[...r,...data]);setHasMore(data.length===PAGE);setPage(next);}
      });
    }
  },[hasMore,page]);

  function openEdit(d){setForm({date:d.date||todayStr(),teamMember:d.team_member||'',batchLabel:d.batch_label||'',feedType:d.feed_type||'LAYER',feedLbs:d.feed_lbs!=null?d.feed_lbs:'',gritLbs:d.grit_lbs!=null?d.grit_lbs:'',layerCount:d.layer_count!=null?d.layer_count:'',groupMoved:d.group_moved!==false,watererChecked:d.waterer_checked!==false,mortalityCount:d.mortality_count!=null?d.mortality_count:'',mortalityReason:d.mortality_reason||'',comments:d.comments||''});setEditId(d.id);setShowForm(true);}
  const [showAddModal,setShowAddModal]=useState(false);
  async function save(){
    const rec={date:form.date,team_member:form.teamMember,batch_label:form.batchLabel,feed_type:form.feedType||'LAYER',feed_lbs:form.feedLbs!==''?parseFloat(form.feedLbs):0,grit_lbs:form.gritLbs!==''?parseFloat(form.gritLbs):0,layer_count:form.layerCount!==''?parseInt(form.layerCount):null,group_moved:form.groupMoved,waterer_checked:form.watererChecked,mortality_count:form.mortalityCount!==''?parseInt(form.mortalityCount):0,mortality_reason:form.mortalityReason||null,comments:form.comments||null};
    if(editId){
      const {error}=await sb.from('layer_dailys').update(rec).eq('id',editId);
      if(error){alert('Save failed: '+error.message);return;}
      setRecords(p=>p.map(r=>r.id===editId?{...r,...rec}:r));
      // Model X: hen count is the anchor. If this edit has a hen count, update the housing anchor.
      // Mortality changes don't touch current_count (projected math handles them at display time).
      const lc=parseInt(rec.layer_count);
      if(!isNaN(lc) && lc>=0 && rec.batch_label){
        const result = await setHousingAnchorFromReport(sb, rec.batch_label, lc, rec.date);
        if(!result || !result.ok){
          if(result && result.reason==='ambiguous-batch'){
            alert('Hen count saved on the report, but the housing anchor was NOT updated.\n\nThe batch "'+result.batchName+'" has multiple active housings ('+result.housingNames.join(', ')+'). Please go to Layers \u203a Housings and set the count manually on the correct housing.');
          } else if(result && result.reason==='no-match'){
            alert('Hen count saved on the report, but no matching housing was found for "'+rec.batch_label+'". Please update the housing count manually if needed.');
          }
        }
      }
      refreshDailys&&refreshDailys('layer');
      setShowForm(false);setEditId(null);
    } else {
      const {data,error}=await sb.from('layer_dailys').insert({...rec,submitted_at:new Date().toISOString()}).select().single();
      if(error){alert('Save failed: '+error.message);return;}
      if(data){setRecords(p=>[data,...p]);}
      // Hen count → update housing anchor
      const lc=parseInt(rec.layer_count);
      if(!isNaN(lc) && lc>=0 && rec.batch_label){
        const result = await setHousingAnchorFromReport(sb, rec.batch_label, lc, rec.date);
        if(!result || !result.ok){
          if(result && result.reason==='ambiguous-batch'){
            alert('Hen count saved on the report, but the housing anchor was NOT updated.\n\nThe batch "'+result.batchName+'" has multiple active housings ('+result.housingNames.join(', ')+'). Please go to Layers \u203a Housings and set the count manually on the correct housing.');
          } else if(result && result.reason==='no-match'){
            alert('Hen count saved on the report, but no matching housing was found for "'+rec.batch_label+'". Please update the housing count manually if needed.');
          }
        }
      }
      refreshDailys&&refreshDailys('layer');
      setShowForm(false);setEditId(null);
    }
  }
  function del(id){
    window._wcfConfirmDelete?.('Delete this daily report? This cannot be undone.',async()=>{
      // Note: deleting a report does NOT roll back the housing anchor automatically
      // because anchors might have been overwritten by later reports. If the user needs
      // to correct an anchor, they should submit a new report with the corrected count.
      await sb.from('layer_dailys').delete().eq('id',id);
      setRecords(p=>p.filter(r=>r.id!==id));
      refreshDailys&&refreshDailys('layer');
      setShowForm(false);setEditId(null);
    });
  }

  const groupOpts=(layerGroups||[]).filter(g=>g.status==='active').map(g=>g.name);
  const allGroups=[...new Set(records.map(r=>r.batch_label).filter(Boolean))].sort();
  const teamOpts=[...new Set(records.map(r=>r.team_member).filter(Boolean))].sort();
  const filtered=records.filter(r=>(!fGroup||r.batch_label===fGroup)&&(!fTeam||r.team_member===fTeam)&&(!fFrom||r.date>=fFrom)&&(!fTo||r.date<=fTo));
  const fi={padding:'6px 10px',borderRadius:6,border:'1px solid #d1d5db',fontSize:12,fontFamily:'inherit',background:'white',width:'auto'};

  return (
    <div style={{minHeight:'100vh',background:'#f1f3f2'}}>
      <Header/>
      <div style={{padding:'1rem',maxWidth:1100,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:'#111827'}}>Layer Daily Reports</div>
            <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>{records.length} total · {filtered.length} shown</div>
          </div>
          <button onClick={()=>setShowAddModal(true)} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'#085041',color:'white',fontWeight:600,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>+ Add Report</button>
        </div>
        {showAddModal&&<AdminAddReportModal sb={sb} formType="layer" onClose={()=>setShowAddModal(false)} onSaved={recs=>{setRecords(p=>[...recs,...p]);refreshDailys&&refreshDailys('layer');}}/>}
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
          <input type="date" value={fFrom} onChange={e=>setFFrom(e.target.value)} style={{...fi,width:130}}/>
          <span style={{fontSize:12,color:'#6b7280'}}>to</span>
          <input type="date" value={fTo} onChange={e=>setFTo(e.target.value)} style={{...fi,width:130}}/>
          <select value={fGroup} onChange={e=>setFGroup(e.target.value)} style={fi}><option value=''>All groups</option>{allGroups.map(g=><option key={g} value={g}>{g}</option>)}</select>
          {(fGroup||fFrom||fTo)&&<button onClick={()=>{setFGroup('');setFFrom('');setFTo('');}} style={{...fi,color:'#6b7280',cursor:'pointer'}}>Clear</button>}
        </div>
        {loading&&<div style={{textAlign:'center',padding:'3rem',color:'#9ca3af'}}>Loading...</div>}
        {!loading&&filtered.length===0&&<div style={{textAlign:'center',padding:'3rem',color:'#9ca3af',fontSize:13}}>No records found</div>}
        {!loading&&filtered.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {(()=>{const dates=[...new Set(filtered.map(r=>r.date))];return filtered.map((d,i)=>{
              const hasMort=parseInt(d.mortality_count)>0;
              const hasFeed=parseFloat(d.feed_lbs)>0;
              const hasGrit=parseFloat(d.grit_lbs)>0;
              const hasCount=parseInt(d.layer_count)>0;
              const comment=d.comments&&String(d.comments).trim().length>2?String(d.comments).trim():'';
              const notable=hasMort||comment;
              const prevDate=i>0?filtered[i-1].date:null;
              const showDivider=prevDate&&prevDate!==d.date;
              const dateIdx=dates.indexOf(d.date);
              const shadeBg=dateIdx%2===0?'white':'#f8fafc';
              return (
                <React.Fragment key={d.id}>
                  {showDivider&&<div style={{height:2,background:'#9ca3af',margin:'6px 0',borderRadius:1}}/>}
                  <div onClick={()=>openEdit(d)} style={{
                    background:'white',borderRadius:8,cursor:'pointer',
                    border:notable?'1.5px solid #fca5a5':'1px solid #e5e7eb',
                    padding:'8px 14px',display:'flex',flexDirection:'column',gap:4,
                  background:shadeBg}} className="hoverable-tile">

  const [form,setForm]=useState(EMPTY);

  const fromRecords=[...new Set(pigDailys.map(d=>d.batch_label).filter(Boolean))].sort();
  const groupList=[...new Set([...feederGroups.map(g=>g.batchName),...feederGroups.flatMap(g=>(g.subBatches||[]).map(s=>s.name))].filter(Boolean))].sort();

  useEffect(()=>{
    sb.from('webform_config').select('data').eq('key','team_members').maybeSingle().then(({data})=>{if(data?.data)setTeamMembers(data.data);});
  },[]);
  useEffect(()=>{
    if(pendingEdit?.viewName==='pigdailys'&&pendingEdit?.id&&pigDailys.length>0){
      const rec=pigDailys.find(r=>r.id===pendingEdit.id);
      if(rec){openEdit(rec);setPendingEdit(null);}
    }
  },[pendingEdit,pigDailys]);

  function openEdit(d){setForm({date:d.date||todayStr(),teamMember:d.team_member||'',batchLabel:d.batch_label||'',pigCount:d.pig_count!=null?d.pig_count:'',feedLbs:d.feed_lbs!=null?d.feed_lbs:'',groupMoved:d.group_moved!==false,nippleDrinkerMoved:d.nipple_drinker_moved!==false,nippleDrinkerWorking:d.nipple_drinker_working!==false,troughsMoved:d.troughs_moved!==false,fenceWalked:d.fence_walked!==false,fenceVoltage:d.fence_voltage!=null?d.fence_voltage:'',issues:d.issues||''});setEditId(d.id);setShowForm(true);}
  const [showAddModal,setShowAddModal]=useState(false);
