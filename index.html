                </div>
              </div>
            ))}
          </div>

          {/* Webforms Admin card — admin only */}
          {authState?.role==="admin"&&(
            <div onClick={()=>setView("webforms")}
              style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:14,padding:"16px 22px",cursor:"pointer",boxShadow:"0 2px 6px rgba(0,0,0,.06)",display:"flex",alignItems:"center",gap:16}}>
              <div style={{fontSize:32}}>⚙️</div>
              <div style={{fontSize:16,fontWeight:700,color:"#92400e"}}>Admin</div>
              <div style={{marginLeft:"auto",fontSize:12,color:"#92400e",fontWeight:600}}>Manage →</div>
            </div>
          )}


{/* ── Missed Daily Reports ── */}
          {allMissed.length>0&&(
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:600,color:'#b91c1c',letterSpacing:.3}}>⚠ MISSED DAILY REPORTS</div>
                <button onClick={()=>clearAllMissed(allMissed.map(m=>m.key))} style={{fontSize:11,color:'#6b7280',background:'none',border:'1px solid #d1d5db',borderRadius:6,padding:'3px 10px',cursor:'pointer',fontFamily:'inherit'}}>Clear all</button>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {allMissed.map(m=>(
                  <div key={m.key} style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'10px 16px',display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:18}}>{m.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:'#b91c1c'}}>{m.label}</div>
                      <div style={{fontSize:11,color:'#9ca3af'}}>{m.type} · No daily report for {fmt(m.date)}</div>
                    </div>
                    <button onClick={()=>clearMissedEntry(m.key)} style={{fontSize:11,color:'#6b7280',background:'white',border:'1px solid #d1d5db',borderRadius:6,padding:'3px 10px',cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>Clear</button>
                  </div>
                ))}
              </div>
            </div>
          )}
          {allMissed.length===0&&(activeBroilerBatches2.length>0||activePigBatches2.length>0||activeLayerGroups2.length>0)&&(
            <div style={{background:'#ecfdf5',border:'1px solid #a7f3d0',borderRadius:10,padding:'10px 16px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:16}}>✅</span>
              <div style={{fontSize:12,color:'#065f46',fontWeight:500}}>All active batches had daily reports entered for the past 7 days</div>
            </div>
          )}

          {/* ── Admin Weekly Report Table ── */}



          {/* What's happening this week */}
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#4b5563",marginBottom:8,letterSpacing:.3}}>NEXT 30 DAYS</div>
            {weekEvents.length===0?(
              <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"20px",textAlign:"center",color:"#9ca3af",fontSize:13}}>
                Nothing scheduled in the next 30 days
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {weekEvents.map((e,i)=>(
                  <div key={i} onClick={()=>{if(e.type==='wt-4wk'||e.type==='wt-6wk'){setView('list');}}}
                    style={{background:e.reminder?'#eff6ff':'white',border:e.reminder?'1px solid #bfdbfe':'1px solid #e5e7eb',borderRadius:10,padding:"10px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 3px rgba(0,0,0,.04)",cursor:e.reminder?'pointer':'default'}}>
                    <span style={{fontSize:18}}>{e.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:e.reminder?600:500,color:e.reminder?'#1e40af':"#111827"}}>{e.label}</div>
                      <div style={{fontSize:11,color:"#9ca3af"}}>{fmt(e.date)}{e.reminder?' · click to open batch':''}</div>
                    </div>
                    {e.reminder
                      ? <span style={{fontSize:10,fontWeight:700,color:'#1d4ed8',background:'#dbeafe',padding:'2px 8px',borderRadius:10}}>REMINDER</span>
                      : <div style={{width:8,height:8,borderRadius:4,background:e.color,flexShrink:0}}/>
                    }
                  </div>
                ))}
              </div>
            )}
          </div>



          {isAdmin&&allRecentReports.length>0&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#4b5563',marginBottom:10,letterSpacing:.3}}>LAST 5 DAYS — ALL DAILY REPORTS</div>
              {(()=>{
                // Group by date, then within each date group by animal type
                const dates = [...new Set(allRecentReports.map(r=>r.date))].sort().reverse();
                const typeOrder = {'🐔 Broiler':0,'🐷 Pig':1,'🐓 Layer':2,'🥚 Layer':2,'🥚 Egg':3};
                const typeColors = {'🐔 Broiler':'#1e3a5f','🐷 Pig':'#5b21b6','🐓 Layer':'#92400e','🥚 Layer':'#92400e','🥚 Egg':'#b45309'};
                const typeBg = {'🐔 Broiler':'#eff6ff','🐷 Pig':'#f5f3ff','🐓 Layer':'#fffbeb','🥚 Layer':'#fffbeb','🥚 Egg':'#fefce8'};
                return dates.map((date, di)=>{
                  const dayRecs = allRecentReports.filter(r=>r.date===date).sort((a,b)=>(typeOrder[a.type]??9)-(typeOrder[b.type]??9));
                  const types = [...new Set(dayRecs.map(r=>r.type))];
                  return (
                    <div key={date}>
                      {di>0&&<div style={{height:3,background:'#9ca3af',borderRadius:2,margin:'8px 0'}}/>}
                      <div style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:6,display:'flex',alignItems:'center',gap:8}}>
                        <span>{fmt(date)}</span>
                        <span style={{fontSize:11,fontWeight:400,color:'#9ca3af'}}>{dayRecs.length} report{dayRecs.length!==1?'s':''}</span>
                      </div>
                      {types.map(type=>{
                        const typeRecs = dayRecs.filter(r=>r.type===type);
                        const color = typeColors[type]||'#374151';
                        const bg = typeBg[type]||'#f9fafb';
                        return (
                          <div key={type} style={{marginBottom:6}}>
                            <div style={{fontSize:10,fontWeight:700,color:color,letterSpacing:.5,marginBottom:3,paddingLeft:2}}>{type.toUpperCase()}</div>
                            <div style={{display:'flex',flexDirection:'column',gap:3}}>
                              {typeRecs.map((r,i)=>{
                                const d = r.raw||{};
                                const hasMort = parseInt(d.mortality_count)>0;
                                const hasIssue = (d.issues&&String(d.issues).trim().length>2) || (d.comments&&String(d.comments).trim().length>2&&String(d.comments).trim()!=='0');
                                const lowVolt = d.fence_voltage!=null&&parseFloat(d.fence_voltage)<3;
                                const notable = hasMort||hasIssue||lowVolt||d.group_moved===false||d.waterer_checked===false||d.nipple_drinker_working===false||d.fence_walked===false;
                                const dateIdx = di;
                                const shadeBg = dateIdx%2===0?'white':'#f8fafc';
                                return (
                                  <div key={i} onClick={()=>{setPendingEdit({id:r.id,viewName:r.view});setView(r.view);}} style={{
                                    background:shadeBg,borderRadius:7,
                                    border:notable?'1.5px solid #fca5a5':'1px solid #e5e7eb',
                                    padding:'8px 12px',cursor:'pointer',display:'flex',flexDirection:'column',gap:4
                                  }} className="hoverable-tile">
                                    {(()=>{
                                      const d=r.raw;
                                      if(r.type==='🐔 Broiler'){
                                        const hasFeed=parseFloat(d.feed_lbs)>0;const hasGrit=parseFloat(d.grit_lbs)>0;
                                        const hasMort=parseInt(d.mortality_count)>0;
                                        const comment=d.comments&&String(d.comments).trim().length>2?String(d.comments).trim():'';
                                        return (<>
                                          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                                            <span style={{fontWeight:700,color:'#111827',minWidth:80,flexShrink:0,fontSize:12}}>{d.batch_label||'—'}</span>
                                            <span style={{color:'#6b7280',fontSize:12,flexShrink:0}}>{d.team_member||'—'}</span>
                                            <span style={{color:hasFeed?'#92400e':'#9ca3af',fontWeight:hasFeed?600:400,fontSize:12,minWidth:90}}>{hasFeed?`🌾 ${parseFloat(d.feed_lbs).toLocaleString()} lbs`:'no feed'}{hasFeed&&d.feed_type&&<span style={{marginLeft:4,fontSize:10,fontWeight:700,padding:'1px 5px',borderRadius:4,background:d.feed_type==='STARTER'?'#dbeafe':'#d1fae5',color:d.feed_type==='STARTER'?'#1e40af':'#065f46'}}>{d.feed_type}</span>}</span>
                                            <span style={{color:'#374151',fontSize:12,minWidth:70}}>{hasGrit?`grit ${d.grit_lbs} lbs`:'no grit'}</span>
                                            <span style={{color:hasMort?'#b91c1c':'#9ca3af',fontWeight:hasMort?700:400,fontSize:12}}>{hasMort?`💀 ${d.mortality_count} mort.`:'no mort.'}</span>
                                            <span style={{fontSize:11,color:d.group_moved===false?'#b91c1c':'#6b7280'}}>{d.group_moved===false?'⚠ not moved':'moved ✓'}</span>
                                            <span style={{fontSize:11,color:d.waterer_checked===false?'#b91c1c':'#6b7280'}}>{d.waterer_checked===false?'⚠ waterer':'waterer ✓'}</span>
                                          </div>
                                          {comment&&<div style={{fontSize:11,color:'#374151',paddingLeft:92,fontStyle:'italic'}}>{comment}</div>}
                                        </>);
                                      }
                                      if(r.type==='🐓 Layer'){
                                        const hasFeed=parseFloat(d.feed_lbs)>0;const hasGrit=parseFloat(d.grit_lbs)>0;
                                        const hasCount=parseInt(d.layer_count)>0;const hasMort=parseInt(d.mortality_count)>0;
                                        const comment=d.comments&&String(d.comments).trim().length>2?String(d.comments).trim():'';
                                        return (<>
                                          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                                            <span style={{fontWeight:700,color:'#111827',minWidth:110,flexShrink:0,fontSize:12}}>{d.batch_label||'—'}</span>
                                            <span style={{color:'#6b7280',fontSize:12,flexShrink:0}}>{d.team_member||'—'}</span>
                                            <span style={{color:hasFeed?'#92400e':'#9ca3af',fontWeight:hasFeed?600:400,fontSize:12,minWidth:90}}>{hasFeed?`🌾 ${parseFloat(d.feed_lbs).toLocaleString()} lbs`:'no feed'}{hasFeed&&d.feed_type&&<span style={{marginLeft:4,fontSize:10,fontWeight:700,padding:'1px 5px',borderRadius:4,background:d.feed_type==='STARTER'?'#dbeafe':d.feed_type==='GROWER'?'#d1fae5':'#fef3c7',color:d.feed_type==='STARTER'?'#1e40af':d.feed_type==='GROWER'?'#065f46':'#92400e'}}>{d.feed_type}</span>}</span>
                                            <span style={{color:'#374151',fontSize:12,minWidth:70}}>{hasGrit?`grit ${d.grit_lbs} lbs`:'no grit'}</span>
                                            <span style={{color:'#374151',fontSize:12,minWidth:70}}>{hasCount?`🐔 ${d.layer_count} hens`:'no count'}</span>
                                            <span style={{color:hasMort?'#b91c1c':'#9ca3af',fontWeight:hasMort?700:400,fontSize:12}}>{hasMort?`💀 ${d.mortality_count} mort.`:'no mort.'}</span>
                                            <span style={{fontSize:11,color:d.group_moved===false?'#b91c1c':'#6b7280'}}>{d.group_moved===false?'⚠ not moved':'moved ✓'}</span>
                                            <span style={{fontSize:11,color:d.waterer_checked===false?'#b91c1c':'#6b7280'}}>{d.waterer_checked===false?'⚠ waterer':'waterer ✓'}</span>
                                          </div>
                                          {comment&&<div style={{fontSize:11,color:'#374151',paddingLeft:115,fontStyle:'italic'}}>{comment}</div>}
                                        </>);
                                      }
                                      if(r.type==='🐷 Pig'){
                                        const hasFeed=parseFloat(d.feed_lbs)>0;const hasCount=parseInt(d.pig_count)>0;
                                        const hasVolt=d.fence_voltage!=null&&String(d.fence_voltage).trim()!=='';
                                        const voltColor=v=>v<3?'#b91c1c':v<5?'#92400e':'#065f46';
                                        const issues=d.issues&&String(d.issues).trim().length>2?String(d.issues).trim():'';
                                        return (<>
                                          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                                            <span style={{fontWeight:700,color:'#111827',minWidth:100,flexShrink:0,fontSize:12}}>{d.batch_label||'—'}</span>
                                            <span style={{color:'#6b7280',fontSize:12,flexShrink:0}}>{d.team_member||'—'}</span>
                                            <span style={{color:hasFeed?'#92400e':'#9ca3af',fontWeight:hasFeed?600:400,fontSize:12,minWidth:90}}>{hasFeed?`🌾 ${parseFloat(d.feed_lbs).toLocaleString()} lbs`:'no feed'}</span>
                                            <span style={{color:'#7c3aed',fontSize:12,minWidth:60}}>{hasCount?`🐷 ${d.pig_count} pigs`:'no count'}</span>
                                            <span style={{color:hasVolt?voltColor(parseFloat(d.fence_voltage)):'#9ca3af',fontWeight:hasVolt?600:400,fontSize:12,minWidth:60}}>{hasVolt?`⚡ ${d.fence_voltage} kV`:'no voltage'}</span>
                                            <span style={{fontSize:11,color:d.group_moved===false?'#b91c1c':'#6b7280'}}>{d.group_moved===false?'⚠ not moved':'moved ✓'}</span>
                                            <span style={{fontSize:11,color:d.nipple_drinker_working===false?'#b91c1c':'#6b7280'}}>{d.nipple_drinker_working===false?'⚠ nipple':'nipple ✓'}</span>
                                            <span style={{fontSize:11,color:d.fence_walked===false?'#b91c1c':'#6b7280'}}>{d.fence_walked===false?'⚠ fence':'fence ✓'}</span>
                                          </div>
                                          {issues&&<div style={{fontSize:11,color:'#b91c1c',paddingLeft:104,fontStyle:'italic'}}>⚠ {issues}</div>}
                                        </>);
                                      }
                                      if(r.type==='🥚 Egg'){
                                        const total=(parseInt(d.group1_count)||0)+(parseInt(d.group2_count)||0)+(parseInt(d.group3_count)||0)+(parseInt(d.group4_count)||0);
                                        const groups=[[d.group1_name,d.group1_count],[d.group2_name,d.group2_count],[d.group3_name,d.group3_count],[d.group4_name,d.group4_count]].filter(([n,c])=>n&&parseInt(c)>0);
                                        const comment=d.comments&&String(d.comments).trim().length>2?String(d.comments).trim():'';
                                        return (<>
                                          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                                            <span style={{fontWeight:700,color:'#b45309',fontSize:12,flexShrink:0}}>🥚 {total} eggs</span>
                                            <span style={{color:'#6b7280',fontSize:12,flexShrink:0}}>{d.team_member||'—'}</span>
                                            {groups.map(([n,c])=><span key={n} style={{color:'#374151',fontSize:11}}>{n}: <strong>{c}</strong></span>)}
                                            {parseFloat(d.dozens_on_hand)>0&&<span style={{color:'#065f46',fontWeight:600,fontSize:12}}>📦 {d.dozens_on_hand} doz</span>}
                                          </div>
                                          {comment&&<div style={{fontSize:11,color:'#374151',paddingLeft:80,fontStyle:'italic'}}>{comment}</div>}
                                        </>);
                                      }
                                      return null;
                                    })()}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                });
              })()}
            </div>
          )}

        </div>
      </div>
    );
  }

  // ── FORM ──
  if(showForm) return (
    <div>
      {showUsers&&<UsersModal sb={sb} authState={authState} allUsers={allUsers} setAllUsers={setAllUsers} setShowUsers={setShowUsers} loadUsers={loadUsers}/>}
      <Header/>
      <div style={{background:"rgba(0,0,0,.45)",minHeight:"100vh",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"1.5rem 1rem"}} className="no-print">

        {/* Floating prev/next side buttons — desktop only */}
        {editId&&(()=>{
          const sorted=[...batches].sort((a,b)=>(a.name||'').localeCompare(b.name||'',undefined,{numeric:true}));
          const idx=sorted.findIndex(b=>b.id===editId);
          const prev=idx>0?sorted[idx-1]:null;
          const next=idx<sorted.length-1?sorted[idx+1]:null;
          const sideBtn=(on,label,onClick)=>({
            style:{position:'fixed',top:'50%',transform:'translateY(-50%)',zIndex:600,
              display:'flex',flexDirection:'column',alignItems:'center',gap:4,
              padding:'14px 8px',borderRadius:10,border:'1px solid #d1d5db',
              background:on?'white':'#f3f4f6',color:on?'#085041':'#d1d5db',
              cursor:on?'pointer':'default',boxShadow:on?'0 2px 8px rgba(0,0,0,.12)':'none',
              fontFamily:'inherit',transition:'all .15s'},
            onClick:on?onClick:undefined
          });
          return (<>
            <button {...sideBtn(!!prev,prev?.name,()=>{closeForm();setTimeout(()=>openEdit(prev),50);})}
              style={{...sideBtn(!!prev).style, left:'max(8px, calc(50% - 430px - 60px))'}}>
              <span style={{fontSize:20,lineHeight:1}}>‹</span>
              {prev&&<span style={{fontSize:9,fontWeight:700,maxWidth:40,textAlign:'center',wordBreak:'break-all',lineHeight:1.2}}>{prev.name}</span>}
            </button>
            <button {...sideBtn(!!next,next?.name,()=>{closeForm();setTimeout(()=>openEdit(next),50);})}
              style={{...sideBtn(!!next).style, right:'max(8px, calc(50% - 430px - 60px))'}}>
              <span style={{fontSize:20,lineHeight:1}}>›</span>
              {next&&<span style={{fontSize:9,fontWeight:700,maxWidth:40,textAlign:'center',wordBreak:'break-all',lineHeight:1.2}}>{next.name}</span>}
            </button>
          </>);
        })()}

        <div style={{background:"white",borderRadius:12,width:"100%",maxWidth:806,border:"1px solid #e5e7eb",marginBottom:"2rem"}}>

          {/* Sticky header: title + batch name + close */}
          <div style={{padding:"12px 20px",borderBottom:"1px solid #e5e7eb",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"white",zIndex:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,color:"#9ca3af",flexShrink:0}}>{editId?"Edit Batch":"Add New Batch"}</div>
              {form.name&&<div style={{fontSize:18,fontWeight:700,color:"#085041",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{form.name}</div>}
            </div>
            <button onClick={closeForm} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#999",lineHeight:1,flexShrink:0}}>×</button>
          </div>

          <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>

            {/* Conflict alert */}
            {conflicts.length>0&&(()=>{
              const hard=conflicts.filter(c=>!c.soft);
              const soft=conflicts.filter(c=>c.soft);
              const hasHard=hard.length>0;
              return (
                <div style={{background:hasHard?"#fef2f2":"#fffbeb",border:"1px solid "+(hasHard?"#F09595":"#fde68a"),borderRadius:10,padding:"10px 14px"}}>
                  {hasHard&&(
                    <>
                      <div style={{color:"#791F1F",fontWeight:600,fontSize:13,marginBottom:4}}>{'\u26a0 Scheduling conflict detected:'}</div>
                      {hard.map((c,i)=><div key={'h'+i} style={{color:"#b91c1c",fontSize:12,marginTop:3}}>{'\u2022 '+c.message}</div>)}
                    </>
                  )}
                  {soft.length>0&&(
                    <div style={{marginTop:hasHard?10:0,paddingTop:hasHard?10:0,borderTop:hasHard?'1px solid #F09595':'none'}}>
                      <div style={{color:"#92400e",fontWeight:600,fontSize:13,marginBottom:4}}>{'\u26a0 Layer batch overlap (soft warning, save will go through):'}</div>
                      {soft.map((c,i)=><div key={'s'+i} style={{color:"#92400e",fontSize:12,marginTop:3}}>{'\u2022 '+c.message}</div>)}
                    </div>
                  )}
                  {hasHard&&(
                    <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #F09595",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                      <div style={{fontSize:12,color:"#791F1F",flex:1}}>You can override and save anyway if you know what you're doing (e.g. staggered timing, special arrangement).</div>
                      <button onClick={()=>submit(true)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"#A32D2D",color:"white",fontWeight:600,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
                        Override &amp; Save Anyway
                      </button>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Step 1 — Processing date + hatch suggestions */}
            <div style={{background:"#ecfdf5",border:"1px solid #a7f3d0",borderRadius:10,padding:"10px 14px"}}>
              <div style={{color:"#083d30",fontWeight:600,fontSize:12,marginBottom:8}}>
                Step 1 — Enter your target processing date
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
                <div>
                  <label style={{...S.label,color:"#085041"}}>Breed</label>
                  <select value={form.breed} onChange={e=>upd("breed",e.target.value)}>
                    <option value="CC">Cornish Cross {'\u2014'} 7 weeks</option>
                    <option value="WR">White Ranger {'\u2014'} 8 weeks</option>
                    {form.status==='processed'&&showLegacy&&(
                      <>
                        <option disabled value="__sep__">{'\u2500\u2500\u2500 Legacy \u2500\u2500\u2500'}</option>
                        {LEGACY_BREEDS.map(lb=>(

                )}
                {(form.documents||[]).map((doc,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'#f8fafc',border:'1px solid #e5e7eb',borderRadius:7,marginBottom:6}}>
                    {(()=>{const ext=(doc.name||'').split('.').pop().toLowerCase();const ico=ext==='pdf'?'📄':ext==='csv'?'📊':'📗';return <span style={{fontSize:18,flexShrink:0}}>{ico}</span>;})()}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:'#111827',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.name}</div>
                      <div style={{fontSize:10,color:'#9ca3af'}}>{doc.size?(Math.round(doc.size/1024)+' KB'):''}{doc.uploadedAt?' · '+new Date(doc.uploadedAt).toLocaleDateString():''}</div>
                    </div>
                    <a href={doc.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'#1d4ed8',fontWeight:600,textDecoration:'none',flexShrink:0}}>View</a>
                    <button onClick={()=>
                      confirmDelete('Remove this document? It cannot be recovered.',async()=>{
                        try { await sb.storage.from('batch-documents').remove([doc.path]); } catch(e){}
                        const newDocs=(form.documents||[]).filter((_,j)=>j!==i);
                        setForm(f=>({...f,documents:newDocs}));
                        const nb=batches.map(b=>b.id===editId?{...b,documents:newDocs}:b);
                        setBatches(nb); persist(nb);
                      })}
                      style={{fontSize:11,color:'#b91c1c',background:'none',border:'none',cursor:'pointer',flexShrink:0}}>Remove</button>
                  </div>
                ))}
              </div>
            )}          </div>

          <div style={{padding:"12px 20px",borderTop:"1px solid #e5e7eb",display:"flex",gap:8,alignItems:"center"}}>
            {editId
              ? <button style={S.btnDanger} onClick={()=>{del(editId);setShowForm(false);}}>Delete</button>
              : <button onClick={()=>submit(false)} style={{...S.btnPrimary,background:"#085041",cursor:"pointer"}}>Add batch</button>
            }
            <button style={S.btnGhost} onClick={closeForm}>Close</button>
            {editId&&<div style={{marginLeft:'auto',fontSize:11,color:'#9ca3af'}}>Auto-saves as you type</div>}
          </div>
        </div>
      </div>
    </div>
  );

  // ── BROILER HOME DASHBOARD ──
  if(view==="broilerHome") {
    const todayStr = todayISO();
    const activeBr  = batches.filter(b=>calcPoultryStatus(b)==='active');
    // Ignore batches before 2025 for all dashboard metrics
    const procBr    = batches.filter(b=>b.status==='processed'&&(b.hatchDate||'')>='2025');
    const ccBr      = procBr.filter(b=>b.breed==='CC');
    const wrBr      = procBr.filter(b=>b.breed==='WR');
    const avg = (arr,fn) => { const v=arr.map(fn).filter(x=>x!=null&&!isNaN(x)); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };
    const fmtN = (n,d=1) => n!=null?n.toFixed(d):'—';

    // Get true feed/mort: daily reports for B-25+, manual fields for B-24
    const batchFeed = b => {
      if((/^b-24-/i).test(b.name)) return (b.brooderFeedLbs||0)+(b.schoonerFeedLbs||0);
      return broilerDailys.filter(d=>(d.batch_label||'').toLowerCase().trim().replace(/^\(processed\)\s*/,'')===b.name.toLowerCase().trim()).reduce((s,d)=>s+(parseFloat(d.feed_lbs)||0),0);
    };
    const batchMort = b => {
      if((/^b-24-/i).test(b.name)) return b.mortalityCumulative||0;
      return broilerDailys.filter(d=>(d.batch_label||'').toLowerCase().trim().replace(/^\(processed\)\s*/,'')===b.name.toLowerCase().trim()).reduce((s,d)=>s+(parseInt(d.mortality_count)||0),0);
    };

    const breedStats = arr => {
      if(arr.length<2) return null;
      return {
        count: arr.length,
        mort:  avg(arr, b=>b.birdCount>0?(batchMort(b)/b.birdCount*100):null),
        feedPerBird: avg(arr.filter(b=>b.totalToProcessor>0&&batchFeed(b)>0), b=>batchFeed(b)/(b.totalToProcessor||1)),
        dressed: avg(arr.filter(b=>parseFloat(b.avgDressedLbs)>0), b=>parseFloat(b.avgDressedLbs)),
        costPerBird: avg(arr.filter(b=>b.totalToProcessor>0&&(b.perLbStarterCost||0)>0&&batchFeed(b)>0), b=>{
          const isB24=(/^b-24-/i).test(b.name);
          const f=isB24?((b.brooderFeedLbs||0)*(b.perLbStarterCost||0)+(b.schoonerFeedLbs||0)*(b.perLbStandardCost||0)+(b.gritLbs||0)*(b.perLbGritCost||0)+(b.processingCost||0)):batchFeed(b)*(b.perLbStandardCost||0)+(b.processingCost||0);
          return b.totalToProcessor>0?f/b.totalToProcessor:null;
        }),
        daysOnFarm: avg(arr.filter(b=>b.hatchDate&&b.processingDate), b=>Math.round((new Date(b.processingDate+'T12:00:00')-new Date(b.hatchDate+'T12:00:00'))/86400000)),
      };
    };
    const ccStats = breedStats(ccBr);
    const wrStats = breedStats(wrBr);



    // Active batch cards
    const activeBatchDetails = activeBr.map(b=>{
      const live = calcTimeline(b.hatchDate,b.breed,b.processingDate);
      const inBrooder = live&&todayStr<live.brooderOut;
      const daysToProc = b.processingDate?Math.max(0,Math.round((new Date(b.processingDate+'T12:00:00')-new Date())/86400000)):null;
      const batchDailys = broilerDailys.filter(d=>(d.batch_label||'').toLowerCase().trim().replace(/^\(processed\)\s*/,'')===b.name.toLowerCase().trim());
      const daysActive = b.hatchDate?Math.max(1,Math.round((new Date()-new Date(b.hatchDate+'T12:00:00'))/86400000)):1;
      const reportRate = Math.round(new Set(batchDailys.map(d=>d.date)).size/daysActive*100);
      const feedSoFar = batchDailys.reduce((s,d)=>s+(parseFloat(d.feed_lbs)||0),0);
      const gritSoFar = batchDailys.reduce((s,d)=>s+(parseFloat(d.grit_lbs)||0),0);
      const mortSoFar = batchDailys.reduce((s,d)=>s+(parseInt(d.mortality_count)||0),0);
      const mortPct   = b.birdCount>0?(mortSoFar/b.birdCount*100).toFixed(1):null;
      const sameBreed = procBr.filter(b2=>b2.breed===b.breed&&b2.hatchDate&&b2.processingDate&&(b2.brooderFeedLbs||0)+(b2.schoonerFeedLbs||0)>0);
      const histFeedDay = sameBreed.length>=2?avg(sameBreed,b2=>{const tf=(b2.brooderFeedLbs||0)+(b2.schoonerFeedLbs||0);const d2=Math.round((new Date(b2.processingDate+'T12:00:00')-new Date(b2.hatchDate+'T12:00:00'))/86400000);return d2>0?tf/d2:null;}):null;
      const projFeed = histFeedDay?Math.round(histFeedDay*daysActive):null;
      const feedPct = projFeed&&projFeed>0?Math.round(feedSoFar/projFeed*100):null;
      const B2=BREED_STYLE[b.breed]||BREED_STYLE.CC;
      const phaseLabel = inBrooder
        ? (live?`Brooder · out ${fmtS(live.brooderOut)}`:'Brooder')
        : (live?`Schooner · out ${fmtS(live.schoonerOut)}`:'Schooner');
      return {b,inBrooder,daysToProc,daysActive,feedSoFar,mortSoFar,mortPct,phaseLabel,B2};
    });

    // Last 10 processed for trends
    const trend10 = [...procBr].sort((a,b)=>(b.processingDate||'').localeCompare(a.processingDate||'')).slice(0,10).reverse();

    const trendBar = (val,max,color) => (
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
        <div style={{flex:1,height:7,background:'#f0f0f0',borderRadius:4,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${Math.min(100,max>0?(val/max)*100:0)}%`,background:color,borderRadius:4}}/>
        </div>
        <span style={{fontSize:10,color:'#374151',fontWeight:600,minWidth:36,textAlign:'right'}}>{Math.round(val*10)/10}</span>
      </div>
    );

    // Financial
    const finBr = procBr.filter(b=>batchFeed(b)>0&&b.totalToProcessor>0);
    const totalLbsMeat = procBr.reduce((s,b)=>s+(b.totalToProcessor||0)*(parseFloat(b.avgDressedLbs)||0),0);
    const totalLbsWhole = procBr.reduce((s,b)=>s+(parseFloat(b.totalLbsWhole)||0),0);
    const totalLbsCuts  = procBr.reduce((s,b)=>s+(parseFloat(b.totalLbsCuts)||0),0);
    const wholePct = (totalLbsWhole+totalLbsCuts)>0?Math.round(totalLbsWhole/(totalLbsWhole+totalLbsCuts)*100):null;
    const cutsPct  = wholePct!=null?100-wholePct:null;
    const totalFeedCost = finBr.reduce((s,b)=>s+batchFeed(b)*(b.perLbStandardCost||0),0);
    const totalAllCost = finBr.reduce((s,b)=>s+batchFeed(b)*(b.perLbStandardCost||0)+(b.processingCost||0),0);
    const feedCostPct = totalAllCost>0?Math.round(totalFeedCost/totalAllCost*100):null;
    const totalProc = finBr.reduce((s,b)=>s+(b.totalToProcessor||0),0);

    // Lbs produced trend — last 10 processed batches, sorted oldest to newest
    const lbsTrend = [...procBr]
      .filter(b=>b.processingDate)
      .sort((a,b)=>a.processingDate.localeCompare(b.processingDate))
      .slice(-10)
      .map(b=>({
        name: b.name,
        date: b.processingDate,
        whole: parseFloat(b.totalLbsWhole)||0,
        cuts:  parseFloat(b.totalLbsCuts)||0,
        total: (parseFloat(b.totalLbsWhole)||0)+(parseFloat(b.totalLbsCuts)||0),
      }))
      .filter(b=>b.total>0);

    const recentDailys = [...broilerDailys].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

    const NavBtn = ({label,v}) => (
      <button onClick={()=>setView(v)} style={{padding:'8px 16px',borderRadius:8,border:'1px solid #d1d5db',background:'white',fontSize:12,fontWeight:600,color:'#374151',cursor:'pointer',fontFamily:'inherit'}}>
        {label}
      </button>
    );
    const StatTile = ({label,val,sub,color='#085041'}) => (
      <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:12,padding:'14px 16px'}}>
        <div style={{fontSize:11,color:'#6b7280',textTransform:'uppercase',letterSpacing:.8,marginBottom:4}}>{label}</div>
        <div style={{fontSize:24,fontWeight:700,color,lineHeight:1}}>{val}</div>
        {sub&&<div style={{fontSize:11,color:'#9ca3af',marginTop:3}}>{sub}</div>}
      </div>
    );
    const BreedCol = ({label,stats,color,bg}) => stats?(
      <div style={{flex:1,minWidth:220,background:bg,border:'1px solid #e5e7eb',borderRadius:12,padding:'14px 16px'}}>
        <div style={{fontSize:12,fontWeight:700,color,marginBottom:10}}>{label} <span style={{fontWeight:400,color:'#9ca3af'}}>({stats.count} batches)</span></div>
        {[
          {l:'Avg Mortality',v:stats.mort!=null?fmtN(stats.mort)+'%':'—'},
          {l:'Avg Feed / Bird',v:stats.feedPerBird!=null?fmtN(stats.feedPerBird,1)+' lbs':'—'},
          {l:'Avg Dressed Wt',v:stats.dressed!=null?fmtN(stats.dressed,2)+' lbs':'—'},
          {l:'Avg Cost / Bird',v:stats.costPerBird!=null?'$'+fmtN(stats.costPerBird,2):'—'},
          {l:'Avg Days on Farm',v:stats.daysOnFarm!=null?Math.round(stats.daysOnFarm)+' days':'—'},
        ].map(({l,v})=>(
          <div key={l} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6,paddingBottom:6,borderBottom:'1px solid rgba(0,0,0,.06)'}}>
            <span style={{color:'#6b7280'}}>{l}</span><span style={{fontWeight:700,color:'#111827'}}>{v}</span>
          </div>
        ))}
      </div>
    ):null;

    return (
      <div style={{minHeight:'100vh',background:'#f1f3f2'}}>
        {showUsers&&<UsersModal sb={sb} authState={authState} allUsers={allUsers} setAllUsers={setAllUsers} setShowUsers={setShowUsers} loadUsers={loadUsers}/>}
        <Header/>
        <div style={{padding:'1.25rem',maxWidth:1200,margin:'0 auto',display:'flex',flexDirection:'column',gap:'1.5rem'}}>



          {/* Key stats */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10}}>
            <StatTile label="Active Batches" val={activeBr.length}/>
            <StatTile label="Birds on Farm" val={activeBr.reduce((s,b)=>s+(parseInt(b.birdCountActual)||parseInt(b.birdCount)||0),0).toLocaleString()} color="#1e3a5f"/>
            <StatTile label="Projected Birds" val={activeBr.reduce((s,b)=>{const stats=calcBroilerStatsFromDailys(b,broilerDailys);return s+stats.projectedBirds;},0).toLocaleString()} color="#085041"/>
            <StatTile label="Processed Batches" val={procBr.length} color="#374151"/>
            <StatTile label="Total Lbs Produced" val={totalLbsMeat>0?Math.round(totalLbsMeat).toLocaleString()+' lbs':'\u2014'} color="#065f46"/>
          </div>

          {/* Active batch tracker */}
          {activeBatchDetails.length>0&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#4b5563',marginBottom:8,letterSpacing:.3}}>ACTIVE BATCHES</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:10}}>
                {activeBatchDetails.map(({b,inBrooder,daysToProc,daysActive,feedSoFar,mortSoFar,mortPct,phaseLabel,B2})=>(
                  <div key={b.id} onClick={()=>setView('list')} style={{background:'white',border:'1px solid #e5e7eb',borderRadius:12,padding:'14px 16px',cursor:'pointer'}} className="hoverable-tile">
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                      <span style={{fontSize:16}}>{inBrooder?'🐣':'🐔'}</span>
                      <strong style={{fontSize:13}}>{b.name}</strong>
                      <span style={S.badge(B2.bg,B2.tx)}>{b.breed}</span>
                      <span style={{marginLeft:'auto',fontSize:10,fontWeight:700,color:inBrooder?'#065f46':'#1e3a5f',background:inBrooder?'#ecfdf5':'#eff6ff',padding:'2px 8px',borderRadius:10}}>{inBrooder?'BROODER':'SCHOONER'}</span>
                    </div>
                    {(()=>{
                      const stats = calcBroilerStatsFromDailys(b, broilerDailys);
                      const dayOne = parseInt(b.birdCountActual)||parseInt(b.birdCount)||0;
                      return [
                        {l:'Days to processing',v:daysToProc!=null?daysToProc+' days':'\u2014',warn:daysToProc!=null&&daysToProc<=7},
                        {l:'Days on farm',v:daysActive+' days'},
                        {l:'Current phase',v:phaseLabel},
                        {l:'Birds (day 1)',v:dayOne>0?dayOne.toLocaleString():'\u2014'},
                        {l:'Projected birds',v:stats.projectedBirds.toLocaleString(),green:true},
                        {l:'Feed consumed',v:feedSoFar>0?Math.round(feedSoFar).toLocaleString()+' lbs':'\u2014'},
                        {l:'Mortality',v:mortSoFar>0?`${mortSoFar} birds (${mortPct}%)`:'0',warn:mortSoFar>15},
                      ];
                    })().map(({l,v,warn,green})=>(
                      <div key={l} style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
                        <span style={{color:'#9ca3af'}}>{l}</span>
                        <span style={{fontWeight:600,color:warn?'#b91c1c':green?'#085041':'#111827'}}>{v}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* CC vs WR */}
          {(ccStats||wrStats)&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#4b5563',marginBottom:8,letterSpacing:.3}}>BREED COMPARISON</div>
              <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                <BreedCol label="🐓 Cornish Cross" stats={ccStats} color="#185FA5" bg="#E6F1FB"/>
                <BreedCol label="🐤 White Ranger"  stats={wrStats} color="#854F0B" bg="#FAEEDA"/>
              </div>
            </div>
          )}

          {/* Performance trends */}
          {trend10.length>=3&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#4b5563',marginBottom:8,letterSpacing:.3}}>PERFORMANCE TRENDS — LAST {trend10.length} PROCESSED BATCHES</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
                <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:12,padding:'14px 16px'}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#4b5563',marginBottom:10}}>Mortality %</div>
                  {trend10.map(b=>{
                    const m=b.birdCount>0?(batchMort(b)/b.birdCount*100):0;
                    const maxM=Math.max(...trend10.map(b2=>b2.birdCount>0?batchMort(b2)/b2.birdCount*100:0),1);
                    return <div key={b.id}><div style={{fontSize:10,color:'#6b7280',marginBottom:1}}>{b.name}</div>{trendBar(m,maxM,'#b91c1c')}</div>;
                  })}
                </div>
                <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:12,padding:'14px 16px'}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#4b5563',marginBottom:10}}>Feed / Bird (lbs)</div>
                  {trend10.filter(b=>batchFeed(b)>0&&b.totalToProcessor>0).map(b=>{
                    const f=batchFeed(b)/(b.totalToProcessor||1);
                    const maxF=Math.max(...trend10.filter(b2=>batchFeed(b2)>0&&b2.totalToProcessor>0).map(b2=>batchFeed(b2)/(b2.totalToProcessor||1)),1);
                    return <div key={b.id}><div style={{fontSize:10,color:'#6b7280',marginBottom:1}}>{b.name}</div>{trendBar(f,maxF,'#92400e')}</div>;
                  })}
                </div>
                <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:12,padding:'14px 16px'}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#4b5563',marginBottom:10}}>Avg Dressed Wt (lbs)</div>
                  {trend10.filter(b=>parseFloat(b.avgDressedLbs)>0).map(b=>{
                    const maxW=Math.max(...trend10.filter(b2=>parseFloat(b2.avgDressedLbs)>0).map(b2=>parseFloat(b2.avgDressedLbs)||0),1);
                    return <div key={b.id}><div style={{fontSize:10,color:'#6b7280',marginBottom:1}}>{b.name}</div>{trendBar(parseFloat(b.avgDressedLbs)||0,maxW,'#065f46')}</div>;
                  })}
                </div>
              </div>
            </div>
          )}

          {/* Financial summary */}
          {finBr.length>=2&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#4b5563',marginBottom:8,letterSpacing:.3}}>FINANCIAL SUMMARY</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10}}>
                <StatTile label="Total Feed Cost" val={totalFeedCost>0?'$'+Math.round(totalFeedCost).toLocaleString():'—'} color="#92400e"/>
                <StatTile label="Total Cost" val={totalAllCost>0?'$'+Math.round(totalAllCost).toLocaleString():'—'} color="#7f1d1d"/>
                <StatTile label="Feed Cost %" val={feedCostPct!=null?feedCostPct+'%':'—'} color="#92400e" sub="of total cost"/>
                <StatTile label="Avg Cost / Bird" val={totalProc>0&&totalAllCost>0?'$'+(totalAllCost/totalProc).toFixed(2):'—'} color="#374151"/>
                <StatTile label="Total Lbs Meat" val={totalLbsMeat>0?Math.round(totalLbsMeat).toLocaleString()+' lbs':'—'} color="#065f46"/>
                {totalLbsWhole>0&&<StatTile label="Total Lbs — Whole" val={Math.round(totalLbsWhole).toLocaleString()+' lbs'+(wholePct!=null?' ('+wholePct+'%)':'')} color="#065f46"/>}
                {totalLbsCuts>0&&<StatTile label="Total Lbs — Cuts" val={Math.round(totalLbsCuts).toLocaleString()+' lbs'+(cutsPct!=null?' ('+cutsPct+'%)':'')} color="#1e3a5f"/>}
              </div>
            </div>
          )}

          {/* Lbs produced trend */}
          {lbsTrend.length>=2&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#4b5563',marginBottom:8,letterSpacing:.3}}>LBS PRODUCED TREND — LAST {lbsTrend.length} BATCHES</div>
              <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:12,padding:'16px'}}>
                {(()=>{
                  const maxTotal = Math.max(...lbsTrend.map(b=>b.total),1);
                  return lbsTrend.map((b,i)=>(
                    <div key={i} style={{marginBottom:10}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                        <span style={{color:'#374151',fontWeight:600}}>{b.name}</span>
                        <span style={{color:'#6b7280'}}>{fmt(b.date)} · <strong style={{color:'#111827'}}>{Math.round(b.total).toLocaleString()} lbs total</strong></span>
                      </div>
                      {/* Stacked bar: whole (green) + cuts (blue) */}
                      <div style={{display:'flex',height:16,borderRadius:6,overflow:'hidden',background:'#f3f4f6'}}>
                        {b.whole>0&&<div style={{width:`${(b.whole/maxTotal)*100}%`,background:'#065f46',display:'flex',alignItems:'center',justifyContent:'center'}}>
                          {b.whole/b.total>0.15&&<span style={{fontSize:9,color:'white',fontWeight:700,whiteSpace:'nowrap',padding:'0 4px'}}>{Math.round(b.whole)} W</span>}
                        </div>}
                        {b.cuts>0&&<div style={{width:`${(b.cuts/maxTotal)*100}%`,background:'#1d4ed8',display:'flex',alignItems:'center',justifyContent:'center'}}>
                          {b.cuts/b.total>0.15&&<span style={{fontSize:9,color:'white',fontWeight:700,whiteSpace:'nowrap',padding:'0 4px'}}>{Math.round(b.cuts)} C</span>}
                        </div>}
                      </div>
                    </div>
                  ));
                })()}
                <div style={{display:'flex',gap:16,marginTop:8,fontSize:11,color:'#6b7280'}}>
                  <span><span style={{display:'inline-block',width:10,height:10,background:'#065f46',borderRadius:2,marginRight:4}}/>Whole Birds</span>
                  <span><span style={{display:'inline-block',width:10,height:10,background:'#1d4ed8',borderRadius:2,marginRight:4}}/>Cuts (excl. necks, feet, backs)</span>
                </div>
              </div>
            </div>
          )}

          {/* Recent daily reports */}
          {recentDailys.length>0&&(
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:600,color:'#4b5563',letterSpacing:.3}}>RECENT DAILY REPORTS</div>
                <button onClick={()=>setView('broilerdailys')} style={{fontSize:11,color:'#085041',background:'none',border:'none',cursor:'pointer',fontWeight:600,fontFamily:'inherit'}}>View all →</button>
              </div>
              <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:12,overflow:'hidden'}}>
                {recentDailys.map((d,i)=>(
                  <div key={d.id||i} style={{padding:'10px 16px',borderBottom:i<recentDailys.length-1?'1px solid #f3f4f6':'none',display:'flex',alignItems:'center',gap:12,fontSize:12}}>
                    <span style={{color:'#6b7280',minWidth:80,flexShrink:0}}>{fmt(d.date)}</span>

            <div style={{marginTop:24}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:700,color:'#374151',letterSpacing:.3}}>BATCH COMPARISON</div>
                {completedBatches.length>10&&(
                  <button onClick={()=>setShowAllComparison(v=>!v)} style={{fontSize:11,fontWeight:600,color:'#085041',background:'none',border:'1px solid #085041',borderRadius:6,padding:'3px 10px',cursor:'pointer'}}>
                    {showAllComparison?'Show Last 10':'Show All '+completedBatches.length}
                  </button>
                )}
              </div>
              <div style={{...S.card,overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,minWidth:1100}}>
                  <thead>
                    <tr style={{background:'#ecfdf5',borderBottom:'1px solid #d1fae5'}}>
                      {['Batch','Breed','Time on Farm','Schooner','Birds Arrived','4 Wk Lbs','6 Wk Lbs','Feed / Bird','Starter Feed','Grower Feed','Total Feed','# Processed','Avg Breast','Avg Thigh','Avg Dressed'].map(h=>(
                        <th key={h} style={{padding:'7px 10px',textAlign:'left',fontWeight:600,color:'#374151',whiteSpace:'nowrap',fontSize:11}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {displayed.map((b,i)=>{
                      const n=v=>parseFloat(v)||0;
                      // Daily-reports-aware feed totals: B-24 uses legacy manual fields,
                      // B-25+ pulls from broilerDailys (matches dashboard's batchFeed helper)
                      const isB24=(/^b-24-/i).test(b.name);
                      let starter, grower;
                      if(isB24){
                        starter=n(b.brooderFeedLbs);
                        grower=n(b.schoonerFeedLbs);
                      } else {
                        const bd=broilerDailys.filter(d=>(d.batch_label||'').toLowerCase().trim().replace(/^\(processed\)\s*/,'').trim()===b.name.toLowerCase().trim());
                        starter=Math.round(bd.filter(d=>d.feed_type==='STARTER').reduce((s,d)=>s+(parseFloat(d.feed_lbs)||0),0));
                        grower=Math.round(bd.filter(d=>d.feed_type==='GROWER').reduce((s,d)=>s+(parseFloat(d.feed_lbs)||0),0));
                        // Fall back to manual fields if no daily reports found
                        if(starter===0&&grower===0){
                          starter=n(b.brooderFeedLbs);
                          grower=n(b.schoonerFeedLbs);
                        }
                      }
                      const totalFeed=starter+grower;
                      const processed=n(b.totalToProcessor);
                      const feedPerBird=processed>0&&totalFeed>0?(totalFeed/processed).toFixed(1):null;
                      const B2=BREED_STYLE[b.breed]||BREED_STYLE.CC;
                      const sch=(b.schooner||'').toString().trim();
                      const timeOnFarm=(()=>{
                        if(!b.hatchDate||!b.processingDate) return null;
                        const days=Math.round((new Date(b.processingDate+'T12:00:00')-new Date(b.hatchDate+'T12:00:00'))/86400000);
                        return `${Math.floor(days/7)}w ${days%7}d`;
                      })();
                      const cell=(v,opts={})=>{
                        const {green,bold}=opts;
                        const color=green?'#085041':'#111827';
                        return <td key={Math.random()} style={{padding:'7px 10px',whiteSpace:'nowrap',color:v?color:'#9ca3af',fontWeight:bold||v?600:400}}>{v||'—'}</td>;
                      };
                      return (
                        <tr key={b.id} onClick={()=>openEdit(b)} style={{borderBottom:'1px solid #e5e7eb',background:i%2===0?'white':'#fafafa',cursor:'pointer'}} className="hoverable-tile">
                          <td style={{padding:'7px 10px',fontWeight:700,whiteSpace:'nowrap',color:'#111827'}}>{b.name}</td>
                          <td style={{padding:'7px 10px'}}>{b.breed?<span style={S.badge(B2.bg,B2.tx)}>{b.breed}</span>:<span style={{color:'#9ca3af'}}>—</span>}</td>
                          {cell(timeOnFarm)}
                          <td style={{padding:'7px 10px'}}>{sch?<span style={{padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600,background:'#e0f2fe',color:'#0369a1'}}>{sch}</span>:<span style={{color:'#9ca3af'}}>\u2014</span>}</td>
                          {cell(b.birdCountActual?parseInt(b.birdCountActual).toLocaleString():null)}
                          {cell(n(b.week4Lbs)>0?`${n(b.week4Lbs)} lbs`:null)}
                          {cell(n(b.week6Lbs)>0?`${n(b.week6Lbs)} lbs`:null)}
                          {cell(feedPerBird?`${feedPerBird} lbs`:null,{green:true})}
                          {cell(starter>0?`${Math.round(starter).toLocaleString()} lbs`:null)}
                          {cell(grower>0?`${Math.round(grower).toLocaleString()} lbs`:null)}
                          {cell(totalFeed>0?`${Math.round(totalFeed).toLocaleString()} lbs`:null,{bold:true})}
                          {cell(processed>0?processed.toLocaleString():null)}
                          {cell(n(b.avgBreastLbs)>0?`${n(b.avgBreastLbs)} lbs`:null)}
                          {cell(n(b.avgThighsLbs)>0?`${n(b.avgThighsLbs)} lbs`:null)}
                          {cell(n(b.avgDressedLbs)>0?`${n(b.avgDressedLbs)} lbs`:null)}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {!showAllComparison&&completedBatches.length>10&&(
                <div style={{textAlign:'center',fontSize:11,color:'#9ca3af',marginTop:6}}>{completedBatches.length-10} more batches hidden — click "Show All" to expand</div>
              )}
            </div>
          );
        })()}

        {/* Processed batches */}
        {batches.filter(b=>b.status==="processed").length>0&&(
          <div style={{marginTop:20}}>
            <div style={{fontSize:13,fontWeight:600,color:"#9ca3af",marginBottom:8,letterSpacing:.3}}>
              PROCESSED ({batches.filter(b=>b.status==="processed").length})
            </div>
            {batches.filter(b=>b.status==="processed").map((b,i)=>{
              const B2=BREED_STYLE[b.breed]||BREED_STYLE.CC;
              // B-24-* batches: always use manually entered feed totals (legacy)
              const isB24=(/^b-24-/i).test(b.name);
              const bd=broilerDailys.filter(d=>(d.batch_label||'').toLowerCase().trim().replace(/^\(processed\)\s*/,'').trim()===b.name.toLowerCase().trim());
              const dailyStarterLbs=bd.filter(d=>d.feed_type==='STARTER').reduce((s,d)=>s+(parseFloat(d.feed_lbs)||0),0);
              const dailyGrowerLbs=bd.filter(d=>d.feed_type==='GROWER').reduce((s,d)=>s+(parseFloat(d.feed_lbs)||0),0);
              const dailyGritLbs=bd.reduce((s,d)=>s+(parseFloat(d.grit_lbs)||0),0);
              const dailyMortality=bd.reduce((s,d)=>s+(parseInt(d.mortality_count)||0),0);
              // Feed source logic: B-24 = manual only; B-25+ = daily reports only
              const starterLbs=isB24?(b.brooderFeedLbs||0):dailyStarterLbs;
              const growerLbs=isB24?(b.schoonerFeedLbs||0):dailyGrowerLbs;
              const gritLbs=isB24?(b.gritLbs||0):dailyGritLbs;
              const mortality=isB24?(b.mortalityCumulative||0):dailyMortality;
              const totalFeed=starterLbs+growerLbs;
              const starterCost=starterLbs*(b.perLbStarterCost||0);
              const growerCost=growerLbs*(b.perLbStandardCost||0);
              const feedCost=starterCost+growerCost;
              const gritCost=gritLbs*(b.perLbGritCost||0);
              const totalCost=feedCost+gritCost+(b.processingCost||0);
              const perBird=b.totalToProcessor>0?totalCost/b.totalToProcessor:0;
              const mortalityPct=b.birdCount>0?(mortality/b.birdCount*100).toFixed(1):0;
              return (
                <div key={b.id} onClick={()=>openEdit(b)} style={{background:"white",border:"1px solid #e5e7eb",borderRadius:10,marginBottom:10,overflow:"hidden",cursor:"pointer",opacity:.9}} className="hoverable-tile">
                  {/* Header row */}
                  <div style={{padding:"10px 14px",background:"#f9fafb",display:"flex",flexWrap:"wrap",gap:"6px 14px",alignItems:"center",borderBottom:"1px solid #e5e7eb"}}>
                    <strong style={{fontSize:13,color:"#111827"}}>{b.name}</strong>
                    {b.breed&&<span style={S.badge(B2.bg,B2.tx)}>{breedLabel(b.breed)}</span>}
                    {b.hatchery&&<span style={{color:"#6b7280",fontSize:12}}>{b.hatchery}</span>}
                    {b.schooner&&<span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:"#e0f2fe",color:"#0369a1"}}>Sch {b.schooner}</span>}
                    <span style={{marginLeft:"auto",display:"flex",gap:6}}>
                      <button onClick={e=>{e.stopPropagation();const nb=batches.map(x=>{
                        if(x.id!==b.id) return x;
                        const upd={...x,status:"active"};
                        // Stamp current admin rates if missing (e.g. reactivating a batch that was created blank)
                        if(!upd.perLbStarterCost || !upd.perLbStandardCost){
                          upd.perLbStarterCost  = feedCosts.starter || 0;
                          upd.perLbStandardCost = feedCosts.grower  || 0;
                          upd.perLbGritCost     = feedCosts.grit    || 0;
                        }
                        return upd;
                      });setBatches(nb);persist(nb);}}
                        style={{fontSize:11,color:"#085041",background:"none",border:"none",cursor:"pointer"}}>Reactivate</button>
                      <button onClick={e=>{e.stopPropagation();confirmDelete("Delete this batch? This cannot be undone.",()=>del(b.id));}}
                        style={{fontSize:11,color:"#b91c1c",background:"none",border:"none",cursor:"pointer"}}>Delete</button>
                    </span>
                  </div>
                  {/* Stats grid */}
                  <div style={{padding:"10px 14px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8,fontSize:11}}>
                    {[
                      {l:"Hatch Date",     v:fmt(b.hatchDate)},
                      {l:"Process Date",   v:fmt(b.processingDate)},
                      {l:"Birds Ordered",  v:(b.birdCount||0).toLocaleString()},
                      {l:"Birds Arrived",  v:b.birdCountActual?parseInt(b.birdCountActual).toLocaleString():"—"},
                      {l:"To Processor",   v:(b.totalToProcessor||0).toLocaleString()},
                      {l:"Mortality",      v:`${mortality} (${mortalityPct}%)`, warn:mortality>20},
                    ].map(({l,v,warn})=>(
                      <div key={l} style={{background:"#f9fafb",borderRadius:6,padding:"6px 8px"}}>
                        <div style={{color:"#9ca3af",marginBottom:2,fontSize:10,textTransform:"uppercase",letterSpacing:.3}}>{l}</div>
                        <div style={{fontWeight:700,color:warn?"#b91c1c":"#111827",fontSize:12}}>{v||"\u2014"}</div>
                      </div>
                    ))}
                  </div>
                  {/* Feed section */}
                  {(totalFeed>0||gritLbs>0)&&(
                    <div style={{padding:"8px 14px",borderTop:"1px solid #f3f4f6",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8,fontSize:11,background:"#fefce8"}}>
                      <div style={{gridColumn:"1/-1",fontSize:10,color:isB24?"#92400e":"#085041",marginBottom:2,fontStyle:isB24?"italic":"normal"}}>
                        {isB24?"📋 Feed & grit from manually entered totals (2024 batch)":
                          bd.length>0?`🌾 Feed & grit from ${bd.length} daily report${bd.length!==1?'s':''}`:
                          "⚠ No daily reports found for this batch"}
                      </div>
                      {[
                        {l:isB24?"Brooder Feed":"Starter Feed", v:starterLbs>0?`${Math.round(starterLbs).toLocaleString()} lbs`:"—"},
                        {l:isB24?"Schooner Feed":"Grower Feed",  v:growerLbs>0?`${Math.round(growerLbs).toLocaleString()} lbs`:"—"},
                        {l:"Grit",           v:gritLbs>0?`${Math.round(gritLbs).toLocaleString()} lbs`:"—"},
                        {l:"Feed Cost",      v:feedCost>0?`$${feedCost.toFixed(2)}`:"—"},
                        {l:"Grit Cost",      v:gritCost>0?`$${gritCost.toFixed(2)}`:"—"},
                        {l:"Process Cost",   v:b.processingCost>0?`$${(b.processingCost||0).toFixed(2)}`:"—"},
                        {l:"Total Cost",     v:totalCost>0?`$${totalCost.toFixed(2)}`:"—"},
                        {l:"Per Bird Cost",  v:perBird>0?`$${perBird.toFixed(2)}`:"—"},
                      ].map(({l,v})=>(
                        <div key={l} style={{background:"rgba(255,255,255,.6)",borderRadius:6,padding:"6px 8px"}}>
                          <div style={{color:"#92400e",marginBottom:2,fontSize:10,textTransform:"uppercase",letterSpacing:.3}}>{l}</div>
                          <div style={{fontWeight:700,color:"#78350f",fontSize:12}}>{v}</div>
                        </div>
                      ))}
                    </div>
                  )}
                  {/* Weights section */}
                  {(b.avgDressedLbs||b.avgBreastLbs||b.avgThighsLbs||b.week4Lbs||b.week6Lbs)&&(
                    <div style={{padding:"8px 14px",borderTop:"1px solid #f3f4f6",display:"flex",flexWrap:"wrap",gap:"6px 20px",fontSize:11,color:"#6b7280"}}>
                      {b.week4Lbs>0&&<span>4-wk: <strong>{b.week4Lbs} lbs</strong></span>}
                      {b.week6Lbs>0&&<span>6-wk: <strong>{b.week6Lbs} lbs</strong></span>}
                      {b.avgDressedLbs>0&&<span>Avg dressed: <strong>{b.avgDressedLbs} lbs</strong></span>}
                      {b.avgBreastLbs>0&&<span>Avg breast: <strong>{b.avgBreastLbs} lbs</strong></span>}
                      {b.avgThighsLbs>0&&<span>Avg thighs: <strong>{b.avgThighsLbs} lbs</strong></span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );

  // ── FEED VIEW ──
  if(view==="feed") {
    // Build monthly summary for next 12 months
    const today = new Date();
    const months = Array.from({length:12}, (_,i) => {
      const d = new Date(today.getFullYear(), today.getMonth()+i, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    });
    function fmtMonth(ym) {
      const [y,m] = ym.split("-").map(Number);
      return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"short",year:"numeric"});
    }
    const activeBatches = batches.filter(b => b.status !== "processed" && b.hatchDate);
    const monthlyData = months.map(ym => {
      let starter=0, grower=0;
      activeBatches.forEach(b => {
        const f = calcBatchFeedForMonth(b, ym);
        starter += f.starter; grower += f.grower;
      });
      return { ym, starter: Math.round(starter), grower: Math.round(grower), total: Math.round(starter+grower) };
    }).filter(m => m.total > 0);

    // Build monthly totals with past-month detection
    const now2 = new Date();
    const thisYM = `${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;

    return (
      <div>
        <Header/>
        <div style={{padding:"1rem",display:"flex",flexDirection:"column",gap:"1rem"}}>

          {/* Monthly summary FIRST */}
          <div style={{...S.card}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid #e5e7eb",fontWeight:600,fontSize:14,color:"#085041"}}>
              Monthly Feed Summary — All Active &amp; Planned Batches
            </div>
            {monthlyData.length===0 ? (
              <div style={{padding:"2rem",textAlign:"center",color:"#9ca3af",fontSize:13}}>No feed data — add batches with hatch dates to see monthly totals</div>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:"#ecfdf5",borderBottom:"1px solid #e5e7eb"}}>
                      <th style={{padding:"8px 16px",textAlign:"left",fontWeight:600,color:"#4b5563"}}>Month</th>
                      <th style={{padding:"8px 16px",textAlign:"right",fontWeight:600,color:"#1d4ed8"}}>Starter (lbs)</th>
                      <th style={{padding:"8px 16px",textAlign:"right",fontWeight:600,color:"#085041"}}>Grower (lbs)</th>
                      <th style={{padding:"8px 16px",textAlign:"right",fontWeight:600,color:"#1a1a1a"}}>Total (lbs)</th>
                      <th style={{padding:"8px 16px",textAlign:"left",fontWeight:600,color:"#4b5563"}}>Active batches</th>
                    </tr>
                  </thead>
                  <tbody>
                    {monthlyData.map((m,i) => {
                      const isPast = m.ym < thisYM;
                      const isCurrent = m.ym === thisYM;
                      const isExpanded = collapsedMonths.has(m.ym+'_open');
                      const batchesInMonth = activeBatches.filter(b => {
                        const f = calcBatchFeedForMonth(b, m.ym);
                        return f.starter+f.grower > 0;
                      });
                      if(isPast && !isExpanded) return (
                        <tr key={m.ym} onClick={()=>setCollapsedMonths(s=>{const n=new Set(s);n.add(m.ym+'_open');return n;})}
                          style={{borderBottom:"1px solid #e5e7eb",background:"#f9fafb",cursor:"pointer"}}>
                          <td style={{padding:"6px 16px",fontSize:11,color:"#9ca3af",fontStyle:"italic"}} colSpan={5}>
                            {fmtMonth(m.ym)} — {m.total.toLocaleString()} lbs · click to expand
                          </td>
                        </tr>
                      );
                      return (
                        <tr key={m.ym} style={{borderBottom:"1px solid #e5e7eb",background:isCurrent?"#ecfdf5":i%2===0?"white":"#fafafa"}}>
                          <td style={{padding:"8px 16px",fontWeight:isCurrent?700:500}}>
                            {fmtMonth(m.ym)}{isCurrent&&<span style={{fontSize:10,marginLeft:6,color:"#065f46",fontWeight:600}}>THIS MONTH</span>}
                            {isPast&&isExpanded&&<button onClick={()=>setCollapsedMonths(s=>{const n=new Set(s);n.delete(m.ym+'_open');return n;})} style={{marginLeft:8,fontSize:10,color:"#9ca3af",background:"none",border:"none",cursor:"pointer"}}>collapse</button>}
                          </td>
                          <td style={{padding:"8px 16px",textAlign:"right",color:"#1d4ed8",fontWeight:500}}>{m.starter.toLocaleString()}</td>
                          <td style={{padding:"8px 16px",textAlign:"right",color:"#085041",fontWeight:500}}>{m.grower.toLocaleString()}</td>
                          <td style={{padding:"8px 16px",textAlign:"right",fontWeight:700}}>{m.total.toLocaleString()}</td>
                          <td style={{padding:"8px 16px",fontSize:11,color:"#4b5563"}}>{batchesInMonth.map(b=>b.name).join(", ")}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Per-batch breakdown - COLLAPSIBLE */}
          <div style={{...S.card}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid #e5e7eb",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}
              onClick={()=>setCollapsedBatches(s=>{const n=new Set(s); n.has('all')?n.delete('all'):n.add('all'); return n;})}>
              <div style={{fontWeight:600,fontSize:14,color:"#085041"}}>Feed Estimate Per Batch</div>
              <span style={{fontSize:12,color:"#9ca3af"}}>{collapsedBatches.has('all')?'▶ expand':'▼ collapse'}</span>
            </div>
            {!collapsedBatches.has('all')&&<>
            {activeBatches.length===0&&(
              <div style={{padding:"2rem",textAlign:"center",color:"#9ca3af",fontSize:13}}>No active or planned batches</div>
            )}
            {activeBatches.map(b => {
              const {schedule, starter, grower, total} = calcBatchFeed(b);
              const C = getBatchColor(b.name);
              return (
                <div key={b.id} style={{borderBottom:"1px solid #e5e7eb"}}>
                  {/* Batch header */}
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",background:"#f9fafb",flexWrap:"wrap"}}>
                    <span style={{display:"inline-block",width:12,height:12,borderRadius:3,background:C.bg,border:'1px solid '+C.bd}}/>
                    <div style={{fontWeight:600,fontSize:13,color:"#1a1a1a",minWidth:100}}>{b.name}</div>
                    <span style={S.badge((BREED_STYLE[b.breed]||BREED_STYLE.CC).bg,(BREED_STYLE[b.breed]||BREED_STYLE.CC).tx)}>{breedLabel(b.breed)}</span>
                    <span style={S.badge('#f3f4f6','#374151')}>Schooner {b.schooner}</span>
                    <span style={{fontSize:12,color:"#4b5563"}}>Hatch: {fmt(b.hatchDate)}</span>
                    <div style={{marginLeft:"auto",display:"flex",gap:16,flexWrap:"wrap"}}>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:10,color:"#9ca3af",textTransform:"uppercase",letterSpacing:.5}}>Starter</div>
                        <div style={{fontSize:15,fontWeight:700,color:"#1d4ed8"}}>{starter.toLocaleString()} lbs</div>
                      </div>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:10,color:"#9ca3af",textTransform:"uppercase",letterSpacing:.5}}>Grower</div>
                        <div style={{fontSize:15,fontWeight:700,color:"#085041"}}>{grower.toLocaleString()} lbs</div>
                      </div>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:10,color:"#9ca3af",textTransform:"uppercase",letterSpacing:.5}}>Total</div>
                        <div style={{fontSize:15,fontWeight:700,color:"#1a1a1a"}}>{total.toLocaleString()} lbs</div>
                      </div>
                    </div>
                  </div>
                  {/* Weekly breakdown */}
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                      <thead>
                        <tr style={{background:"#ecfdf5"}}>
                          <th style={{padding:"5px 12px",textAlign:"left",fontWeight:600,color:"#4b5563",whiteSpace:"nowrap"}}>Week</th>
                          <th style={{padding:"5px 12px",textAlign:"left",fontWeight:600,color:"#4b5563"}}>Phase</th>
                          <th style={{padding:"5px 12px",textAlign:"left",fontWeight:600,color:"#4b5563"}}>Location</th>
                          <th style={{padding:"5px 12px",textAlign:"right",fontWeight:600,color:"#4b5563",whiteSpace:"nowrap"}}>Lbs/Bird</th>
                          <th style={{padding:"5px 12px",textAlign:"right",fontWeight:600,color:"#4b5563",whiteSpace:"nowrap"}}>Total Lbs (750 birds)</th>
                        </tr>
                      </thead>
                      <tbody>
                        {schedule.map((w,i) => (
                          <tr key={i} style={{borderTop:"1px solid #e5e7eb",background:w.phase==="starter"?"#f0f7ff":"#f0faf5"}}>
                            <td style={{padding:"5px 12px",fontWeight:500}}>Week {w.week}</td>
                            <td style={{padding:"5px 12px"}}>
                              <span style={{padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:600,
                                background:w.phase==="starter"?"#E6F1FB":"#EAF3DE",
                                color:w.phase==="starter"?"#185FA5":"#27500A"}}>
                                {w.phase==="starter"?"Starter":"Grower"}
                              </span>
                            </td>
                            <td style={{padding:"5px 12px",color:"#4b5563"}}>{i < 2 ? `Brooder ${b.brooder}` : `Schooner ${b.schooner}`}</td>
                            <td style={{padding:"5px 12px",textAlign:"right"}}>{w.lbsPerBird.toFixed(2)}</td>
                            <td style={{padding:"5px 12px",textAlign:"right",fontWeight:500}}>{w.totalLbs.toLocaleString()}</td>
                          </tr>
                        ))}
                        <tr style={{borderTop:"2px solid #ddd",background:"#ecfdf5",fontWeight:600}}>
                          <td colSpan={4} style={{padding:"6px 12px",textAlign:"right",color:"#4b5563"}}>Total</td>

  // ── PIG FEED VIEW ──
  if(view==="pigs") {
    function savePigs(d){ setPigData(d); persistPigData(d); }
    function updPig(k,v){ savePigs({...pigData,[k]:Math.max(0,parseInt(v)||0)}); }
    function updGroup(id,k,v){ savePigs({...pigData,feederGroups:pigData.feederGroups.map(g=>g.id===id?{...g,[k]:Math.max(0,parseFloat(v)||0)}:g)}); }

    function removeGroup(id){ savePigs({...pigData,feederGroups:pigData.feederGroups.filter(g=>g.id!==id)}); }

    // Daily feed calculations
    const sowDaily       = pigData.sows        * 5;
    const nursingSowDaily= pigData.nursingSows  * 12;

              <div style={{background:"#085041",border:"1px solid #085041",borderRadius:10,padding:"12px 16px",textAlign:"center"}}>

                <div style={{fontSize:24,fontWeight:700,color:"white"}}>{totalMonthly.toLocaleString()}</div>
