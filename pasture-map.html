     link below points at the pasture manifest so iOS Safari / Android Chrome
     read start_url=/pasture-map at HTML parse time, before any JS. Netlify

     SPA fallback, so Add to Home Screen from the field captures start_url
     /pasture-map (not the root) and the icon opens straight into the map. The
     React app boots from /src/main.jsx the same way as index.html — only the
     install manifest differs. -->

<link rel="preconnect" href="https://unpkg.com" crossorigin/>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>

  /* ── WEBFORM STYLES (scoped to #webform-container) ── */
  #webform-container{--wf-green:#085041;--wf-green-lt:#ecfdf5;--wf-green-bd:#a7f3d0;--wf-text:#000000;--wf-text2:#4b5563;--wf-muted:#9ca3af;--wf-border:#d1d5db;--wf-border2:#d1d5db;--wf-bg:#f6f8f7;--wf-r-sm:10px;--wf-r-md:12px;--wf-r-lg:14px;--wf-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);font-family:'Hanken Grotesk',-apple-system,sans-serif;background:var(--wf-bg);color:var(--wf-text);font-size:14px;line-height:1.5;min-height:100vh}
  #webform-container input,#webform-container select,#webform-container textarea{font-family:inherit;font-size:13px;padding:8px 11px;border:1px solid var(--wf-border2);border-radius:var(--wf-r-sm);width:100%;outline:none;background:#fff;color:var(--wf-text);transition:border-color .15s,box-shadow .15s}
  #webform-container input:focus,#webform-container select:focus,#webform-container textarea:focus{border-color:var(--wf-green);box-shadow:0 0 0 3px rgba(8,80,65,.1)}

  #webform-container .header-sub{font-size:11px;font-weight:500;color:rgba(255,255,255,.6);border-left:1px solid rgba(255,255,255,.25);padding-left:10px;margin-left:10px;letter-spacing:.5px}
  #webform-container .wrap{max-width:540px;margin:0 auto;padding:1.5rem 1rem 3rem}
  #webform-container .card{background:#fff;border:1px solid var(--wf-border);border-radius:var(--wf-r-md);padding:20px;margin-bottom:16px;box-shadow:var(--wf-shadow)}
  #webform-container .card-title{font-size:13px;font-weight:700;color:var(--wf-text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--wf-border)}
  #webform-container .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  #webform-container .field{margin-bottom:12px}
  #webform-container .field:last-child{margin-bottom:0}
  #webform-container .toggle-group{display:grid;grid-template-columns:1fr 1fr;border-radius:var(--wf-r-sm);overflow:hidden;border:1px solid var(--wf-border2)}
  #webform-container .tgl{padding:9px 0;border:none;background:#f9fafb;color:var(--wf-text2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:background .12s,color .12s}
  #webform-container .tgl:first-child{border-right:1px solid var(--wf-border2)}

  #webform-container .tgl.no{background:#374151;color:#fff}
  #webform-container .btn-submit{width:100%;padding:10px 16px;border:none;border-radius:var(--wf-r-sm);background:linear-gradient(135deg,#085041,#0d6652);color:#fff;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(8,80,65,.25);transition:opacity .15s}
  #webform-container .btn-submit:hover{opacity:.92}
  #webform-container .btn-submit:disabled{opacity:.45;cursor:not-allowed}

  #webform-container .today{display:inline-block;font-size:11px;padding:2px 8px;background:var(--wf-green-lt);color:var(--wf-green);border:1px solid var(--wf-green-bd);border-radius:var(--wf-r-sm);font-weight:600;margin-top:4px;cursor:pointer;user-select:none}
  #webform-container .today:hover{background:#d1fae5}

  #webform-container .success p{font-size:14px;color:var(--wf-text2);margin-bottom:28px;line-height:1.6}
  #webform-container .btn-another{display:inline-block;padding:10px 16px;border:1px solid var(--wf-green);border-radius:var(--wf-r-sm);background:#fff;color:var(--wf-green);font-size:14px;font-weight:600;cursor:pointer}

  @media(max-width:400px){#webform-container .grid2{grid-template-columns:1fr}}
  /* ── Global openable affordance (CP0 WI-6) ──
     Contract locked by tests/static/openable_hover_affordance_static.test.js;
     keep this block byte-identical across index.html / dailys.html /
     equipment.html.
       .hoverable-tile — openable div-based card/tile/grid row: lifts 3px on
       hover/focus (Home parity .lift) with a soft shadow + stronger border.
       .hoverable-row  — openable <tr> inside a real <table>: raises via a
       row-hover wash + stronger cell border (transforms/box-shadow are
       unreliable on table rows, so rows use paint emphasis, not a lift).
     Both reveal a trailing › chevron (.chev, styled just below this block) and
     share the same keyboard-focus ring. Hover/focus may only change paint
     (background/box-shadow/outline/border-color/transform) — never box metrics
     — so pointing at a row never shifts layout. !important lets the lift/wash
     win over inline call-site styles; hover is gated behind (hover:hover) so
     touch devices get the :active state instead of a sticky lift; prefers-
     reduced-motion drops the lift transform. */
  .hoverable-tile{cursor:pointer;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease}
  .hoverable-row{cursor:pointer}
  @media (hover:hover){
    .hoverable-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--border-strong) !important}
    .hoverable-row:hover td{background:var(--row-hover) !important;border-color:var(--border-strong) !important}
  }
  .hoverable-tile:active{transform:none;box-shadow:none}
  .hoverable-row:active td{background:var(--row-hover) !important}
  .hoverable-tile:focus-visible,.hoverable-row:focus-visible{outline:2px solid var(--brand);outline-offset:-2px;background:var(--row-hover) !important}
  @media (prefers-reduced-motion: reduce){
    .hoverable-tile{transition:box-shadow .3s ease,border-color .3s ease}
    .hoverable-tile:hover{transform:none}
  }
  /* WI-6 trailing chevron — fades + slides in on hover/focus of any openable.
     Opt-in: a surface adds <span class="chev" aria-hidden="true">›</span> as
     its last child (DataTable rows reserve a trailing cell). Kept OUTSIDE the
     guarded affordance block on purpose — opacity is not a paint prop the block
     allows. */
  .hoverable-tile .chev,.hoverable-row .chev{margin-left:auto;color:var(--text-faint);line-height:1;opacity:0;transform:translateX(-6px);transition:opacity .3s ease,transform .3s ease;pointer-events:none}
  .hoverable-tile:hover .chev,.hoverable-tile:focus-visible .chev,.hoverable-row:hover .chev,.hoverable-row:focus-visible .chev{opacity:1;transform:none;color:var(--brand)}
  @media (prefers-reduced-motion: reduce){.hoverable-tile .chev,.hoverable-row .chev{transition:none}}

  /* Authenticated-app mobile overrides. Public webforms set their own
     layout above and intentionally don't carry these data-* hooks, so
     these rules only apply to logged-in surfaces. !important is required
     to win against inline styles set by JSX.
     Hooks used:
       data-home-grid     HomeDashboard program/animals grids
       data-header-bar    Dark top header bar (Header.jsx)
       data-header-userinfo  Save-status + username container
       data-header-username  Just the name·role span
       data-header-subnav    Light section sub-nav bar
       data-mobile-hscroll   Wide row container → horizontal scroll
       data-mobile-1col      Multi-col grid → single column on mobile
       data-mobile-2col      Wide multi-col grid → 2 columns on mobile */
  @media (max-width: 600px) {
    [data-home-grid="programs"] {
      grid-template-columns: 1fr 1fr !important;
    }
    [data-home-grid="animals"] {
      grid-template-columns: 1fr 1fr 1fr !important;
      gap: 12px !important;
    }
    [data-home-grid="animals"] > :last-child {
      border-left: none !important;
      padding-left: 0 !important;
    }
    [data-header-bar="1"] {
      padding: 8px 12px !important;
      gap: 6px !important;
    }
    /* Reorder header children at mobile widths so the layout resolves into
       two predictable rows: brand + (save-status) + burger/sign-out on
       row 1, then the Webforms+Tasks nav strip on row 2. Without these
       order tweaks marginLeft:auto on user-info pushed the action group
       to the right of row 2 and left Tasks orphaned on the left of row 2
       with a big gap between — visually ragged. */
    [data-header-bar="1"] [data-header-brand="1"] {
      order: 1;
    }
    [data-header-bar="1"] [data-header-userinfo="1"] {
      order: 2;
      margin-left: 0 !important;
    }
    [data-header-bar="1"] [data-header-action-group="1"] {
      order: 3;
      margin-left: auto !important;
    }
    [data-header-bar="1"] [data-header-webforms-group="1"] {
      order: 4;
      margin-left: 0 !important;
    }
    [data-header-bar="1"] [data-header-tasks-divider="1"] {
      order: 5;
      margin-left: 0 !important;
    }
    [data-header-username="1"] {
      display: none !important;
    }
    [data-header-subnav="1"] {
      flex-wrap: nowrap !important;
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch !important;
      scrollbar-width: none;
      padding: 8px 12px !important;
    }
    [data-header-subnav="1"]::-webkit-scrollbar {
      display: none;
    }
    [data-mobile-hscroll="1"] {
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch !important;
    }
    [data-mobile-1col="1"] {
      grid-template-columns: 1fr !important;
    }
    [data-mobile-2col="1"] {
      grid-template-columns: 1fr 1fr !important;
    }
    /* Feed-ledger equation rows: at narrow widths the desktop 7-/8-col
       grid compresses into unreadable 30px columns. Flip to a vertical
       stack so each value (and the operator that prefixes it) gets its
       own line, with the start/consumed/ordered/end content reading
       naturally top-to-bottom. */
    [data-mobile-stack-equation="1"] {
      display: flex !important;
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 4px !important;
    }
    [data-mobile-stack-equation="1"] > * {
      text-align: left !important;
    }
    /* Broiler BatchForm side nav arrows are position:fixed and overlap
       the modal body on narrow viewports. Hide on mobile — the user
       can still cycle batches by closing and tapping the next row in
       the list. */
    [data-batchform-side-nav="1"] {
      display: none !important;
    }
  }
</style>

<style>
